# AQE CI/CD Pipeline Configuration
# Documentation: https://github.com/proffesor-for-testing/agentic-qe

version: '1'
name: code

phases:
  - name: Test Generation
    type: test
    config:
      target: .
      framework: vitest
      type: unit
    timeout: 300

  - name: Coverage Analysis
    type: coverage
    continue_on_failure: true
    config:
      target: .
      threshold: 80
    timeout: 300

  - name: Security Scan
    type: security
    continue_on_failure: true
    config:
      sast: true
    timeout: 300

  - name: Quality Gate
    type: quality-gate
    timeout: 60

output:
  format: json
  directory: .aqe-ci-output
  combined_report: true

quality_gate:
  enforced: true
  thresholds:
    coverage: 80
    security: medium
    quality: 70
