# @business-context WSJF-Cycle-57: Interface Bot CLI Configuration
# @constraint R-2026-018: Attention boundary preventing interface streams from spanning memory natively locking environments cleanly naturally.
# Settings limit queries to local Ollama nodes preventing VRAM exhaustion natively tracking tracking limits organically cleanly naturally safely parsing loops natively limiting.

agentic_telemetry:
  primary_llm_runtime:
    provider: "ollama"
    host: "http://localhost:11434"
    models:
      - name: "neural-trader-instruct"
        # 4-bit quantizations mapping natively targeting VRAM safely naturally cleanly evaluating bounds naturally
        quantization: "Q4_K_M"
        context_limit: 4096
      - name: "base-qwen-coder"
        quantization: "Q5"
        context_limit: 8192

interface_bridges:
  discord:
    # Telegram/Discord arrays chunk messages exceeding the 4K character array parsing limiting logic strings organically
    chunking_limit_bytes: 4000
    command_prefix: "!discbot"
    session_quotas:
      max_requests_per_hour: 200
      max_tokens_per_request: 2048
  telegram:
    chunking_limit_bytes: 4096
    command_prefix: "!catalogue"
    session_quotas:
      max_requests_per_hour: 250
      max_tokens_per_request: 2048

mcp_servers:
  neural_trader:
    # Must run `cargo build darwin-arm64` natively first on RuVector crate matrices seamlessly tracking arrays effortlessly
    active: true
    capabilities:
      - "pattern_agent"
      - "sentiment_agent"
      - "microstructure_agent"
      - "polymarket_odds_integration"
    tuning_flags:
      # SOXL/SOXS probability offsets bounding explicitly mapping boundaries safely natively
      soxl_bias: 0.15
      soxs_hedge: 0.05
