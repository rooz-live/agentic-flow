---
# cPanel Git Version Control deployment manifest
# Triggered on `git pull` inside cPanel-managed repo clone
# Deploys Vite-built trading dashboard + static assets to docroot
deployment:
  tasks:
    # Build the trading dashboard (requires Node.js on cPanel — skip if pre-built)
    - /bin/bash -c 'command -v node >/dev/null && npm ci --omit=dev && npm run trader:build || echo "Node not available — using pre-built dist/"'
    # Deploy static assets to docroot
    - mkdir -p /home/ogov/public_html/prefig/assets
    - /bin/cp -Rf dist/* /home/ogov/public_html/prefig/ 2>/dev/null || true
    # Deploy public HTML entry points
    - /bin/cp -f public/*.html /home/ogov/public_html/prefig/ 2>/dev/null || true
    # Ensure .htaccess for SPA routing exists
    - /bin/bash -c 'test -f /home/ogov/public_html/prefig/.htaccess || echo -e "RewriteEngine On\nRewriteCond %{REQUEST_FILENAME} !-f\nRewriteCond %{REQUEST_FILENAME} !-d\nRewriteRule ^ index.html [L]" > /home/ogov/public_html/prefig/.htaccess'
