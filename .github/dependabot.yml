version: 2

# Security-focused dependency updates for agentic-flow
# Ignores archive/snapshot directories to reduce alert noise

updates:
  # Primary npm package (production)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    assignees:
      - "rooz-live"
    # Allow production and development dependencies
    allow:
      - dependency-type: "production"
      - dependency-type: "development"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    assignees:
      - "rooz-live"

  # GitHub Actions (security updates only)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci-cd"
    assignees:
      - "rooz-live"
