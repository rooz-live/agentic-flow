name: ADR Governance Gate
on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - main
      - master
      - develop

jobs:
  adr-lint:
    name: Validate ADR Frontmatter
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check ADR frontmatter compliance
        run: |
          echo "🔍 Checking ADRs for required frontmatter..."
          echo ""
          
          # Find all ADR files
          ADR_FILES=$(find . -name "ADR-*.md" -type f)
          
          if [ -z "$ADR_FILES" ]; then
            echo "✅ No ADRs found - skipping validation"
            exit 0
          fi
          
          MISSING_DATE=()
          MISSING_STATUS=()
          MISSING_TESTS=()
          
          for adr in $ADR_FILES; do
            echo "Checking: $adr"
            
            # Check for date
            if ! grep -q "^date:" "$adr"; then
              MISSING_DATE+=("$adr")
            fi
            
            # Check for status
            if ! grep -q "^status:" "$adr"; then
              MISSING_STATUS+=("$adr")
            fi
            
            # Check for related_tests
            if ! grep -q "^related_tests:" "$adr"; then
              MISSING_TESTS+=("$adr")
            fi
          done
          
          # Report results
          echo ""
          echo "========================"
          echo "📊 ADR GOVERNANCE REPORT"
          echo "========================"
          
          FAILED=0
          
          if [ ${#MISSING_DATE[@]} -gt 0 ]; then
            echo "❌ ADRs missing 'date:' frontmatter (${#MISSING_DATE[@]}):"
            printf '   - %s\n' "${MISSING_DATE[@]}"
            FAILED=1
          fi
          
          if [ ${#MISSING_STATUS[@]} -gt 0 ]; then
            echo "❌ ADRs missing 'status:' frontmatter (${#MISSING_STATUS[@]}):"
            printf '   - %s\n' "${MISSING_STATUS[@]}"
            FAILED=1
          fi
          
          if [ ${#MISSING_TESTS[@]} -gt 0 ]; then
            echo "❌ ADRs missing 'related_tests:' frontmatter (${#MISSING_TESTS[@]}):"
            printf '   - %s\n' "${MISSING_TESTS[@]}"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "========================"
            echo "❌ ADR GOVERNANCE GATE: FAILED"
            echo "========================"
            echo ""
            echo "ADRs must include frontmatter:"
            echo "---"
            echo "date: YYYY-MM-DD"
            echo "status: proposed|accepted|deprecated|superseded"
            echo "related_tests: path/to/tests or TBD"
            echo "---"
            echo ""
            echo "This creates an audit trail for testimony and ensures"
            echo "architectural decisions are traceable and testable."
            exit 1
          else
            echo ""
            echo "✅ All ADRs comply with governance requirements!"
          fi
      
      - name: Validate ADR date format
        if: success()
        run: |
          echo "🔍 Validating date format (YYYY-MM-DD)..."
          
          INVALID_DATES=()
          
          for adr in $(find . -name "ADR-*.md" -type f); do
            # Extract date line
            DATE_LINE=$(grep "^date:" "$adr" || echo "")
            
            if [ -n "$DATE_LINE" ]; then
              # Extract date value
              DATE_VALUE=$(echo "$DATE_LINE" | sed 's/date:[ ]*//')
              
              # Validate format YYYY-MM-DD
              if ! echo "$DATE_VALUE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                INVALID_DATES+=("$adr (date: $DATE_VALUE)")
              fi
            fi
          done
          
          if [ ${#INVALID_DATES[@]} -gt 0 ]; then
            echo "❌ ADRs with invalid date format:"
            printf '   - %s\n' "${INVALID_DATES[@]}"
            echo ""
            echo "Date must be in YYYY-MM-DD format (e.g., 2026-03-06)"
            exit 1
          else
            echo "✅ All ADR dates have valid format!"
          fi
      
      - name: Validate ADR status values
        if: success()
        run: |
          echo "🔍 Validating status values..."
          
          VALID_STATUSES=("proposed" "accepted" "deprecated" "superseded")
          INVALID_STATUSES=()
          
          for adr in $(find . -name "ADR-*.md" -type f); do
            STATUS_LINE=$(grep "^status:" "$adr" || echo "")
            
            if [ -n "$STATUS_LINE" ]; then
              STATUS_VALUE=$(echo "$STATUS_LINE" | sed 's/status:[ ]*//')
              
              # Check if status is in valid list
              if [[ ! " ${VALID_STATUSES[@]} " =~ " ${STATUS_VALUE} " ]]; then
                INVALID_STATUSES+=("$adr (status: $STATUS_VALUE)")
              fi
            fi
          done
          
          if [ ${#INVALID_STATUSES[@]} -gt 0 ]; then
            echo "❌ ADRs with invalid status:"
            printf '   - %s\n' "${INVALID_STATUSES[@]}"
            echo ""
            echo "Valid status values: proposed, accepted, deprecated, superseded"
            exit 1
          else
            echo "✅ All ADR statuses are valid!"
          fi
      
      - name: Success summary
        if: success()
        run: |
          echo ""
          echo "========================"
          echo "✅ ADR GOVERNANCE GATE: PASSED"
          echo "========================"
          echo ""
          echo "All ADRs meet governance requirements:"
          echo "  ✅ Date frontmatter (YYYY-MM-DD format)"
          echo "  ✅ Status frontmatter (valid values)"
          echo "  ✅ Related tests frontmatter"
          echo ""
          echo "Audit trail maintained for testimony purposes."
