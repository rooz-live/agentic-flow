name: Agentic CI Coverage Extraction (Red/Green Tracking)

on:
  push:
    paths:
      - 'scripts/**/*.py'
      - 'scripts/**/*.ts'
      - 'scripts/**/*.sh'
      - 'src/**/*.tsx'
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  coverage-matrix-extraction:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase Matrices
        uses: actions/checkout@v4

      - name: Configure Execution Interpreters (Node.js & Python)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Formulate Python Coverage Matrix
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute NodeJS Bounds Safely
        run: |
          npm ci || npm install --legacy-peer-deps
          # Output Cobertura schema tracking resolving pure XML arrays for Git dashboards
          npm run coverage -- --coverageReporters="cobertura" --coverageReporters="lcov"
          
      - name: Execute Python Validation Hooks Safely 
        run: |
          python -m pip install --upgrade pip pytest pytest-cov
          pytest --cov=scripts/policy --cov=scripts/validators --cov-report=xml scripts/tests/

      - name: Upload Structural Governance Maps
        uses: actions/upload-artifact@v4
        with:
          name: agentic-coverage-xml
          path: |
            coverage/cobertura-coverage.xml
            coverage.xml
            .goalie/metrics_log.jsonl
