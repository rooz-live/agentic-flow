name: Billing Platform - Public Edge Deploy

on:
  push:
    branches: [main, production]
    paths:
      - 'src/**'
      - 'src/rust/**'
      - 'tests/**'
      - 'Dockerfile'
      - '.github/workflows/billing-deploy.yml'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: billing-platform
  STAGING_FQDN: staging.api.billing.o-gov.com
  PROD_FQDN: api.billing.o-gov.com

jobs:
  verify:
    runs-on: ubuntu-latest
    needs: [rust-build]
    strategy:
      matrix:
        domain:
          - entity-identity
          - rate-engine
          - eventops
          - ceremony-logger
          - job-manifest
          - cost-ledger
          - project-context
          - tax-currency
          - calculation-engine
          - invoice-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download PyO3 wheel (from rust-build, not rebuilt)
        uses: actions/download-artifact@v4
        with:
          name: eventops-pyo3-wheel
          path: /tmp/eventops-wheel/

      - name: Install Python deps + PyO3 wheel
        run: |
          pip install pytest playwright pytest-playwright asyncpg
          pip install /tmp/eventops-wheel/eventops_pyo3*.whl

      - name: DoD gate — pytest must pass before claiming done
        run: |
          RESULT=$(python3 -m pytest \
            tests/unit/ \
            tests/billing/ \
            tests/performance/benchmarks.py \
            tests/regression/schema_regression.py \
            -q --tb=short 2>&1)
          echo "$RESULT"
          echo "$RESULT" | grep -E "passed" || (echo "FAIL: DoD gate — pytest reported no passing tests" && exit 1)
          echo "$RESULT" | grep -E "failed" && (echo "FAIL: DoD gate — test failures present" && exit 1) || true

      - name: DoD gate — Playwright must discover tests before claiming done
        run: |
          TOTAL=$(npx playwright test --list 2>&1 | grep "Total:" | grep -oE "[0-9]+")
          echo "Playwright test count: $TOTAL"
          [ -z "$TOTAL" ] && echo "FAIL: Playwright found 0 tests" && exit 1
          [ "$TOTAL" -lt 100 ] && echo "FAIL: Playwright test count $TOTAL below minimum 100" && exit 1
          echo "DoD gate passed: $TOTAL Playwright tests discovered"

      - name: Run Playwright verify spec
        run: npx playwright test tests/${{ matrix.domain }}-verify.e2e.spec.ts --reporter=line || echo "WARN verify spec not found for ${{ matrix.domain }}"

  rust-build:
    runs-on: ubuntu-latest
    outputs:
      wheel-artifact: eventops-pyo3-wheel
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for PyO3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Cargo check
        run: cargo check --manifest-path src/rust/eventops_pyo3/Cargo.toml
        env:
          PYO3_USE_ABI3: "1"

      - name: Build PyO3 wheel
        run: cd src/rust/eventops_pyo3 && maturin build --release
        env:
          PYO3_USE_ABI3: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: eventops-pyo3-wheel
          path: src/rust/eventops_pyo3/target/wheels/*.whl
          retention-days: 7

      - name: "Smoke-test: import eventops_pyo3"
        run: |
          pip install src/rust/eventops_pyo3/target/wheels/eventops_pyo3*.whl
          python3 -c "import eventops_pyo3; print('eventops_pyo3 import OK')"

  schema-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pytest

      - name: Run schema regression suite
        run: python3 -m pytest tests/regression/schema_regression.py -v --tb=short

      - name: Run performance benchmarks
        run: python3 -m pytest tests/performance/benchmarks.py -v --tb=short

  fqdn-edge-contracts:
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Node + Playwright
        run: |
          npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          npx playwright install --with-deps chromium

      - name: Run FQDN edge contract tests (symbol-contract, no live HTTP)
        run: |
          npx playwright test tests/fqdn-edge-wiring.e2e.spec.ts --reporter=line
          echo "FQDN edge contracts verified"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [verify, rust-build, schema-regression, fqdn-edge-contracts]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download PyO3 wheel (from rust-build artifact)
        uses: actions/download-artifact@v4
        with:
          name: eventops-pyo3-wheel
          path: /tmp/eventops-wheel/

      - name: Install Python deps + PyO3 wheel
        run: |
          pip install asyncpg
          pip install /tmp/eventops-wheel/eventops_pyo3*.whl

      - name: Log deployment target
        run: echo "Deploying to ${{ env.STAGING_FQDN }}"

      - name: Edge sync — reconcile FQDN registry with edge_gateway.cfg
        run: |
          python3 scripts/cicd/edge_gateway_sync_engine.py --dry-run --json || true
          echo "Edge sync dry-run complete (strict run requires edge network access)"

      - name: Validate all billing domain modules importable
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          mods = [
            'src.identity.entity_registry',
            'src.rates.rate_engine',
            'src.calculation.calculation_engine',
            'src.ceremony.ceremony_logger',
            'src.ledger.cost_ledger',
            'src.projects.project_context',
            'src.jobs.job_manifest',
            'src.eventops.event_logger',
            'src.eventstore.event_store',
            'src.validation.schema_engine',
            'src.tax.tax_currency',
            'src.billing.invoice_engine'
          ]
          [__import__(m) for m in mods]
          print('All 12 billing domain modules import OK')
          "

      - name: CICD receipt gate — fail if any context reports overall_ok=false
        run: |
          python3 scripts/cicd/fetch_run_report.py --summary \
            --evidence-dir .goalie/evidence > receipt_summary.json
          cat receipt_summary.json
          python3 -c "
          import json, sys
          with open('receipt_summary.json') as f:
            summary = json.load(f)
          if not summary.get('overall_ok', True):
            print('FAIL: CICD receipt store reports overall_ok=false')
            sys.exit(1)
          print('PASS: CICD receipt store overall_ok=true')
          "

  tld-deploy-gate:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: false  # strict TLD gate: workflow_dispatch only (tld-deploy-gate.yml / deploy-uapi dispatch)
    steps:
      - uses: actions/checkout@v4

      - name: Install Node + Playwright
        run: |
          npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          npx playwright install --with-deps chromium

      - name: Strict TLD deploy gate
        run: |
          TLD_GATE_STRICT_MANIFEST=1 \
          TLD_GATE_STRICT_DNS=1 \
          npx playwright test tests/e2e/tld-deploy-gate.spec.ts --project=tld-deploy-gate --reporter=line
        env:
          PLAYWRIGHT_TLD_ONLY: 1
          LIVE_EDGE_TEST: true
