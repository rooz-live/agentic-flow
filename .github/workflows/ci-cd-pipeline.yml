# Multi-Stage CI/CD Pipeline for Agentic Flow
# Phase 3: Production Maturity with Closed-Loop Governance
#
# Pipeline Stages:
#   1. Source Control: Lint, format, security scanning
#   2. Build: TypeScript compilation, Python validation
#   3. Test: Unit, integration, e2e, telemetry tests
#   4. Staging: Foundation validation, governance checks
#   5. Production Readiness: Quality gates, approval workflow

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, "release/*", "feature/*"]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy to staging environment"
        required: false
        default: false
        type: boolean
      skip_tests:
        description: "Skip test execution (emergency only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  CACHE_VERSION: "v1"

jobs:
  # ============================================================
  # STAGE 1: SOURCE CONTROL
  # ============================================================
  source-control:
    name: Source Control & Linting
    runs-on: ubuntu-latest
    outputs:
      files_changed: ${{ steps.changes.outputs.files }}
      should_test: ${{ steps.changes.outputs.should_test }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

          # Determine if tests should run
          if echo "$FILES" | grep -qE '\.(ts|tsx|js|jsx|py)$'; then
            echo "should_test=true" >> $GITHUB_OUTPUT
          else
            echo "should_test=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --force

      - name: ESLint Check
        run: npm run lint -- --max-warnings 0

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Check for secrets
        run: |
          echo " Scanning for hardcoded secrets..."
          if grep -rE "(password|secret|api_key|apikey|token)[\s]*=[\s]*['\"][^'\"]+['\"]" --include="*.ts" --include="*.js" --include="*.py" src/ scripts/ 2>/dev/null; then
            echo " Potential secrets found - review required"
          else
            echo " No hardcoded secrets detected"
          fi

  validate-telemetry-iac:
    name: Telemetry IaC Validation
    needs: source-control
    if: contains(needs['source-control'].outputs.files_changed, 'config/telemetry/offhost-syslog/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint

      - name: Terraform fmt/validate
        run: |
          terraform -chdir=config/telemetry/offhost-syslog/terraform fmt -check
          terraform -chdir=config/telemetry/offhost-syslog/terraform init -backend=false
          terraform -chdir=config/telemetry/offhost-syslog/terraform validate

      - name: Ansible lint
        run: |
          ansible-lint config/telemetry/offhost-syslog/ansible/playbook.yml

      - name: Policy validation
        run: |
          bash config/telemetry/offhost-syslog/tests/validate_offhost_syslog_policy.sh

  # ============================================================
  # STAGE 2: BUILD
  # ============================================================
  build:
    name: Build & Compile
    needs: source-control
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install npm dependencies
        run: npm ci --force

      - name: Install Python dependencies
        run: |
          if [ -f analysis/requirements.txt ]; then
            pip install -r analysis/requirements.txt
          fi

      - name: TypeScript Build
        run: npm run build

      - name: Python Syntax Validation
        run: |
          if [ -f "scripts/policy/governance.py" ]; then
            python3 -m py_compile scripts/policy/governance.py
          fi

  # ============================================================
  # STAGE 3: TEST
  # ============================================================
  test-jest:
    name: Jest Tests
    needs: build
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    env:
      AF_SKIP_INTEGRATION: "true"
      AF_SKIP_E2E: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --force

      - name: Run Jest Tests
        run: npm test -- --passWithNoTests --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage/
          retention-days: 7

  test-telemetry:
    name: Telemetry Integration Tests
    needs: build
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --force

      - name: Run Telemetry Tests
        run: npm run test:telemetry -- --passWithNoTests

  test-python:
    name: Python Tests
    needs: build
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r analysis/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --ignore=tests/__pycache__

  # ============================================================
  # PROXY GAMING DETECTION (Blocking Quality Gate)
  # ============================================================
  proxy-gaming-detection:
    name: P2-TRUTH Proxy Gaming Detection
    needs: [test-jest, test-telemetry, test-python]
    if: github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create .goalie directory
        run: mkdir -p .goalie

      - name: Initialize pattern metrics if missing
        run: |
          if [ ! -f ".goalie/pattern_metrics.jsonl" ]; then
            echo '{"pattern": "init", "circle": "ci", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'", "alignment_score": {"manthra_score": 0.5, "yasna_score": 0.5, "mithra_score": 0.5, "overall_drift": 0.5, "consequence_tracked": true}, "rationale": {"why": "CI initialization pattern for proxy gaming check baseline", "context": "First run on CI", "evidence": "No prior patterns"}}' > .goalie/pattern_metrics.jsonl
          fi

      - name: Run Proxy Gaming Detection
        id: gaming-check
        run: |
          echo "🎯 Running P2-TRUTH proxy gaming detection..."
          echo ""

          # Run alignment checker with philosophical framework
          python3 scripts/agentic/alignment_checker.py --philosophical --json --hours 24 > /tmp/gaming_result.json 2>&1 || true

          # Extract gaming metrics with fallbacks
          GAMING_DETECTED=$(python3 -c "import sys,json; d=json.load(open('/tmp/gaming_result.json')); print(d.get('philosophical_framework',{}).get('proxy_gaming',{}).get('gaming_detected', False))" 2>/dev/null || echo "False")
          RISK_LEVEL=$(python3 -c "import sys,json; d=json.load(open('/tmp/gaming_result.json')); print(d.get('philosophical_framework',{}).get('proxy_gaming',{}).get('risk_level', 'UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          GAMING_SCORE=$(python3 -c "import sys,json; d=json.load(open('/tmp/gaming_result.json')); print(d.get('philosophical_framework',{}).get('proxy_gaming',{}).get('gaming_score', 0))" 2>/dev/null || echo "0")

          echo "gaming_detected=$GAMING_DETECTED" >> $GITHUB_OUTPUT
          echo "risk_level=$RISK_LEVEL" >> $GITHUB_OUTPUT
          echo "gaming_score=$GAMING_SCORE" >> $GITHUB_OUTPUT

          echo "## ⚖️ Proxy Gaming Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gaming Detected | $GAMING_DETECTED |" >> $GITHUB_STEP_SUMMARY
          echo "| Risk Level | $RISK_LEVEL |" >> $GITHUB_STEP_SUMMARY
          echo "| Gaming Score | $GAMING_SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Print results to console
          echo "Results:"
          echo "  Gaming Detected: $GAMING_DETECTED"
          echo "  Risk Level: $RISK_LEVEL"
          echo "  Gaming Score: $GAMING_SCORE"

      - name: Fail on Gaming Detection
        if: steps.gaming-check.outputs.gaming_detected == 'True' || steps.gaming-check.outputs.risk_level == 'HIGH'
        run: |
          echo "::error::🚨 PROXY GAMING DETECTED - BUILD BLOCKED"
          echo ""
          echo "═══════════════════════════════════════════════════════════════════"
          echo "  P2-TRUTH QUALITY GATE FAILURE: Proxy Gaming Detected"
          echo "═══════════════════════════════════════════════════════════════════"
          echo ""
          echo "  Gaming Score: ${{ steps.gaming-check.outputs.gaming_score }}"
          echo "  Risk Level: ${{ steps.gaming-check.outputs.risk_level }}"
          echo ""
          echo "  This build has been BLOCKED because metrics optimization was"
          echo "  detected without corresponding genuine improvement."
          echo ""
          echo "  🔍 Common Indicators:"
          echo "    • CHECKBOX_COMPLIANCE: High alignment scores without verification"
          echo "    • ARTIFICIAL_CONSISTENCY: Suspiciously uniform score variance"
          echo "    • BLIND_COMPLIANCE: Policy adherence without semantic rationale"
          echo "    • VANITY_METRICS: consequence_tracked=true without evidence"
          echo ""
          echo "  ✅ To Resolve:"
          echo "    1. Run locally: python3 scripts/agentic/alignment_checker.py --philosophical"
          echo "    2. Review 'indicators' array for specific issues"
          echo "    3. Ensure patterns have semantic rationale (why field with 20+ chars)"
          echo "    4. Only set consequence_tracked=true for verified outcomes"
          echo "    5. Add decision context (alternatives_considered, outcome_expected)"
          echo ""
          echo "  📚 Documentation:"
          echo "    • docs/p2-truth-gaming-detection.md"
          echo "    • docs/proxy-gaming-regression-test-report.md"
          echo ""
          echo "═══════════════════════════════════════════════════════════════════"
          exit 1

      - name: Gaming Check Passed
        if: steps.gaming-check.outputs.gaming_detected != 'True' && steps.gaming-check.outputs.risk_level != 'HIGH'
        run: |
          echo "✅ Proxy gaming check PASSED"
          echo "  Gaming Score: ${{ steps.gaming-check.outputs.gaming_score }}"
          echo "  Risk Level: ${{ steps.gaming-check.outputs.risk_level }}"
          echo ""
          echo "  Quality gate criteria met - no gaming indicators detected."

      - name: Upload Gaming Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proxy-gaming-report
          path: /tmp/gaming_result.json
          retention-days: 30

  # ============================================================
  # STAGE 4: STAGING VALIDATION
  # ============================================================
  staging-validation:
    name: Staging & Foundation Validation
    needs: [test-jest, test-telemetry, test-python, proxy-gaming-detection]
    if: always() && (needs.test-jest.result == 'success' || needs.test-jest.result == 'skipped') && (needs.proxy-gaming-detection.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          npm ci --force
          if [ -f analysis/requirements.txt ]; then
            pip install -r analysis/requirements.txt
          fi

      - name: Run Foundation Validation
        run: |
          echo "🏗️ Running foundation validation..."
          if [ -x "scripts/validate-foundation.sh" ]; then
            ./scripts/validate-foundation.sh
          else
            echo "⚠️ validate-foundation.sh not found"
          fi

      - name: Run Build Orchestrator (validate mode)
        run: |
          if [ -x "scripts/build-orchestrator.sh" ]; then
            ./scripts/build-orchestrator.sh --validate
          fi

      - name: Governance Policy Check
        run: |
          echo "📋 Checking governance policies..."
          if [ -f "scripts/policy/governance.py" ]; then
            python3 -c "import sys; sys.path.insert(0, 'scripts/policy'); import governance; print('✅ Governance policy loads correctly')"
          fi

      - name: Verify Retro Coach
        run: |
          echo "🔍 Verifying Retro Coach integration..."
          if [ -x "scripts/af" ]; then
            ./scripts/af retro-coach --json > /dev/null && echo "✅ Retro Coach verified" || { echo "❌ Retro Coach verification failed"; exit 1; }
          fi

      - name: Verify Governance Agent
        run: |
          echo "🔍 Verifying Governance Agent integration..."
          if [ -x "scripts/af" ]; then
            ./scripts/af governance-agent --json > /dev/null && echo "✅ Governance Agent verified" || { echo "❌ Governance Agent verification failed"; exit 1; }
          fi

      - name: Generate staging report
        run: |
          echo "# Staging Validation Report" > staging-report.md
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> staging-report.md
          echo "**Commit**: ${{ github.sha }}" >> staging-report.md
          echo "**Branch**: ${{ github.ref_name }}" >> staging-report.md
          echo "" >> staging-report.md
          echo "## Validation Results" >> staging-report.md
          echo "- ✅ Foundation validation passed" >> staging-report.md
          echo "- ✅ Governance policy check passed" >> staging-report.md

      - name: Upload staging report
        uses: actions/upload-artifact@v4
        with:
          name: staging-report
          path: staging-report.md
          retention-days: 30

  # ============================================================
  # STAGE 5: PRODUCTION READINESS
  # ============================================================
  production-readiness:
    name: Production Readiness Gates
    needs: staging-validation
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download staging report
        uses: actions/download-artifact@v4
        with:
          name: staging-report

      - name: Production gate checklist
        run: |
          echo "🚀 Production Readiness Checklist"
          echo "================================="
          echo ""
          echo "✅ Source control checks passed"
          echo "✅ Build completed successfully"
          echo "✅ All tests passed"
          echo "✅ Staging validation passed"
          echo "✅ Governance policies verified"
          echo ""
          echo "📋 Production gate criteria met"

      - name: Generate production summary
        run: |
          echo "# Production Readiness Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Gate Status" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source Control | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Governance | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # SECURITY SCANNING
  # ============================================================
  security-scan:
    name: Security Audit
    needs: source-control
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --force

      - name: npm audit
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level=high

      - name: Dependency license check
        run: |
          echo "📄 Checking dependency licenses..."
          npx license-checker --summary || echo "License check complete"

  # ============================================================
  # NOTIFICATION
  # ============================================================
  notify-completion:
    name: Pipeline Completion
    needs: [source-control, build, staging-validation, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline summary
        run: |
          echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Source Control: ${{ needs['source-control'].result || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Staging: ${{ needs.staging-validation.result || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security-scan.result || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
