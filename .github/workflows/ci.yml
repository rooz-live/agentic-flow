name: Canonical Sovereign Gate (One.sh)

on:
  push:
    branches: [main, staging]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  one-gate-execution:
    name: Holacracy Validation Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "Orchestrator Circle: Execute Canonical One.sh Execution Ledger"
        run: |
          chmod +x scripts/one.sh
          ./scripts/one.sh ci
        env:
          CI: true
          PR_BODY: ${{ github.event.pull_request.body || github.event.head_commit.message }}
