name: Canonical Sovereign Gate (One.sh)

on:
  push:
    branches: [main, staging]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  fqdn-registry-gate:
    name: FQDN registry → TLD targets sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Generated targets must match fqdn_registry.yaml
        run: python3 scripts/metrics/generate_tld_targets.py --check
  scorecard-gate:
    name: Originality/Impact Scorecard Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust/eventops_pyo3

      - name: "Install coherence signal deps"
        run: pip install pyyaml python-dateutil pytest

      - name: "Run Scorecard Gate with --verify (fail-closed)"
        run: bash scripts/gates/run_scorecard_verify_ci.sh
        env:
          CI: true
          GITHUB_ACTIONS: true
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body || github.event.head_commit.message }}
          AF_DIFF_BASE: origin/${{ github.base_ref || 'main' }}
          AF_REQUIRE_SCORECARD: "1"
          AF_SKIP_OP_READ: "1"
          AF_CI_SIGNING_KEY: ${{ secrets.AF_CI_SIGNING_KEY }}
          AF_CI_SIGNING_PRINCIPAL: ci@agentic-flow.github

      - name: Upload Scorecard Evidence
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-evidence
          path: .goalie/evidence/scorecard-*.json

  shell-gate-tests:
    name: Shell Gate Tests (tests/gates/*.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install bash 5 + dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bash python3 python3-pip jq
          # Confirm bash version (ubuntu ships bash 5)
          bash --version | head -1

      - name: "Install Python test deps"
        run: pip install pyyaml python-dateutil pytest

      - name: "Git identity for gate contract tests"
        run: |
          git config --global user.email "ci@agentic-flow.local"
          git config --global user.name "agentic-flow-ci"

      - name: "Run shell gate tests"
        run: |
          set -euo pipefail
          PASS=0; FAIL=0
          for f in tests/gates/test_*.sh; do
            echo "▶ $f"
            if bash "$f" > /tmp/gate_out.txt 2>&1; then
              PASS=$((PASS + 1))
              echo "  ✓ passed"
            else
              FAIL=$((FAIL + 1))
              echo "  ✗ FAILED: $f"
              tail -15 /tmp/gate_out.txt
            fi
          done
          echo "Shell gate summary: $PASS passed, $FAIL failed"
          [[ $FAIL -eq 0 ]]


      - name: "Run CICD contract tests (LNNNL dual-lane, tick_post — NO SKIP)"
        run: bash tests/cicd/run_all.sh fast

      - name: "Verify TLD targets generator (registry canonical)"
        run: python3 scripts/metrics/generate_tld_targets.py --check

      - name: "TLD registry drift (enforce)"
        run: AF_TLD_REGISTRY_ENFORCE=1 python3 scripts/metrics/tld_registry_drift.py


      - name: "Orchestration contract pytest (LNNNL, pace, env resolver — NO SKIP)"
        run: |
          pip install pyyaml python-dateutil
          PYTHONPATH=. AF_SKIP_OP_READ=1 python3 -m pytest \
            tests/pytest/test_update_lnnnl.py \
            tests/pytest/test_pace_from_lnnnl.py \
            tests/pytest/test_tick_cycle_policy.py \
            tests/metrics/test_env_key_resolver.py \
            --rootdir=. -q --tb=short

      - name: "Run Python gate tests (scorecard + meta)"
        run: |
          python3 -m pytest tests/gates/ --rootdir=. -q --tb=short

  one-gate-execution:
    name: Holacracy Validation Gate
    runs-on: ubuntu-latest
    needs: [scorecard-gate, shell-gate-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Download Scorecard Evidence
        uses: actions/download-artifact@v4
        with:
          name: scorecard-evidence
          path: .goalie/evidence/

      - name: "Orchestrator Circle: Execute Canonical One.sh Execution Ledger"
        run: |
          chmod +x scripts/one.sh
          source scripts/gates/emit_ci_provenance.sh
          ./scripts/one.sh ci
        env:
          CI: true
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body || github.event.head_commit.message }}
          AF_CI_SIGNING_KEY: ${{ secrets.AF_CI_SIGNING_KEY }}
          AF_CI_SIGNING_PRINCIPAL: ci@agentic-flow.github
