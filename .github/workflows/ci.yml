name: Single-Threaded CI Gate (Trust Anchor)

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-main
  cancel-in-progress: false # Forces sequential processing

jobs:
  validate_wsjf_delta:
    name: Verify Single Measurable Delta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify DoR & Standup
        run: |
          if [ ! -f "docs/STANDUP_ACTIONS.md" ]; then
            echo "::error::STANDUP_ACTIONS.md is missing. Integration blocked."
            exit 1
          fi

      - name: Passive Smoke & Semgrep
        run: |
          ./scripts/infra/smoke.sh

      - name: Verify Single Thread Isolation
        run: |
          # Checks that we are not mutating infrastructure AND graph embeddings simultaneously
          CHANGED_FILES=$(git diff --name-only origin/main)
          echo "Changed files: $CHANGED_FILES"
