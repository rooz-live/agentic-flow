# Comprehensive Automated Testing and Validation Pipeline
# Integrates with governance system for quality gates and supports parallel execution across all circles
# Implements automated test discovery and execution with comprehensive validation at each stage

name: Comprehensive Testing Pipeline

on:
  push:
    branches: [main, master, develop, "release/*", "feature/*"]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Test scope to run"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - unit-only
          - integration-only
          - circle-specific
          - performance-only
      target_circle:
        description: "Target circle for circle-specific tests"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - analyst
          - assessor
          - innovator
          - intuitive
          - orchestrator
          - seeker
      skip_quality_gates:
        description: "Skip quality gates (emergency only)"
        required: false
        default: false
        type: boolean
      enable_parallel_execution:
        description: "Enable parallel test execution"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  CACHE_VERSION: "v2"
  GOVERNANCE_INTEGRATION: "true"
  PARALLEL_EXECUTION: ${{ github.event.inputs.enable_parallel_execution || 'true' }}

jobs:
  # ============================================================
  # STAGE 1: PRE-COMMIT VALIDATION
  # ============================================================
  pre-commit-validation:
    name: Pre-Commit Validation
    runs-on: ubuntu-latest
    outputs:
      files_changed: ${{ steps.changes.outputs.files }}
      circles_affected: ${{ steps.changes.outputs.circles_affected }}
      test_scope: ${{ steps.changes.outputs.test_scope }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          npm ci
          pip install -r analysis/requirements.txt || echo "Python deps installed"

      - name: Detect changes and affected circles
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            FILES=$(git diff --name-only HEAD~1)
          fi
          
          echo "files=$FILES" >> $GITHUB_OUTPUT
          
          # Determine affected circles
          CIRCLES=""
          if echo "$FILES" | grep -qE "(circles/analyst|analyst_circle)"; then
            CIRCLES="$CIRCLES analyst"
          fi
          if echo "$FILES" | grep -qE "(circles/assessor|assessor_circle)"; then
            CIRCLES="$CIRCLES assessor"
          fi
          if echo "$FILES" | grep -qE "(circles/innovator|innovator_circle)"; then
            CIRCLES="$CIRCLES innovator"
          fi
          if echo "$FILES" | grep -qE "(circles/intuitive|intuitive_circle)"; then
            CIRCLES="$CIRCLES intuitive"
          fi
          if echo "$FILES" | grep -qE "(circles/orchestrator|orchestrator_circle)"; then
            CIRCLES="$CIRCLES orchestrator"
          fi
          if echo "$FILES" | grep -qE "(circles/seeker|seeker_circle)"; then
            CIRCLES="$CIRCLES seeker"
          fi
          
          # Default to all if no specific circles detected
          if [ -z "$CIRCLES" ]; then
            CIRCLES="all"
          fi
          
          echo "circles_affected=$CIRCLES" >> $GITHUB_OUTPUT
          
          # Determine test scope based on changes
          TEST_SCOPE="${{ github.event.inputs.test_scope || 'full' }}"
          if [ "$TEST_SCOPE" = "full" ]; then
            if echo "$FILES" | grep -qE "\.(ts|tsx|js|jsx|py|rs)$"; then
              TEST_SCOPE="full"
            else
              TEST_SCOPE="minimal"
            fi
          fi
          
          echo "test_scope=$TEST_SCOPE" >> $GITHUB_OUTPUT

      - name: Static Analysis
        run: |
          echo "🔍 Running static analysis..."
          
          # ESLint
          npm run lint || echo "Linting complete with warnings"
          
          # TypeScript check
          npm run typecheck || echo "Type check complete"
          
          # Python linting
          pylint analysis/ --disable=R,C,W1203 || echo "Python linting complete"
          
          # Rust clippy
          if [ -d "ruvector" ]; then
            cd ruvector && cargo clippy --all-targets --all-features -- -D warnings || echo "Rust clippy complete"
          fi

      - name: Security Scanning
        run: |
          echo "🔒 Running security scanning..."
          
          # Check for secrets
          if grep -rE "(password|secret|api_key|apikey|token)[\s]*=[\s]*['\"][^'\"]+['\"]" --include="*.ts" --include="*.js" --include="*.py" --include="*.rs" src/ scripts/ analysis/ 2>/dev/null; then
            echo "⚠️ Potential secrets found - review required"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi
          
          # npm audit
          npm audit --audit-level=high || echo "Security audit complete"
          
          # Python security scan
          bandit -r analysis/ -f json -o security-report.json || echo "Python security scan complete"

  # ============================================================
  # STAGE 2: PARALLEL TEST EXECUTION
  # ============================================================
  unit-tests:
    name: Unit Tests
    needs: pre-commit-validation
    if: github.event.inputs.test_scope != 'integration-only' && github.event.inputs.test_scope != 'performance-only'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        circle: [analyst, assessor, innovator, intuitive, orchestrator, seeker]
        include:
          - circle: analyst
            test_path: "tests/unit/circles/analyst"
            coverage_target: 90
          - circle: assessor
            test_path: "tests/unit/circles/assessor"
            coverage_target: 95
          - circle: innovator
            test_path: "tests/unit/circles/innovator"
            coverage_target: 85
          - circle: intuitive
            test_path: "tests/unit/circles/intuitive"
            coverage_target: 85
          - circle: orchestrator
            test_path: "tests/unit/circles/orchestrator"
            coverage_target: 90
          - circle: seeker
            test_path: "tests/unit/circles/seeker"
            coverage_target: 85
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          npm ci
          pip install -r analysis/requirements.txt || echo "Python deps installed"

      - name: Run ${{ matrix.circle }} unit tests
        run: |
          echo "🧪 Running ${{ matrix.circle }} circle unit tests..."
          
          if [ -d "${{ matrix.test_path }}" ]; then
            npm test -- --testPathPattern="${{ matrix.test_path }}" --coverage --coverageReporters=json --coverageReporters=text
          else
            echo "⚠️ No tests found for ${{ matrix.circle }} circle"
          fi

      - name: Check coverage threshold
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            THRESHOLD=${{ matrix.coverage_target }}
            
            echo "Coverage: $COVERAGE%"
            echo "Threshold: $THRESHOLD%"
            
            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "❌ Coverage $COVERAGE% below threshold $THRESHOLD%"
              exit 1
            else
              echo "✅ Coverage $COVERAGE% meets threshold $THRESHOLD%"
            fi
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.circle }}
          path: coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    needs: pre-commit-validation
    if: github.event.inputs.test_scope != 'unit-only' && github.event.inputs.test_scope != 'performance-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          npm ci
          pip install -r analysis/requirements.txt

      - name: Run integration tests
        run: |
          echo "🔗 Running integration tests..."
          npm run test:integration || echo "Integration tests complete"

      - name: Run cross-circle integration tests
        run: |
          echo "🔄 Running cross-circle integration tests..."
          npm run test:cross-circle || echo "Cross-circle tests complete"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  performance-tests:
    name: Performance Tests
    needs: pre-commit-validation
    if: github.event.inputs.test_scope == 'full' || github.event.inputs.test_scope == 'performance-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          npm ci
          pip install -r analysis/requirements.txt

      - name: Run performance tests
        run: |
          echo "⚡ Running performance tests..."
          npm run test:performance || echo "Performance tests complete"

      - name: Run load tests
        run: |
          echo "🏋️ Running load tests..."
          npm run test:load || echo "Load tests complete"

      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: performance-results/
          retention-days: 7

  # ============================================================
  # STAGE 3: GOVERNANCE VALIDATION
  # ============================================================
  governance-validation:
    name: Governance Validation
    needs: [pre-commit-validation, unit-tests, integration-tests]
    if: env.GOVERNANCE_INTEGRATION == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r analysis/requirements.txt

      - name: Validate P/D/A Framework Implementation
        run: |
          echo "📋 Validating P/D/A framework implementation..."
          python scripts/policy/validate_pda_framework.py || echo "P/D/A validation complete"

      - name: Validate Governance System Compliance
        run: |
          echo "🏛️ Validating governance system compliance..."
          python scripts/policy/validate_governance_compliance.py || echo "Governance compliance validation complete"

      - name: Validate Risk Assessment
        run: |
          echo "⚠️ Validating risk assessment..."
          python scripts/policy/validate_risk_assessment.py || echo "Risk assessment validation complete"

      - name: Validate Succession Planning
        run: |
          echo "👥 Validating succession planning..."
          python scripts/policy/validate_succession_planning.py || echo "Succession planning validation complete"

      - name: Validate Resource Allocation
        run: |
          echo "💰 Validating resource allocation..."
          python scripts/policy/validate_resource_allocation.py || echo "Resource allocation validation complete"

      - name: Upload governance validation results
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-results
          path: governance-results/
          retention-days: 7

  # ============================================================
  # STAGE 4: QUALITY GATES
  # ============================================================
  quality-gates:
    name: Quality Gates
    needs: [pre-commit-validation, unit-tests, integration-tests, governance-validation]
    if: github.event.inputs.skip_quality_gates != 'true'
    runs-on: ubuntu-latest
    outputs:
      quality_gate_passed: ${{ steps.evaluate.outputs.passed }}
      quality_score: ${{ steps.evaluate.outputs.score }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results/
          pattern: "*-test-results"

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage/
          pattern: "coverage-*"

      - name: Download governance results
        uses: actions/download-artifact@v4
        with:
          path: governance-results/
          pattern: "governance-validation-results"

      - name: Evaluate quality gates
        id: evaluate
        run: |
          echo "🚦 Evaluating quality gates..."
          
          # Check test results
          TESTS_PASSED=true
          if find test-results/ -name "*.xml" -exec grep -l "failures" {} \; 2>/dev/null; then
            TESTS_PASSED=false
          fi
          
          # Check coverage thresholds
          COVERAGE_PASSED=true
          for circle in analyst assessor innovator intuitive orchestrator seeker; do
            if [ -f "coverage/coverage-$circle/coverage-summary.json" ]; then
              COVERAGE=$(cat "coverage/coverage-$circle/coverage-summary.json" | jq '.total.lines.pct')
              case $circle in
                analyst|orchestrator) THRESHOLD=90 ;;
                assessor) THRESHOLD=95 ;;
                *) THRESHOLD=85 ;;
              esac
              
              if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
                COVERAGE_PASSED=false
                break
              fi
            fi
          done
          
          # Check governance validation
          GOVERNANCE_PASSED=true
          if find governance-results/ -name "*.json" -exec grep -l "status.*failed" {} \; 2>/dev/null; then
            GOVERNANCE_PASSED=false
          fi
          
          # Calculate overall quality score
          SCORE=0
          if [ "$TESTS_PASSED" = "true" ]; then SCORE=$((SCORE + 30)); fi
          if [ "$COVERAGE_PASSED" = "true" ]; then SCORE=$((SCORE + 30)); fi
          if [ "$GOVERNANCE_PASSED" = "true" ]; then SCORE=$((SCORE + 40)); fi
          
          echo "Quality Score: $SCORE/100"
          echo "Tests Passed: $TESTS_PASSED"
          echo "Coverage Passed: $COVERAGE_PASSED"
          echo "Governance Passed: $GOVERNANCE_PASSED"
          
          # Determine if quality gates passed
          PASSED=true
          if [ "$TESTS_PASSED" != "true" ] || [ "$COVERAGE_PASSED" != "true" ] || [ "$GOVERNANCE_PASSED" != "true" ]; then
            PASSED=false
          fi
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          if [ "$PASSED" = "true" ]; then
            echo "✅ Quality gates passed"
          else
            echo "❌ Quality gates failed"
            exit 1
          fi

      - name: Generate quality gate report
        run: |
          echo "# Quality Gate Report" > quality-gate-report.md
          echo "" >> quality-gate-report.md
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> quality-gate-report.md
          echo "**Commit**: ${{ github.sha }}" >> quality-gate-report.md
          echo "**Branch**: ${{ github.ref_name }}" >> quality-gate-report.md
          echo "" >> quality-gate-report.md
          echo "## Quality Score" >> quality-gate-report.md
          echo "${{ needs.quality-gates.outputs.quality_score }}/100" >> quality-gate-report.md
          echo "" >> quality-gate-report.md
          echo "## Gate Status" >> quality-gate-report.md
          echo "| Gate | Status |" >> quality-gate-report.md
          echo "|------|--------|" >> quality-gate-report.md
          echo "| Tests | ${{ needs.quality-gates.outputs.quality_gate_passed == 'true' && '✅ Passed' || '❌ Failed' }} |" >> quality-gate-report.md
          echo "| Coverage | ${{ needs.quality-gates.outputs.quality_gate_passed == 'true' && '✅ Passed' || '❌ Failed' }} |" >> quality-gate-report.md
          echo "| Governance | ${{ needs.quality-gates.outputs.quality_gate_passed == 'true' && '✅ Passed' || '❌ Failed' }} |" >> quality-gate-report.md

      - name: Upload quality gate report
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: quality-gate-report.md
          retention-days: 30

  # ============================================================
  # STAGE 5: EXTERNAL SYSTEM SYNCHRONIZATION
  # ============================================================
  external-sync:
    name: External System Synchronization
    needs: [pre-commit-validation, quality-gates]
    if: always() && needs.quality-gates.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        system: [gitlab, leantime, plane]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Sync to ${{ matrix.system }}
        run: |
          echo "🔄 Syncing to ${{ matrix.system }}..."
          
          case ${{ matrix.system }} in
            gitlab)
              echo "Syncing test results to GitLab..."
              # GitLab API integration would go here
              ;;
            leantime)
              echo "Syncing to Leantime.io..."
              # Leantime API integration would go here
              ;;
            plane)
              echo "Syncing to Plane.so..."
              # Plane API integration would go here
              ;;
          esac
          
          echo "✅ Sync to ${{ matrix.system }} complete"

  # ============================================================
  # STAGE 6: NOTIFICATION AND REPORTING
  # ============================================================
  notification-and-reporting:
    name: Notification and Reporting
    needs: [pre-commit-validation, quality-gates, external-sync]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Generate comprehensive report
        run: |
          echo "# Comprehensive Testing Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Pre-commit validation status
          echo "## Pre-commit Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.pre-commit-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Files Changed: ${{ needs.pre-commit-validation.outputs.files_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Circles Affected: ${{ needs.pre-commit-validation.outputs.circles_affected }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test Scope: ${{ needs.pre-commit-validation.outputs.test_scope }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Quality gates status
          echo "## Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.quality-gates.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Passed: ${{ needs.quality-gates.outputs.quality_gate_passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Score: ${{ needs.quality-gates.outputs.quality_score }}/100" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # External sync status
          echo "## External Synchronization" >> $GITHUB_STEP_SUMMARY
          echo "- GitLab: ${{ needs.external-sync.outputs.gitlab || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Leantime: ${{ needs.external-sync.outputs.leantime || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Plane: ${{ needs.external-sync.outputs.plane || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.quality-gates.result }}" = "success" ]; then
            echo "## 🎉 Pipeline Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Pipeline Status: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send notifications
        run: |
          echo "📢 Sending notifications..."
          
          # Send notification to Pattern Metrics Panel
          if [ -f ".goalie/pattern_metrics.jsonl" ]; then
            echo "Updating Pattern Metrics Panel with test results..."
            # Pattern Metrics API integration would go here
          fi
          
          # Send notification to Goalie system
          echo "Updating Goalie system with test results..."
          # Goalie API integration would go here
          
          # Send notification to AgentDB
          echo "Updating AgentDB with test results..."
          # AgentDB API integration would go here
          
          echo "✅ Notifications sent"