name: DDD Architecture Compliance

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  eslint-ddd-rules:
    name: ESLint DDD Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ESLint plugin (local)
        working-directory: tools/eslint-plugin-ddd
        run: npm install

      - name: Run ESLint DDD rules
        run: |
          npx eslint \
            --ext .ts \
            --plugin @agentic-flow/ddd \
            --rule '@agentic-flow/ddd/no-domain-infrastructure-imports: error' \
            --rule '@agentic-flow/ddd/no-application-domain-mutation: error' \
            --rule '@agentic-flow/ddd/repository-interfaces-in-domain: warn' \
            src/

      - name: Report ESLint results
        if: failure()
        run: |
          echo "::error::ESLint DDD rules detected violations. See job logs for details."
          echo "Fix violations before merging."

  architecture-tests:
    name: Architecture Boundary Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run architecture tests
        run: npm test -- tests/architecture/ddd-boundaries.test.ts

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-compliance-report
          path: |
            test-results/
            coverage/
          retention-days: 30

      - name: Comment PR with compliance
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read compliance report (would be generated by tests)
            const report = `
            ## 📊 DDD Architecture Compliance Report

            **Status**: ${process.env.COMPLIANCE_STATUS || 'Unknown'}
            **Violations**: ${process.env.VIOLATION_COUNT || '0'}
            **Compliance Rate**: ${process.env.COMPLIANCE_RATE || 'N/A'}

            See job logs for detailed violation list.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  eslint-plugin-tests:
    name: ESLint Plugin Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ESLint plugin dependencies
        working-directory: tools/eslint-plugin-ddd
        run: npm install

      - name: Build ESLint plugin
        working-directory: tools/eslint-plugin-ddd
        run: npm run build

      - name: Run ESLint plugin tests
        working-directory: tools/eslint-plugin-ddd
        run: npm test

      - name: Check test coverage
        working-directory: tools/eslint-plugin-ddd
        run: |
          npm test -- --coverage
          # Coverage threshold is 80% (configured in jest.config.js)

  compliance-summary:
    name: Generate Compliance Summary
    runs-on: ubuntu-latest
    needs: [eslint-ddd-rules, architecture-tests, eslint-plugin-tests]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# DDD Architecture Compliance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint DDD Rules | ${{ needs.eslint-ddd-rules.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture Tests | ${{ needs.architecture-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Plugin Tests | ${{ needs.eslint-plugin-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.eslint-ddd-rules.result }}" == "failure" ] || \
             [ "${{ needs.architecture-tests.result }}" == "failure" ]; then
            echo "❌ **DDD compliance checks failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please fix violations before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All DDD compliance checks passed**" >> $GITHUB_STEP_SUMMARY
          fi
