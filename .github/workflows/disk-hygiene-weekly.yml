name: Disk Hygiene Weekly

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disk-hygiene-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bash python3 python3-pip jq git
          pip install pyyaml python-dateutil

      - name: Weekly disk hygiene chain
        env:
          AF_SKIP_NETWORK: "1"
          AF_DISK_SKIP_LOOSE_COUNT: "1"
          AF_DISK_SKIP_GIT_FSCK: "1"
          AF_DISK_SKIP_GIT_GC: "1"
          AF_DISK_STEWARD_ENFORCE: "0"
          AF_SLOW_SKIP_CONTRACTS: "test_ruflo_plugins_installed.sh,test_agenticow_mcp_smoke.sh,test_ruflo_mcp_smoke.sh"
        run: bash scripts/cicd/disk_hygiene_weekly.sh
