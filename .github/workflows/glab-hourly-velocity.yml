name: "GitLab Hourly Velocity (GLAB/OIDC)"

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC identity federation
  contents: read

jobs:
  glab-velocity-observation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereign Context
        uses: actions/checkout@v4

      - name: Install GLAB CLI
        run: |
          echo "Installing glab CLI..."
          curl -sL https://gitlab.com/gitlab-org/cli/-/releases/permalink/latest/downloads/glab_Linux_x86_64.tar.gz -o glab.tar.gz
          tar -xzf glab.tar.gz
          sudo mv bin/glab /usr/local/bin/
          glab version

      - name: Authenticate GLAB via OIDC & Masked Token
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_OIDC_TOKEN }}
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "🛑 GITLAB_TOKEN missing from Secrets. Failing gate to prevent Completion Theater."
            # Create a mock incident stub for the LOW_YIELD_SOP to process
            echo '{"incident": "glab_auth_failed", "reason": "missing_oidc_token", "actionable": true}' > incident_stub.json
            exit 1
          fi
          
          # Mask token dynamically in logs
          echo "::add-mask::$GITLAB_TOKEN"
          MASKED_TOKEN="${GITLAB_TOKEN:0:8}****"
          echo "Authenticating to Sovereign Swarm with token prefix: $MASKED_TOKEN"
          
          # Log in using glab
          echo "$GITLAB_TOKEN" | glab auth login --hostname git.tag.ooo --stdin
          
          # Verify physical Auth Status
          glab auth status

      - name: Hourly CI/CD Pipeline Observation
        run: |
          echo "Fetching CI/CD metrics from the Swarm..."
          # This represents the circle role agents autonomously observing pipelines
          
          # Fallback to true so we can process the artifact even on CLI failure
          PIPELINE_OUTPUT=$(glab ci status --repo "rooz-live/agentic-flow" || echo "API_ERROR_OR_UNAUTHORIZED")
          
          echo "$PIPELINE_OUTPUT"
          
          if echo "$PIPELINE_OUTPUT" | grep -q -i "fail"; then
             echo "🚨 Pipeline failure detected in external swarm."
             echo '{"incident": "glab_pipeline_failed", "source": "github_actions_hourly", "status": "FAILED"}' > incident_stub.json
             exit 1
          elif echo "$PIPELINE_OUTPUT" | grep -q -i "API_ERROR"; then
             echo "🚨 Unable to query pipeline. Yield drop detected."
             echo '{"incident": "glab_api_unreachable", "source": "github_actions_hourly", "status": "DEGRADED"}' > incident_stub.json
             exit 1
          else
             echo "✅ Sovereign Pipeline is Healthy."
             echo '{"status": "PASS", "yield": "nominal"}' > observation_artifact.json
          fi

      - name: Retain Observation Artifact (OPEX Hook)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glab-observation-artifact
          path: |
            *.json
          retention-days: 7
