name: Mobile Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "release/mobile-*"

defaults:
  run:
    working-directory: apps/summerjobswap

jobs:
  android:
    name: Android Release AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install Node dependencies
        run: npm ci
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build Android release AAB
        env:
          SUMMERJOBSWAP_RELEASE_STORE_FILE: ${{ secrets.SUMMERJOBSWAP_RELEASE_STORE_FILE }}
          SUMMERJOBSWAP_RELEASE_STORE_PASSWORD: ${{ secrets.SUMMERJOBSWAP_RELEASE_STORE_PASSWORD }}
          SUMMERJOBSWAP_RELEASE_KEY_ALIAS: ${{ secrets.SUMMERJOBSWAP_RELEASE_KEY_ALIAS }}
          SUMMERJOBSWAP_RELEASE_KEY_PASSWORD: ${{ secrets.SUMMERJOBSWAP_RELEASE_KEY_PASSWORD }}
        run: bundle exec fastlane android release
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: summerjobswap-android-aab
          path: apps/summerjobswap/android/app/build/outputs/bundle/release/*.aab

  ios:
    name: iOS Release Archive
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install Node dependencies
        run: npm ci
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Select available iOS simulator
        id: sim
        run: |
          set -e
          device="platform=iOS Simulator,name=iPhone 15 Pro"
          avail=$(xcrun simctl list devices available 2>/dev/null | grep -m1 "iPhone.*Pro" | head -1 || true)
          if [ -n "$avail" ]; then
            name=$(echo "$avail" | sed 's/(.*//' | sed 's/^ *//' | sed 's/ *$//')
            if [ -n "$name" ]; then
              device="platform=iOS Simulator,name=$name"
            fi
          fi
          echo "destination=$device" >> "$GITHUB_OUTPUT"
      - name: Build iOS release archive
        env:
          SUMMERJOBSWAP_IOS_TEAM_ID: ${{ secrets.SUMMERJOBSWAP_IOS_TEAM_ID }}
          SUMMERJOBSWAP_IOS_BUNDLE_ID: ${{ secrets.SUMMERJOBSWAP_IOS_BUNDLE_ID }}
          SUMMERJOBSWAP_IOS_SIM_DESTINATION: ${{ steps.sim.outputs.destination }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          FASTLANE_XCODE_BUILD_SETTINGS_TIMEOUT: 120
        run: bundle exec fastlane ios release
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: summerjobswap-ios-ipa
          path: apps/summerjobswap/build/ios/*.ipa
