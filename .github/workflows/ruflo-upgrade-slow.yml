name: Ruflo Upgrade Slow

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruflo-upgrade-slow:
    name: Ruflo WSJF upgrade (slow tier, no plugin install on PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bash python3 python3-pip jq
          pip install pyyaml

      - name: Run Ruflo WSJF upgrade (ci-slow)
        env:
          AF_SKIP_OP_READ: "1"
          AF_SKIP_NETWORK: "1"
          RUFLO_PLUGIN_INSTALL: "0"
        run: bash scripts/cicd/ruflo_wsjf_upgrade.sh --ci-slow
