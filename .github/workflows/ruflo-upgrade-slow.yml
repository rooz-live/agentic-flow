name: Ruflo Upgrade Slow

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:
    inputs:
      install_plugins:
        description: "Live plugin install (weekly default on schedule)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ruflo-doctor-slow:
    name: Ruflo doctor + slow contracts (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Provenance verification (fail-closed: blocks CI without signed receipt)"
        env:
          CI: true
          GITHUB_ACTIONS: true
          AF_CI_SIGNING_KEY: ${{ secrets.AF_CI_SIGNING_KEY }}
          AF_CI_SIGNING_PRINCIPAL: ci@agentic-flow.github
        run: |
          source scripts/gates/emit_ci_provenance.sh
          echo "AF_GATE_CONTEXT=ci" >> "$GITHUB_ENV"
          echo "AF_REQUIRE_SCORECARD=1" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bash python3 python3-pip jq
          pip install pyyaml

      - name: Ruflo npm smoke
        run: |
          source config/ruflo/version.env
          npm install --no-save "ruflo@${RUFLO_VERSION}"
          ./node_modules/.bin/ruflo --version

      - name: Doctor + slow contracts (no network)
        env:
          AF_SKIP_OP_READ: "1"
          AF_SKIP_NETWORK: "1"
          RUFLO_PLUGIN_INSTALL: "0"
        run: bash scripts/cicd/ruflo_wsjf_upgrade.sh --ci-slow

  ruflo-plugin-install:
    name: Live Ruflo plugin install (weekly; network required)
    runs-on: ubuntu-latest
    needs: ruflo-doctor-slow
    if: github.event_name == 'schedule' || github.event.inputs.install_plugins == 'true'
    steps:
      - uses: actions/checkout@v4

      # ── Provenance + gate context for the plugin job (Defect 7) ───────────────
      # This job (`needs: ruflo-doctor-slow`) is a SEPARATE GitHub Actions job.
      # $GITHUB_ENV written by the doctor job does NOT propagate across the `needs:`
      # boundary (cross-job env requires `outputs:` or repository variables), so this
      # job RE-EMITS its own AF_CI_PROVENANCE_* via emit_ci_provenance.sh, which writes
      # AF_CI_PROVENANCE_SIGNATURE/PRINCIPAL to $GITHUB_ENV for the steps below in THIS
      # job (doctor gate → plugin install → memory graph → evidence).
      #
      # AF_GATE_CONTEXT / AF_REQUIRE_SCORECARD must ALSO be set here (they do not cross
      # needs:) so downstream steps in this job inherit the same gate context as job 1.
      #
      # FORK / WEEKLY-CRON OWNERS: provenance emit requires the AF_CI_SIGNING_KEY secret
      # (private ed25519; public key in .goalie/scorecards/allowed_signers). Forks
      # without it intentionally SKIP emit here (warn-only). By design the upstream
      # `ruflo-doctor-slow` job is fail-closed — it exits 1 if the key is absent — so a
      # fork cron that reaches THIS job must have set the secret; otherwise the run is
      # already blocked upstream.
      - name: "Provenance + gate context (re-emit per job; forks need AF_CI_SIGNING_KEY)"
        env:
          CI: true
          GITHUB_ACTIONS: true
          AF_CI_SIGNING_KEY: ${{ secrets.AF_CI_SIGNING_KEY }}
          AF_CI_SIGNING_PRINCIPAL: ci@agentic-flow.github
        run: |
          echo "AF_GATE_CONTEXT=ci" >> "$GITHUB_ENV"
          echo "AF_REQUIRE_SCORECARD=1" >> "$GITHUB_ENV"
          if [[ -n "${AF_CI_SIGNING_KEY:-}" ]]; then
            source scripts/gates/emit_ci_provenance.sh
          else
            echo "WARN: AF_CI_SIGNING_KEY unset — provenance emit skipped (fork weekly cron)"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bash python3 python3-pip jq
          pip install pyyaml
          source config/ruflo/version.env
          npm install --no-save "ruflo@${RUFLO_VERSION}"

      - name: Doctor gate (must pass before plugin install)
        env:
          AF_SKIP_OP_READ: "1"
          AF_SKIP_NETWORK: "1"
        run: |
          PYTHONPATH="$PWD" python3 scripts/cicd/ruflo_doctor_roam.py
          python3 scripts/ruflo/sync_doctor_roam_risks.py

      - name: Live plugin install (WSJF order)
        env:
          AF_SKIP_OP_READ: "1"
          RUFLO_PLUGIN_INSTALL: "1"
          AF_PLUGIN_INSTALL_VERIFY: "1"
          AF_PLUGIN_INSTALL_ENFORCE: "1"
        run: bash scripts/cicd/ruflo_wsjf_upgrade.sh --install-plugins

      - name: Memory graph apply (doctor-green gate)
        env:
          RUFLO_MEMORY_GRAPH_APPLY: "1"
          AF_SKIP_OP_READ: "1"
        run: |
          PYTHONPATH="$PWD" python3 scripts/cicd/ruflo_doctor_roam.py
          python3 scripts/ruflo/apply_memory_graph.py

      - name: Write upgrade evidence
        run: python3 scripts/cicd/ruflo_upgrade_evidence.py
