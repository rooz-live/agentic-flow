name: Originality/Impact Scorecard Gate
# GATE-002: enforces scripts/gates/scorecard_gate.py on every PR (fail-closed).
# Coherence derived from real signals; gate_integrity from exogenous CI context.
on:
  pull_request:

permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard Gate (verify + strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Evaluate scorecard (HEAD gate, fail-closed)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          AF_DIFF_BASE: origin/${{ github.base_ref }}
          CI: true
          GITHUB_ACTIONS: true
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          AF_REQUIRE_SCORECARD: "1"
          AF_CI_SIGNING_KEY: ${{ secrets.AF_CI_SIGNING_KEY }}
          AF_CI_SIGNING_PRINCIPAL: ci@agentic-flow.github
        run: bash scripts/gates/run_scorecard_verify_ci.sh
