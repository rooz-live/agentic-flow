name: TLD Deploy Gate (strict, post-deploy)

run-name: TLD strict deploy=${{ github.event.inputs.deploy_run_id }}

on:
  workflow_dispatch:
    inputs:
      deploy_run_id:
        description: "Upstream deploy run id (from deploy-uapi artifact)"
        required: false
        default: ""
concurrency:
  group: tld-deploy-gate-${{ github.ref }}-${{ github.event.inputs.deploy_run_id }}
  cancel-in-progress: false

jobs:
  registry-check:
    name: Registry ↔ generated targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Provenance verification (fail-closed: blocks CI without signed receipt)"
        env:
          CI: true
          GITHUB_ACTIONS: true
          AF_CI_SIGNING_KEY: ${{ secrets.AF_CI_SIGNING_KEY }}
          AF_CI_SIGNING_PRINCIPAL: ci@agentic-flow.github
        run: |
          source scripts/gates/emit_ci_provenance.sh
          echo "AF_GATE_CONTEXT=ci" >> "$GITHUB_ENV"
          echo "AF_REQUIRE_SCORECARD=1" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Verify TLD targets match fqdn_registry.yaml
        run: python3 scripts/metrics/generate_tld_targets.py --check

      - name: Registry drift (enforce spec ⊆ registry)
        run: python3 scripts/metrics/tld_registry_drift.py
        env:
          AF_TLD_REGISTRY_ENFORCE: "1"

  strict-gate:
    name: Playwright strict TLD gate
    needs: registry-check
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run strict TLD deploy gate
        run: pnpm run test:e2e:tld-gate:strict
        env:
          CI: true
          TLD_GATE_STRICT_MANIFEST: "1"
          TLD_GATE_STRICT_DNS: "1"
          TLD_GATE_LENIENT: "0"
          TLD_GATE_LENIENT_INTERFACE: "1"
          LIVE_EDGE_TEST: "false"
          DEPLOY_RUN_ID: ${{ github.event.inputs.deploy_run_id }}
