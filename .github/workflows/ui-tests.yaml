name: UI Test Constraints (Playwright Matrices)
# WSJF-Cycle-68: Binding React API Endpoints against automated Chromium traces.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ui-playwright-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Reference Matrix
      uses: actions/checkout@v4

    - name: Configure Node v20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Bootstrap Dependency Arrays
      run: npm ci --force

    - name: Install Playwright & Chromium WebKit Boundaries
      run: npx playwright install --with-deps

    - name: Execute Playwright Matrix Extractor
      run: npx playwright test
      env:
        CI: true
        API_ENDPOINT: "https://api.interface.rooz.live"

    - name: Publish Test Ledgers Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-execution-ledgers
        path: playwright-report/
        retention-days: 7
