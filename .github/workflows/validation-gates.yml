name: Validation Gates - Strict Quality Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  syntax-validation:
    name: Bash Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate bash syntax
        run: |
          echo "🔍 Checking bash syntax across all .sh files..."
          SYNTAX_ERRORS=0
          
          find . -name "*.sh" -not -path "./archive.bak/*" | while read -r file; do
            echo "Checking: $file"
            if ! bash -n "$file"; then
              echo "❌ SYNTAX ERROR in $file"
              SYNTAX_ERRORS=$((SYNTAX_ERRORS + 1))
            fi
          done
          
          if [ $SYNTAX_ERRORS -gt 0 ]; then
            echo "❌ Found $SYNTAX_ERRORS syntax errors"
            exit 1
          fi
          
          echo "✅ All bash files pass syntax validation"

      - name: Check for stray || true patterns
        run: |
          echo "🔍 Checking for stray || true patterns..."
          STRAY_COUNT=$(find . -name "*.sh" -not -path "./archive.bak/*" -exec grep -l "^ || true$\|^|| true$" {} \; | wc -l)
          
          if [ $STRAY_COUNT -gt 0 ]; then
            echo "❌ Found $STRAY_COUNT files with stray || true patterns:"
            find . -name "*.sh" -not -path "./archive.bak/*" -exec grep -l "^ || true$\|^|| true$" {} \;
            exit 1
          fi
          
          echo "✅ No stray || true patterns found"

  coherence-validation:
    name: Architectural Coherence Gate (80% Threshold)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run coherence validation
        run: |
          echo "🔗 Running architectural coherence validation..."
          
          if [ ! -f "scripts/validators/validate_coherence.py" ]; then
            echo "⚠️  Coherence validator not found, skipping"
            exit 0
          fi
          
          # Run coherence validation with strict 80% threshold
          python3 scripts/validators/validate_coherence.py --all-layers --verbose
          
          echo "✅ Coherence validation passed"

  roam-staleness-check:
    name: ROAM Staleness Validation (96h Threshold)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check ROAM tracker staleness
        run: |
          echo "📅 Checking ROAM tracker staleness..."
          
          if [ ! -f "ROAM_TRACKER.yaml" ]; then
            echo "⚠️  ROAM_TRACKER.yaml not found, skipping"
            exit 0
          fi
          
          # Get last modified time of ROAM_TRACKER.yaml
          LAST_MODIFIED=$(stat -c %Y ROAM_TRACKER.yaml 2>/dev/null || echo "0")
          CURRENT_TIME=$(date +%s)
          AGE_HOURS=$(( (CURRENT_TIME - LAST_MODIFIED) / 3600 ))
          
          echo "ROAM tracker age: ${AGE_HOURS} hours"
          
          if [ $AGE_HOURS -gt 96 ]; then
            echo "❌ ROAM tracker is stale (${AGE_HOURS}h > 96h threshold)"
            echo "Legal compliance risk: 42 days to arbitration hearing"
            exit 1
          fi
          
          echo "✅ ROAM tracker is fresh (${AGE_HOURS}h < 96h)"

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [syntax-validation, coherence-validation, roam-staleness-check]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "🎯 Validation Gates Summary:"
          echo "  - Bash Syntax: ${{ needs.syntax-validation.result }}"
          echo "  - Coherence (80%): ${{ needs.coherence-validation.result }}"
          echo "  - ROAM Staleness: ${{ needs.roam-staleness-check.result }}"
          
          if [ "${{ needs.syntax-validation.result }}" != "success" ] || \
             [ "${{ needs.coherence-validation.result }}" != "success" ] || \
             [ "${{ needs.roam-staleness-check.result }}" != "success" ]; then
            echo "❌ One or more validation gates failed"
            exit 1
          fi
          
          echo "✅ All validation gates passed"
