stages:
  - execute_sovereignty
  - verify_mesh
  - deploy_to_swarm

variables:
  GITLAB_HOST: "git.tag.ooo"

# Fourth-Wave Agentic CI/CD Execution Gate
sovereignty_trust_path:
  stage: execute_sovereignty
  image: ubuntu:22.04
  script:
    - echo "--> 🦅 Authenticating glab CLI via OIDC..."
    - export GITLAB_TOKEN=$CI_JOB_JWT_V2 # Utilizing OIDC token masking
    - glab auth login -t $GITLAB_TOKEN -h $GITLAB_HOST
    - echo "✅ glab CLI authenticated successfully with OIDC payload."
    - echo "--> Executing gate-one-pass.sh..."
    - bash scripts/gate-one-pass.sh trust-path
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 day

verify_headless_sweep:
  stage: verify_mesh
  image: mcr.microsoft.com/playwright:v1.40.0-jammy
  script:
    - echo "--> ⚡ Executing Playwright LOW_YIELD_SOP Hooks..."
    - npm ci
    - npx playwright test tests/e2e/sovereign-external-mesh.spec.ts --reporter=list
    - npx playwright test tests/e2e/mesh-tag-ooo.spec.ts --reporter=list
  needs:
    - sovereignty_trust_path

deploy_to_stx_swarm:
  stage: deploy_to_swarm
  image: node:20
  script:
    - echo "--> 🚀 Deploying to STX Bare-Metal Host (yo.tag.ooo)..."
    - echo "Sovereignty Verified. Yield curve stabilized."
  only:
    - main
