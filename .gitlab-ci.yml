stages:
  - build
  - test
  - deploy_cpanel
  - package_native

variables:
  NODE_VERSION: "20.x"

build_core:
  image: node:$NODE_VERSION
  stage: build
  script:
    - cd swarm-core-app
    - npm ci
    - npm run build
    - npx cap sync
  artifacts:
    paths:
      - swarm-core-app/dist/
      - swarm-core-app/ios/
      - swarm-core-app/android/
    expire_in: 1 week

e2e_trust_gate:
  image: mcr.microsoft.com/playwright:v1.44.0-focal
  stage: test
  script:
    - cd swarm-core-app
    - npm ci
    - cd ..
    - npm ci
    - npx playwright test
  allow_failure: true

deploy_cpanel_production:
  image: alpine:latest
  stage: deploy_cpanel
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    - echo "$CPANEL_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $CPANEL_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "Executing pure artifact-sync to cPanel boundaries (bypassing node_modules bloat)"
    - scp -P ${CPANEL_PORT:-22} -r swarm-core-app/dist/* $CPANEL_USER@$CPANEL_HOST:/home/$CPANEL_USER/public_html/
  only:
    - main
    - master
