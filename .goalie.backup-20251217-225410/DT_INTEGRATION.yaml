name: "Decision Transformer Integration"
status: "NOW Phase Complete"
date: "2025-12-11"

overview: |
  Decision Transformer (DT) integration for learning sequence-based governance policies
  from historical pattern trajectories using offline reinforcement learning.

components:
  dataset_builder:
    file: "scripts/ml/build_dt_dataset.py"
    purpose: "Convert pattern_metrics.jsonl to DT-compatible trajectories"
    usage:
      stats: "python scripts/ml/build_dt_dataset.py --stats"
      generate: "python scripts/ml/build_dt_dataset.py --output .goalie/dt_trajectories.jsonl"
    
  model_trainer:
    file: "scripts/ml/train_dt.py"
    purpose: "Train Decision Transformer on historical trajectories"
    usage:
      train: "python scripts/ml/train_dt.py --epochs 10 --batch-size 4"
      eval: "python scripts/ml/train_dt.py --eval-only --checkpoint .goalie/dt_model.pt"

trajectory_format:
  observations:
    dimensions: 31
    components:
      - "pattern_type: 11 (one-hot)"
      - "circle: 6 (one-hot)"
      - "depth: 1 (normalized 0-1)"
      - "economic_context: 3 (COD, WSJF, risk)"
      - "pattern_features: 10"
  
  actions:
    type: "discrete"
    space_size: 5
    actions:
      - "no_action: observability, logging"
      - "throttle: adaptive-throttling, safe-degrade"
      - "enforce_budget: iteration-budget enforcement"
      - "rollback: safe-degrade, failure-strategy"
      - "autocommit: autocommit-shadow, cycle completion"
  
  rewards:
    formula: "-COD/1000 + WSJF_delta*0.5 - risk*0.1 + terminal_bonus(5.0)"
    components:
      - "immediate_cost: -COD (cost of delay penalty)"
      - "improvement: WSJF delta reward"
      - "risk_shaping: -0.1 * risk_score"
      - "terminal: +5.0 for full_cycle_complete"
  
  returns_to_go:
    method: "Discounted cumulative future rewards"
    discount_factor: 0.95

current_dataset:
  file: ".goalie/dt_trajectories.jsonl"
  statistics:
    trajectories: 1
    total_transitions: 7863
    state_dim: 31
    action_space: 5
    avg_length: 7863.0
    min_length: 7863
    max_length: 7863
    avg_return: 0.00
  
  action_distribution:
    throttle: "98.4%"
    no_action: "1.3%"
    autocommit: "0.2%"
    enforce_budget: "0.0%"
    rollback: "0.0%"
  
  notes: |
    High throttle percentage due to 7735 adaptive-throttling events from historical data.
    Future trajectories will have more balanced action distribution as prod-cycle generates
    diverse pattern events with economic context.

model_architecture:
  type: "Transformer Encoder"
  parameters:
    state_dim: 31
    action_dim: 5
    hidden_dim: 128
    num_heads: 4
    num_layers: 3
    max_seq_length: 100
    dropout: 0.1
  
  total_parameters: "~300,000"
  
  components:
    - "State encoder: Linear(31 → 128)"
    - "Action encoder: Embedding(5, 128)"
    - "Return encoder: Linear(1 → 128)"
    - "Timestep encoder: Embedding(100, 128)"
    - "Transformer: 3 layers, 4 heads, causal masking"
    - "Action head: MLP(128 → 128 → 5)"
  
  training:
    optimizer: "AdamW"
    learning_rate: 0.0001
    batch_size: 4
    context_window: 100
    loss: "Cross-entropy on action sequence"
    gradient_clipping: 1.0

roadmap:
  now_phase:
    status: "COMPLETE"
    tasks:
      - name: "Economic context integration"
        status: "✅ DONE"
        commit: "28d7b6b"
      - name: "DT dataset builder"
        status: "✅ DONE"
        file: "scripts/ml/build_dt_dataset.py"
      - name: "DT model trainer"
        status: "✅ DONE"
        file: "scripts/ml/train_dt.py"
      - name: "Trajectory format specification"
        status: "✅ DONE"
      - name: "Reward function design"
        status: "✅ DONE"
      - name: "Dataset generation"
        status: "✅ DONE"
        output: ".goalie/dt_trajectories.jsonl"
  
  next_phase:
    status: "PENDING"
    blockers:
      - "Python 3.14 incompatible with PyTorch"
      - "Need Python 3.11 or 3.12 environment"
    
    tasks:
      - name: "Setup Python 3.11/3.12 environment"
        priority: "HIGH"
        commands:
          - "python3.11 -m venv ml_env"
          - "source ml_env/bin/activate"
          - "pip install numpy torch"
      
      - name: "Train initial DT model"
        priority: "HIGH"
        target: "Action prediction accuracy >80%"
        command: "python scripts/ml/train_dt.py --epochs 10"
      
      - name: "Evaluate model performance"
        priority: "MEDIUM"
        command: "python scripts/ml/train_dt.py --eval-only"
      
      - name: "Build evaluation harness"
        priority: "MEDIUM"
        benchmarks:
          - "Resource allocation efficiency"
          - "Predictive error handling"
          - "Dependency management"
  
  later_phase:
    status: "PLANNED"
    tasks:
      - "Online fine-tuning with new trajectories"
      - "A/B testing: DT agent vs shell heuristics"
      - "Production deployment integration"
      - "Real-time inference API"
      - "Multi-trajectory training with diverse runs"

requirements:
  python: "3.11 or 3.12 (PyTorch not available for 3.14)"
  packages:
    - "numpy"
    - "torch>=2.0"
  
  current_environment:
    python_version: "3.14.0"
    pytorch_status: "Not compatible"
    numpy_status: "Installed"

references:
  - name: "Decision Transformer Paper"
    url: "https://arxiv.org/abs/2106.01345"
  - name: "kzl/decision-transformer"
    url: "https://github.com/kzl/decision-transformer"
  - name: "Awesome Decision Transformer"
    url: "https://github.com/opendilab/awesome-decision-transformer"

files:
  scripts:
    - "scripts/ml/build_dt_dataset.py"
    - "scripts/ml/train_dt.py"
    - "scripts/ml/dt_offline_training.py (legacy)"
  
  data:
    - ".goalie/dt_trajectories.jsonl"
    - ".goalie/pattern_metrics.jsonl (source)"
  
  models:
    - ".goalie/dt_model.pt (checkpoint, pending training)"

next_actions:
  immediate:
    - action: "Install Python 3.11 or 3.12"
      reason: "PyTorch incompatible with Python 3.14"
      priority: "CRITICAL"
    
    - action: "Create virtual environment"
      command: "python3.11 -m venv ml_env && source ml_env/bin/activate"
      priority: "CRITICAL"
    
    - action: "Install dependencies"
      command: "pip install numpy torch"
      priority: "CRITICAL"
  
  training:
    - action: "Run initial training"
      command: "python scripts/ml/train_dt.py --epochs 10"
      expected_duration: "10-30 minutes"
      priority: "HIGH"
    
    - action: "Evaluate model"
      command: "python scripts/ml/train_dt.py --eval-only"
      priority: "HIGH"
  
  validation:
    - action: "Test action prediction accuracy"
      target: ">80% on validation set"
      priority: "MEDIUM"
    
    - action: "Analyze action distribution predictions"
      priority: "MEDIUM"
    
    - action: "Compare DT predictions vs actual actions"
      priority: "MEDIUM"
