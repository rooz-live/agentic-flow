environment_setup:
  python_version: "3.11"
  virtual_env: "ml_env/"
  dependencies:
    - "numpy (installed)"
    - "torch (installed)"
    - "flask (for dashboard)"
  
  commands:
    create_venv: "python3.11 -m venv ml_env"
    activate: "source ml_env/bin/activate"
    train: "ml_env/bin/python scripts/ml/train_dt.py --epochs 10"
    dashboard: "python scripts/dashboard/pattern_dashboard.py --port 8080"

usage_examples:
  wsjf_context: |
    from wsjf_actionable_context import WSJFContext, ExecutionPhase
    
    context = WSJFContext("safe-degrade", "orchestrator")
    context.set_baseline(cod=1000, wsjf_score=500)
    
    context.advance_phase(ExecutionPhase.EXECUTE)
    context.log_execution_step("apply_throttle", cod=150, wsjf=75, risk=3.0)
    
    recommendations = context.get_actionable_recommendations()
    dashboard_data = context.get_dashboard_data()
  
  dt_training: |
    # Train model
    ml_env/bin/python scripts/ml/train_dt.py --epochs 10 --batch-size 4
    
    # Evaluate
    ml_env/bin/python scripts/ml/train_dt.py --eval-only
  
  dashboard: |
    # Start dashboard
    python scripts/dashboard/pattern_dashboard.py --port 8080
    
    # Visit in browser
    open http://localhost:8080

