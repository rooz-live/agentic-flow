    - name: "Refinement velocity targets"
      gap: "Same velocity expectations across all environments"
      recommendation: "Prod refinements should be slower/safer than dev experiments"
      
    - name: "Blast radius calculation"
      gap: "No environment multiplier in impact assessment"
      formula_current: "blast_radius = changes * complexity"
      formula_proposed: "blast_radius = changes * complexity * env_multiplier"
      
    - name: "Technical debt prioritization"
      gap: "Debt items not tagged with environment scope"
      impact: "Local dev tooling debt mixed with prod infrastructure debt"
  
  improvement_actions:
    - action_id: "REF-001"
      title: "Environment-specific velocity baselines"
      description: "Establish different velocity targets per environment"
      baselines:
        local: "Fast experimentation (10 commits/day ok)"
        dev: "Moderate velocity (5 commits/day)"
        stg: "Controlled velocity (2 commits/day, batched)"
        prod: "Slow and safe (1 deployment/day max, with gates)"
      wsjf_score: 8.5
      
    - action_id: "REF-002"
      title: "Environment-aware blast radius"
      files:
        - "scripts/agentic/wsjf_calculator.py"
        - "tools/federation/governance_agent.ts"
      formula: |
        env_multipliers = {
          'local': 1.0,
          'dev': 1.5,
          'stg': 2.5,
          'prod': 5.0
        }
        blast_radius = base_changes * complexity * env_multipliers[environment]
      wsjf_score: 12.0

