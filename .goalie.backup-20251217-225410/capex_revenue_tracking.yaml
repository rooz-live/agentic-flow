tracking:
  update_frequency: weekly
  validation_criteria:
  - metric: actual_revenue_vs_projected
    threshold: 0.7
    action: recalculate_attribution
  - metric: roi_months_elapsed
    threshold: 2.0
    action: investigate_blockers
  actual_revenue_tracking:
    enabled: true
    log_path: .goalie/actual_revenue_log.jsonl
    fields:
    - investment_name
    - revenue_stream_name
    - actual_monthly_value
    - timestamp
    - attribution_confidence
attribution:
  method: first_touch
  confidence_weighting: true
  multi_touch_fallback: true
  validation_rules:
  - revenue_stream_must_exist_in_actual_data
  - attribution_sum_per_stream_max_1.0
  - confidence_must_be_documented
reports:
  monthly_roi_dashboard:
    enabled: true
    format: json
    output_path: .goalie/reports/monthly_roi_YYYYMM.json
    includes:
    - investment_performance
    - revenue_attribution
    - roi_trends
    - recommendations
  quarterly_capex_review:
    enabled: true
    format: yaml
    output_path: .goalie/reports/quarterly_review_YYYYQQ.yaml
    includes:
    - portfolio_performance
    - underperforming_investments
    - high_roi_opportunities
    - capex_reallocation_suggestions
