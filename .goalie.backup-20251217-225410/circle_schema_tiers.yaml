# Adaptive Circle Backlog Schema - Prod Cycle 42
# Based on circle mandate and work type characteristics

tier1_flow_critical:
  circles: [orchestrator, assessor]
  mandate: "Direct impact on throughput, governance gates, deployment flow"
  schema:
    required: [id, task, status, budget, method_pattern, dor, dod, cod, size, wsjf]
    format: "table"
    columns:
      - id: "Unique identifier (ORG-NNN or ASR-NNN)"
      - task: "Work item description"
      - status: "TODO | IN_PROGRESS | BLOCKED | DONE"
      - budget: "Time/resource estimate (hours or story points)"
      - method_pattern: "TDD | Strangler Fig | Safe Degrade | etc."
      - dor: "Definition of Ready (entry criteria)"
      - dod: "Definition of Done (exit criteria)"
      - cod: "user_value + time_criticality + risk_reduction"
      - size: "Job size estimate (1-13 scale)"
      - wsjf: "CoD / Size (computed)"
    example: |
      | ID | Task | Status | Budget | Method | DoR | DoD | CoD | Size | WSJF |
      |---|---|---|---|---|---|---|---|---|---|
      | ORG-001 | Deploy safe-degrade wrapper | TODO | 8h | Safe Degrade | Tests pass, specs reviewed | Deployed, metrics captured | 714 | 3 | 238.0 |

tier2_learning_discovery:
  circles: [analyst, innovator, seeker]
  mandate: "Hypothesis-driven work, emergent CoD, lightweight iteration"
  schema:
    required: [id, task, status, dor_hypothesis, dod_result, wsjf]
    format: "table"
    columns:
      - id: "Unique identifier (ANL-NNN, INV-NNN, SEK-NNN)"
      - task: "Hypothesis or exploration goal"
      - status: "TODO | IN_PROGRESS | VALIDATED | INVALIDATED | DONE"
      - dor_hypothesis: "Baseline assumption or question to test"
      - dod_result: "Success metric or learning outcome"
      - wsjf: "Priority score (computed or advisory)"
    example: |
      | ID | Task | Status | DoR (Hypothesis) | DoD (Result) | WSJF |
      |---|---|---|---|---|---|
      | ANL-042 | Test observability coverage impact | TODO | Coverage <90% causes failures | Coverage ≥90% → <5% failures | 8.5 |

tier3_sensemaking_qualitative:
  circles: [intuitive, facilitator, scout, synthesizer]
  mandate: "Qualitative insights, contextual evaluation, relationship mapping"
  schema:
    required: [task_description, tags]
    format: "markdown_checklist"
    tags:
      - pattern: "Pattern identifier (e.g., #pattern:observability-first)"
      - wsjf: "Advisory priority (e.g., #wsjf:high, #wsjf:8.5)"
      - roam: "Risk status (e.g., #roam:Owned)"
      - circle: "Cross-circle dependency (e.g., #circle:orchestrator)"
    example: |
      - [ ] #pattern:sensemaking #wsjf:high #roam:Accepted Map dependencies between safe-degrade and guardrail-lock patterns across circles
      - [ ] #pattern:narrative #wsjf:6.2 #circle:orchestrator Synthesize retro insights into actionable refinements for PHASE-B

validation_questions:
  cod_applicability:
    question: "Does CoD make sense for all work types?"
    answer: |
      - Tier 1 (Flow): Yes - direct economic impact (deploy delays, incident costs)
      - Tier 2 (Learning): Emergent - start advisory, promote to Tier 1 if validated
      - Tier 3 (Sensemaking): No - qualitative value, use WSJF advisory tags
  
  method_pattern_scope:
    question: "Should Method Pattern be circle-specific?"
    answer: |
      Yes - each circle uses patterns aligned with mandate:
      - Orchestrator: TDD, Safe Degrade, Strangler Fig, Blue-Green
      - Assessor: 5-Whys, Fishbone, Timeline Analysis, Fault Injection
      - Analyst: Hypothesis-Driven, A/B Testing, Cohort Analysis
      - Innovator: Spike, Prototype, MVP, Build-Measure-Learn
      - Seeker: Discovery Interview, Jobs-to-be-Done, Wardley Mapping
      - Intuitive: Sensemaking Session, Pattern Mining, Story Synthesis
  
  cross_circle_dependencies:
    question: "How do we handle cross-circle dependencies?"
    answer: |
      - Tag with #circle:NAME in Tier 3 markdown
      - Link via ID in Tier 1/2 tables (e.g., "Depends on: ORG-042")
      - WSJF conflicts resolved via governance-agent economic gap analysis
      - Use pattern_metrics.jsonl to trace event chains across circles
  
  forensic_audit_trail:
    question: "What's the forensic audit trail?"
    answer: |
      - Link backlog ID → pattern_metrics.jsonl events via tags
      - Link backlog ID → cycle_log.jsonl via run_id and circle fields
      - Link backlog ID → insights_log.jsonl via action_id or pattern references
      - governance-agent emits topEconomicGaps → backlog item creation
      - retro-coach emits RCA → backlog refinement with rca_method tag

migration_path:
  step1: "Preserve Orchestrator's current full schema (already Tier 1 optimal)"
  step2: "Enhance Analyst/Assessor with WSJF column only (keep specialized DoR/DoD)"
  step3: "Convert Innovator/Seeker to Tier 2 schema (hypothesis-driven)"
  step4: "Keep Intuitive as Tier 3 with consistent tag conventions"
  step5: "Update replenish_circle.sh to support multi-tier routing logic"
  step6: "Add schema validation in af scripts (check required fields per tier)"
