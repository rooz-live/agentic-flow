    title: "Affiliate Tier Auto-Promotion Rules"
    status: needs_refinement
    questions:
      - What metrics trigger tier promotion?
      - What is the minimum activity threshold?
      - Should there be a cooldown period between promotions?
      - How do we handle tier demotion?
    proposed_acceptance_criteria:
      - Activity count threshold per tier
      - Affinity score minimum
      - Risk score maximum
      - Time-in-tier requirement
    estimated_effort_range: "8-16h"
    refinement_owner: "Product Owner"

  - id: REF-002
    title: "Risk Prediction Model Architecture"
    status: needs_refinement
    questions:
      - What ML framework to use (TensorFlow, PyTorch, scikit-learn)?
      - What features to include in the model?
      - How to handle model retraining?
      - What is the prediction horizon?
    proposed_acceptance_criteria:
      - Model accuracy > 80%
      - Prediction latency < 100ms
      - Weekly retraining schedule
      - Feature importance reporting
    estimated_effort_range: "12-24h"
    refinement_owner: "ML Engineer"

