board_title: "Agentic Flow Relentless Execution"
columns:
  - id: now
    title: "🟢 NOW (Active)"
    wip_limit: 5
    description: "Immediate validation, critical blockers, and active dev."
  - id: next
    title: "🔵 NEXT (Queued)"
    wip_limit: 10
    description: "Logical next steps, integration work."
  - id: later
    title: "🟡 LATER (Async/Backlog)"
    description: "Nice-to-haves, tech debt, long-term goals."
  - id: blocked
    title: "🔴 BLOCKED"
    description: "Items waiting on dependencies or ROAM risks."

filters:
  - name: "My Focus"
    query: "assignee:me"
  - name: "High WSJF"
    query: "wsjf > 5.0"
