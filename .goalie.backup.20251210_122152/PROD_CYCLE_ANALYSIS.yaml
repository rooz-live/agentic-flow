code_search_findings:
  file: scripts/code_search.py
  lines_of_code: 502
  complexity: MODERATE
  
  strengths:
    - Concurrent processing with ThreadPoolExecutor (4 workers)
    - Rate limiting with exponential backoff (RateLimiter class)
    - Process mapper optimizes file order by size
    - Timeout protection (_check_timeout)
    - Performance metrics tracking (SearchMetrics dataclass)
    - Skip directories properly (node_modules, .git, etc)
  
  issues_identified:
    issue_1_memory:
      severity: MEDIUM
      line_range: 269-327
      description: "File collection happens before processing - all file paths held in memory"
      impact: "For large repos (>10k files), memory spikes before processing starts"
      fix: "Use generator pattern instead of list accumulation"
      recommendation: |
        Replace:
          all_files = []
          for path in self._walk_with_depth(self.root_dir, max_depth):
              all_files.append(path)
        
        With generator:
          def _file_generator(self, max_depth):
              for path in self._walk_with_depth(self.root_dir, max_depth):
                  if path.suffix.lstrip('.') in file_types:
                      yield path
    
    issue_2_rate_limiter:
      severity: LOW
      line_range: 43-77
      description: "Rate limiter waits on EVERY file, even when no contention"
      impact: "Unnecessary delays in sequential processing mode"
      fix: "Only apply rate limiting in concurrent mode"
      recommendation: |
        Add condition in _search_file_batch (line 156):
          if self.enable_concurrency:
              self.rate_limiter.wait()
    
    issue_3_logging_config:
      severity: LOW
      line_range: 254-263
      description: "Logging configured inside search() method - can be called multiple times"
      impact: "Handler duplication on repeated calls"
      fix: "Move logging config to __init__ or use logging.basicConfig once"
      recommendation: "Use logging.basicConfig at module level or check if handlers exist"
    
    issue_4_metrics_reset:
      severity: MEDIUM
      line_range: 134
      description: "SearchMetrics instance never resets between search() calls"
      impact: "Metrics accumulate across searches if CodeSearch instance reused"
      fix: "Reset metrics at start of search() method"
      recommendation: |
        At line 236 (start of search()):
          self.metrics = SearchMetrics()
  
  performance_validation:
    max_workers: 4
    rate_limit_initial: 50.0
    rate_limit_max: 500.0
    timeout_default: 30s
