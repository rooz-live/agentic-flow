      - VisionFlow/scripts/log_monitor_dashboard.py
    
    javascript_dashboards:
      - scripts/monitoring/dashboard_server.js
      - dist/src/trading/ui/trading_dashboard.js
  
  common_memory_leak_patterns:
    pattern_1_event_listeners:
      description: "Event listeners not removed when components unmount"
      check_for: "addEventListener without removeEventListener"
      recommendation: |
        # Always clean up in componentWillUnmount / useEffect cleanup:
        useEffect(() => {
          const handler = () => { /*...*/ };
          window.addEventListener('resize', handler);
          return () => window.removeEventListener('resize', handler);
        }, []);
    
    pattern_2_intervals_timers:
      description: "setInterval/setTimeout not cleared"
      check_for: "setInterval without clearInterval"
      recommendation: |
        # Always store timer ID and clear:
        const timerId = setInterval(() => { /*...*/ }, 1000);
        return () => clearInterval(timerId);
    
    pattern_3_data_accumulation:
      description: "Unbounded arrays/objects growing over time"
      check_for: "array.push() in loops, no max size limit"
      recommendation: |
        # Use circular buffer or limit size:
        if (dataArray.length > MAX_SIZE) {
          dataArray.shift();  // Remove oldest
        }
        dataArray.push(newData);
    
    pattern_4_websocket_connections:
      description: "WebSocket connections not properly closed"
      check_for: "new WebSocket() without close() on unmount"
      recommendation: |
        # Close connection on cleanup:
        const ws = new WebSocket(url);
        return () => ws.close();
    
    pattern_5_plotly_memory:
      description: "Plotly charts not properly destroyed (common with rule 5d6JY7sHw9DsTeUtt2qRxn)"
      check_for: "Plotly.newPlot without Plotly.purge"
      recommendation: |
        # Purge plot before unmount:
        Plotly.newPlot('myDiv', data, layout);
        // On cleanup:
        Plotly.purge('myDiv');
  
  diagnostic_commands:
    check_python_memory: |
      # Use memory_profiler to profile dashboard scripts
      /usr/local/opt/python@3.13/bin/python3.13 -m memory_profiler scripts/af_dashboard.py
    
    check_node_memory: |
      # Use Node.js --inspect to profile
      node --inspect scripts/monitoring/dashboard_server.js
      # Then open chrome://inspect and take heap snapshots
    
    monitor_process_growth: |
      # Watch memory over time
      watch -n 5 'ps aux | grep dashboard | grep -v grep'

# ==============================================================================
# 5. PROCESS COORDINATION IMPROVEMENTS
# ==============================================================================
process_coordination_findings:
  issues:
    issue_1_concurrent_stress_tests:
      description: "Multiple concurrent stress tests without coordination"
      impact: "Resource contention, inconsistent results, system instability"
      recommendation: |
        # Use file-based locking:
        import fcntl
        
        lock_file = "/tmp/stress_test.lock"
        with open(lock_file, 'w') as f:
            try:
                fcntl.flock(f, fcntl.LOCK_EX | fcntl.LOCK_NB)
                # Run stress test
            except BlockingIOError:
                print("Another stress test is running")
                sys.exit(1)
    
    issue_2_process_count_volatility:
      description: "Process count fluctuates - suggests orphaned processes"
      diagnostic: |
        # Find orphaned child processes:
        ps -ef | awk '$3 == 1 && $8 ~ /python|node/ {print $0}'
      recommendation: |
        # Always use context managers or ensure cleanup:
        import atexit
        import signal
        
        def cleanup():
            # Kill child processes
            for proc in child_processes:
                proc.terminate()
        
        atexit.register(cleanup)
        signal.signal(signal.SIGTERM, lambda s, f: cleanup())
    
    issue_3_hook_coordination:
      description: "Notification hooks run without mutex/coordination"
      recommendation: |
        # Use Redis or file-based coordination:
        # Option 1: File-based
        import time
        from pathlib import Path
        
        lock = Path("/tmp/hook.lock")
        while lock.exists():
            time.sleep(0.1)  # Wait for other hook
        
        lock.touch()
        try:
            # Run hook logic
        finally:
            lock.unlink()
        
        # Option 2: Redis (if available)
        import redis
        r = redis.Redis()
        with r.lock('hook:notification', timeout=10):
            # Run hook logic

