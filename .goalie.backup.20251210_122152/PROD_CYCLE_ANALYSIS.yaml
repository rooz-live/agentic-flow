# 3. BETTER-SQLITE3 NOTIFICATION HOOK FAILURES
# ==============================================================================
sqlite_hook_analysis:
  context: "User reported better-sqlite3 module loading failures in notification hooks"
  
  hypothesis_1_native_module:
    description: "better-sqlite3 is native Node.js addon - requires rebuild on Mac M4"
    evidence:
      - User has Apple M4 Max (rule 91ssTIMCceRTLyX7uuooD5)
      - Native modules need architecture-specific compilation
      - Common issue: x86_64 vs arm64 mismatch
    validation_command: |
      cd /Users/shahroozbhopti/Documents/code/investing/agentic-flow
      npm list better-sqlite3
      file node_modules/better-sqlite3/build/Release/better_sqlite3.node
    expected_output: "Mach-O 64-bit dynamically linked shared library arm64"
    fix_if_wrong_arch: |
      npm rebuild better-sqlite3
      # Or force rebuild all native modules:
      npm rebuild
  
  hypothesis_2_hook_execution_context:
    description: "Notification hooks run in separate process/context without proper PATH"
    evidence:
      - Coordination failures in hook executions (per user context)
      - Process dependencies issues
    validation_command: |
      # Check if hooks are spawning child processes
      ps aux | grep node | grep -E "(hook|notification|better-sqlite)"
    fix: |
      # Ensure NODE_PATH is set in hook execution environment
      export NODE_PATH=/Users/shahroozbhopti/Documents/code/investing/agentic-flow/node_modules:$NODE_PATH
  
  hypothesis_3_concurrent_access:
    description: "Multiple hooks accessing SQLite database simultaneously without proper locking"
    evidence:
      - Better-sqlite3 supports WAL mode but needs configuration
      - Coordination failures suggest race conditions
    validation_command: |
      # Check if databases use WAL mode
      sqlite3 /path/to/db.sqlite "PRAGMA journal_mode;"
    expected_output: "wal"
    fix: |
      # Enable WAL mode for concurrent access:
      const db = require('better-sqlite3')('path.db');
      db.pragma('journal_mode = WAL');
      db.pragma('busy_timeout = 5000');
  
  recommended_investigation:
    step_1: "Check better-sqlite3 installation architecture"
    step_2: "Review notification hook code for module import patterns"
    step_3: "Test hook execution with explicit NODE_PATH"
    step_4: "Enable SQLite WAL mode if concurrent access needed"
  
  files_to_inspect:
    - "node_modules/better-sqlite3/package.json"
    - "scripts/*/notification*.js"
    - "scripts/*/hooks*.js"
    - ".husky/ (if using git hooks)"

