python3 << 'PYEOF'
import json
from pathlib import Path

goalie = Path(".goalie")
# Check for DT evaluation results
eval_summary = goalie / "dt_evaluation_summary.json"
if eval_summary.exists():
    with open(eval_summary) as f:
        data = json.load(f)
        print(f"Top-1 Accuracy: {data.get('avg_top1', 'N/A')}")
        print(f"Top-3 Accuracy: {data.get('avg_top3', 'N/A')}")
        print(f"Total Evals: {data.get('count', 'N/A')}")
else:
    # Check metrics_log for dt_evaluation events
    metrics_log = goalie / "metrics_log.jsonl"
    if metrics_log.exists():
        dt_evals = []
        with open(metrics_log) as f:
            for line in f:
                try:
                    d = json.loads(line)
                    if d.get("event") == "dt_evaluation":
                        m = d.get("metrics", {})
                        dt_evals.append((m.get("top1_accuracy", 0), m.get("top3_accuracy", 0)))
                except: pass
        if dt_evals:
            avg_top1 = sum(e[0] for e in dt_evals) / len(dt_evals)
            avg_top3 = sum(e[1] for e in dt_evals) / len(dt_evals)
            print(f"From metrics_log ({len(dt_evals)} evals):")
            print(f"  Top-1: {avg_top1:.1%}")
            print(f"  Top-3: {avg_top3:.1%}")
        else:
            print("No DT evaluation events found")
    else:
        print("No metrics_log.jsonl found")
PYEOF

