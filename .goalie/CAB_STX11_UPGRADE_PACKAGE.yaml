python3 << 'PYEOF'
import json
from collections import Counter
from pathlib import Path

goalie = Path(".goalie")
metrics_log = goalie / "metrics_log.jsonl"
if metrics_log.exists():
    events = Counter()
    with open(metrics_log) as f:
        for line in f:
            try:
                d = json.loads(line)
                events[d.get("event", "unknown")] += 1
            except: pass
    print(f"Total events: {sum(events.values())}")
    for event, count in events.most_common(10):
        print(f"  {event}: {count}")
else:
    print("No metrics_log.jsonl found")
    # Check for pattern_metrics.jsonl as alternative
    pm = goalie / "pattern_metrics.jsonl"
    if pm.exists():
        print(f"\nUsing pattern_metrics.jsonl: {sum(1 for _ in open(pm))} entries")
PYEOF

