# =============================================================================
# AFFECTED SYSTEMS AND SERVICES
# =============================================================================
affected_systems:
  primary:
    - system: app.interface.tag.ooo
      type: Web Application
      criticality: HIGH
      users_affected: 1000+
      peak_traffic_time: "14:00-20:00 UTC"
      
    - system: api.interface.tag.ooo
      type: REST API
      criticality: CRITICAL
      dependent_systems: 5
      requests_per_minute: 5000
      
  secondary:
    - system: StarlingX Deployment
      type: Infrastructure
      criticality: MEDIUM
      ip: 23.92.79.2
      
  unaffected:
    - Database servers
    - CDN/Edge caching
    - Email services
    - WordPress/Flarum (separate change)

# =============================================================================
# USER IMPACT ASSESSMENT
# =============================================================================
user_impact:
  during_rollout:
    expected_impact: MINIMAL
    user_experience:
      - "5% of users may experience slightly different response times"
      - "No visible UI changes expected"
      - "Session persistence maintained via cookie stickiness"
    
    risk_mitigation:
      - Progressive rollout limits blast radius
      - Automated rollback within 2 minutes
      - Real-time monitoring with 30-second granularity
    
  post_migration:
    expected_impact: POSITIVE
    improvements:
      - "10-15% faster response times (newer kernel)"
      - "Improved security posture"
      - "Better container performance"

  worst_case:
    scenario: "Full rollback required at 50% traffic"
    impact:
      - "Up to 50% of users experience brief disruption (< 2 min)"
      - "Possible session reset for canary users"
    probability: LOW
    recovery_time: "< 5 minutes"

# =============================================================================
# REVENUE IMPACT
# =============================================================================
revenue_impact:
  estimated_downtime_cost:
    per_minute: 50  # USD
    maintenance_window: 360  # 6 hours
    max_exposure: 18000  # USD
    
  rollback_scenarios:
    scenario_5_percent:
      users_affected: 50
      duration_minutes: 2
      revenue_impact: 100
      
    scenario_25_percent:
      users_affected: 250
      duration_minutes: 3
      revenue_impact: 450
      
    scenario_50_percent:
      users_affected: 500
      duration_minutes: 5
      revenue_impact: 1250

  expected_impact: "<0.1% of daily revenue"
  confidence: HIGH

