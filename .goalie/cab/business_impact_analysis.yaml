      Subject: Scheduled Maintenance - Ubuntu 22.04 Migration
      
      A canary deployment for Ubuntu 22.04 migration is scheduled for:
      Date: January 6, 2025
      Time: 06:00-12:00 UTC
      
      Expected Impact: Minimal to none
      
      For questions, contact: platform-team@interface.tag.ooo
      
  during_change:
    frequency: "Every 30 minutes during rollout"
    audience: [ops_team]
    channels: [slack, discord]
    
  post_change:
    timing: "Within 1 hour of completion"
    audience: [all_stakeholders]
    channels: [email, slack]
    
  incident:
    trigger: "Rollback initiated"
    audience: [all_affected_parties]
    channels: [pagerduty, slack, email]
