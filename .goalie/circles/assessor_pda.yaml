# =============================================================================
# SPARC-R5 INTEGRATION HOOKS (REP-007, REP-010)
# =============================================================================
sparc_integration:
  enabled: true
  primary_modes:
    - reviewer
    - tester
  r5_phases:
    - roam
    - review
  pda_extensions:
    plan:
      description: "Quality gate planning"
      actions:
        - "Define quality gates"
        - "Set risk thresholds"
        - "Map ROAM risk categories"
    do:
      description: "Validation and risk assessment"
      actions:
        - "Execute validation checks"
        - "Assess risk state"
        - "Run compliance tests"
    act:
      description: "Gate phase transitions"
      actions:
        - "Update ROAM tracker"
        - "Gate phase transitions based on quality"
        - "Escalate risks to orchestrator"
