# =============================================================================
# SPARC-R5 INTEGRATION HOOKS (REP-007, REP-010)
# =============================================================================
sparc_integration:
  enabled: true
  primary_modes:
    - architect
    - integration
  r5_phases:
    - review
    - refine
  pda_extensions:
    plan:
      description: "Planning phase with SPARC awareness"
      actions:
        - "Define SPARC phase sequence for current work item"
        - "Set token budget per phase based on environment tier"
        - "Identify cross-circle dependencies"
        - "Map dependencies to ROAM risk tracker"
      hooks:
        pre: "af sparc-coordinator --phase plan --memory-store"
        post: "af governance-agent --validate-plan --json"
    do:
      description: "Execution phase with bounded context"
      actions:
        - "Execute SPARC mode with environment-appropriate depth"
        - "Track phase completion metrics via pattern_metrics.jsonl"
        - "Coordinate agent handoffs using memory namespace"
        - "Enforce WIP limits per environment tier"
      hooks:
        pre: "npx claude-flow@alpha hooks pre-task --description 'Orchestrator execution'"
        post: "npx claude-flow@alpha hooks post-task --metrics"
    act:
      description: "Outcome validation and R5 integration"
      actions:
        - "Validate phase outputs against acceptance criteria"
        - "Trigger R5 phase updates (review/refine)"
        - "Store strategic memory events via hybrid_memory_consolidator"
        - "Update ROAM tracker with risk state changes"
      hooks:
        post: "af retro-coach --capture-learning --json"

environment_budgets:
  local:
    token_limit: 50000
    sparc_depth: shallow
    auto_advance: true
  development:
    token_limit: 100000
    sparc_depth: moderate
    auto_advance: true
  staging:
    token_limit: 150000
    sparc_depth: deep
    auto_advance: true
  production:
    token_limit: 200000
    sparc_depth: comprehensive
    auto_advance: false
    requires_approval: true
