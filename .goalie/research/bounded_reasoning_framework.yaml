r5_framework:
  review:
    trigger: Every prod-cycle completion
    outputs:
    - pattern_metrics.jsonl updates
    - observability gap detection
    - duration_ms coverage validation
    tools:
    - af governance-agent --json
    - af pattern-stats
  retro:
    trigger: Weekly or on failure
    outputs:
    - Root cause analysis
    - ROAM risk updates
    - Learning pattern consolidation
    tools:
    - af retro-coach --json
    - hybrid_memory_consolidator.ts
  replenish:
    trigger: Circle rotation or low queue
    outputs:
    - WSJF-prioritized backlog items
    - Circle-specific CoD thresholds
    - Economic gap analysis
    tools:
    - af suggest-actions
    - wsjf_calculator.py
  refine:
    trigger: Continuous during execution
    outputs:
    - Incremental improvements
    - Surprise-based memory updates
    - Pattern economics adjustment
    tools:
    - processGovernor.ts
    - retro_coach.ts
  roam:
    trigger: Risk state change or PI sync
    outputs:
    - ROAM_TRACKER.yaml updates
    - Risk score recalculation
    - Mitigation progress tracking
    tools:
    - pi_sync_risk_mitigation_refinement.py
    - risk_scores.db
