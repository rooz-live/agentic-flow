first_principles:
  core_axioms:
  - id: FP-1
    name: Bounded Context Window
    constraint: LLM context is finite (~200k tokens)
    implication: Must prioritize high-information memories
    solution: MIRAS surprise-based filtering (1.71x compression)
  - id: FP-2
    name: Operational vs Strategic Memory
    constraint: "Recent context \u2260 Long-term patterns"
    implication: Different memory systems for different needs
    solution: Hybrid AgentDB (operational) + MIRAS (strategic)
  - id: FP-3
    name: Environment-Specific Constraints
    constraint: local/dev/stg/prod have different risk tolerances
    implication: Reasoning depth must match environment
    solution: Tiered validation gates with ROAM integration
  - id: FP-4
    name: Surprise as Information
    constraint: Expected events carry less information
    implication: Prioritize unexpected/failure events for learning
    solution: MIRAS surprise_threshold=0.1, failures +0.5 boost
