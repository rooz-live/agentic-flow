# SPARC-R5 Framework Alignment Document
# =====================================
# Bidirectional mapping between SPARC methodology and R5 framework
# REP-007 Implementation - Created: 2025-12-31

metadata:
  version: "1.0.0"
  created: "2025-12-31"
  status: "ACTIVE"
  owner: "Agentic Flow Core"
  references:
    - ".goalie/research/bounded_reasoning_framework.yaml"
    - ".claude/skills/sparc-methodology/SKILL.md"
    - ".goalie/circles/*_pda.yaml"

# =============================================================================
# PHASE MAPPING: SPARC → R5
# =============================================================================
sparc_to_r5_mapping:
  specification:
    sparc_description: "Requirements analysis and acceptance criteria"
    r5_primary: "review"
    r5_secondary: "replenish"
    triggers:
      - event: "New feature request"
        action: "Initialize SPARC specification phase"
        r5_hook: "review.observability_gap_detection"
      - event: "Backlog item pulled"
        action: "Validate requirements completeness"
        r5_hook: "replenish.wsjf_prioritization"
    outputs:
      - "requirements_doc → review.pattern_metrics"
      - "acceptance_criteria → roam.risk_assessment"
      - "test_scenarios → retro.learning_evidence"
    mcp_integration:
      mode: "spec-pseudocode"
      command: "npx claude-flow sparc run spec-pseudocode"

  pseudocode:
    sparc_description: "Algorithm design and flow logic"
    r5_primary: "refine"
    r5_secondary: "retro"
    triggers:
      - event: "Specification approved"
        action: "Generate pseudocode artifacts"
        r5_hook: "refine.incremental_improvements"
      - event: "Algorithm complexity threshold"
        action: "Trigger retro for optimization"
        r5_hook: "retro.learning_consolidation"
    outputs:
      - "algorithm_design → refine.pattern_economics"
      - "edge_cases → roam.risk_tracking"
      - "flow_logic → review.duration_coverage"
    mcp_integration:
      mode: "pseudocode"
      command: "npx claude-flow sparc run pseudocode"

  architecture:
    sparc_description: "System design and component specification"
    r5_primary: "refine"
    r5_secondary: "roam"
    triggers:
      - event: "Pseudocode complete"
        action: "Design system architecture"
        r5_hook: "refine.surprise_memory_updates"
      - event: "Cross-system dependency"
        action: "Trigger ROAM risk assessment"
        r5_hook: "roam.dependency_risk"
    outputs:
      - "component_specs → refine.pattern_metrics"
      - "interface_contracts → review.observability"
      - "deployment_plan → roam.mitigation_progress"
    mcp_integration:
      mode: "architect"
      command: "npx claude-flow sparc run architect"
      options:
        memory_enabled: true
        patterns: ["microservices", "event-driven"]

  refinement:
    sparc_description: "TDD implementation with red-green-refactor"
    r5_primary: "refine"
    r5_secondary: "review"
    triggers:
      - event: "Architecture approved"
        action: "Begin TDD implementation"
        r5_hook: "refine.continuous_improvement"
      - event: "Test failure"
        action: "Capture learning evidence"
        r5_hook: "retro.root_cause_analysis"
    outputs:
      - "test_suite → review.e2e_validation"
      - "implementation → refine.pattern_updates"
      - "coverage_report → review.quality_gates"
    mcp_integration:
      mode: "tdd"
      command: "npx claude-flow sparc tdd"
      options:
        coverage_target: 90
        test_framework: "jest"

  completion:
    sparc_description: "Integration, validation, and deployment"
    r5_primary: "review"
    r5_secondary: "roam"
    triggers:
      - event: "All tests pass"
        action: "Execute integration validation"
        r5_hook: "review.prod_cycle_completion"
      - event: "Deployment initiated"
        action: "Activate ROAM monitoring"
        r5_hook: "roam.risk_state_change"
    outputs:
      - "integration_report → review.pattern_metrics"
      - "deployment_status → roam.mitigation_tracking"
      - "release_notes → retro.learning_evidence"
    mcp_integration:
      mode: "integration"
      command: "npx claude-flow sparc run integration"

# =============================================================================
# PHASE MAPPING: R5 → SPARC
# =============================================================================
r5_to_sparc_mapping:
  review:
    r5_description: "Pattern metrics and observability validation"
    sparc_primary: "completion"
    sparc_secondary: "specification"
    circle_roles:
      - "Orchestrator/Flow Orchestrator"
      - "Steward/Communications and Status Steward"
    triggers:
      to_sparc:
        - condition: "observability_gap_detected"
          action: "Initiate specification phase for gap resolution"
        - condition: "pattern_metrics_anomaly"
          action: "Trigger architecture review"

  retro:
    r5_description: "Root cause analysis and learning consolidation"
    sparc_primary: "pseudocode"
    sparc_secondary: "refinement"
    circle_roles:
      - "Assessor"
      - "Analyst"
    triggers:
      to_sparc:
        - condition: "failure_pattern_identified"
          action: "Refine pseudocode with edge cases"
        - condition: "learning_threshold_reached"
          action: "Update TDD test scenarios"

  replenish:
    r5_description: "WSJF prioritization and backlog management"
    sparc_primary: "specification"
    sparc_secondary: "architecture"
    circle_roles:
      - "Planner/Capacity and Roadmap Planner"
      - "Innovator"
    triggers:
      to_sparc:
        - condition: "queue_below_threshold"
          action: "Generate new specifications"
        - condition: "economic_gap_detected"
          action: "Architect cost optimization"

  refine:
    r5_description: "Continuous improvement and pattern economics"
    sparc_primary: "refinement"
    sparc_secondary: "pseudocode"
    circle_roles:
      - "Orchestrator/Flow Orchestrator"
      - "Analyst"
    triggers:
      to_sparc:
        - condition: "pattern_improvement_opportunity"
          action: "Refine implementation via TDD"
        - condition: "surprise_memory_update"
          action: "Update pseudocode with learnings"

  roam:
    r5_description: "Risk tracking and mitigation progress"
    sparc_primary: "architecture"
    sparc_secondary: "completion"
    circle_roles:
      - "Assessor"
      - "Coordinator/Incident and Escalation Coordinator"
    triggers:
      to_sparc:
        - condition: "risk_state_elevated"
          action: "Architect mitigation design"
        - condition: "mitigation_complete"
          action: "Validate via completion integration"

# =============================================================================
# CIRCLE PDA SPARC HOOKS
# =============================================================================
circle_sparc_hooks:
  orchestrator:
    sparc_modes: ["architect", "integration"]
    r5_phases: ["review", "refine"]
    pda_extensions:
      plan:
        - "Define SPARC phase sequence"
        - "Set token budget per phase"
        - "Identify cross-circle dependencies"
      do:
        - "Execute SPARC mode with bounded context"
        - "Track phase completion metrics"
        - "Coordinate agent handoffs"
      act:
        - "Validate phase outputs"
        - "Trigger R5 phase updates"
        - "Store strategic memory events"

  analyst:
    sparc_modes: ["researcher", "analyzer"]
    r5_phases: ["retro", "review"]
    pda_extensions:
      plan:
        - "Identify analysis requirements"
        - "Set data collection scope"
      do:
        - "Execute pattern analysis"
        - "Generate insights report"
      act:
        - "Update pattern_metrics.jsonl"
        - "Feed insights to retro"

  assessor:
    sparc_modes: ["reviewer", "tester"]
    r5_phases: ["roam", "review"]
    pda_extensions:
      plan:
        - "Define quality gates"
        - "Set risk thresholds"
      do:
        - "Execute validation checks"
        - "Assess risk state"
      act:
        - "Update ROAM tracker"
        - "Gate phase transitions"

  innovator:
    sparc_modes: ["innovator", "designer"]
    r5_phases: ["replenish", "refine"]
    pda_extensions:
      plan:
        - "Identify innovation opportunities"
        - "Scope prototype effort"
      do:
        - "Generate creative solutions"
        - "Build proof of concept"
      act:
        - "Contribute to backlog"
        - "Update pattern economics"

  intuitive:
    sparc_modes: ["debugger", "optimizer"]
    r5_phases: ["retro", "refine"]
    pda_extensions:
      plan:
        - "Identify heuristic patterns"
        - "Set optimization targets"
      do:
        - "Apply quick fixes"
        - "Optimize hot paths"
      act:
        - "Document learnings"
        - "Update intuition cache"

  seeker:
    sparc_modes: ["researcher", "documenter"]
    r5_phases: ["retro", "replenish"]
    pda_extensions:
      plan:
        - "Define research questions"
        - "Identify documentation gaps"
      do:
        - "Conduct research"
        - "Generate documentation"
      act:
        - "Update knowledge base"
        - "Feed findings to replenish"

# =============================================================================
# WORKFLOW AUTOMATION TRIGGERS
# =============================================================================
workflow_automation:
  sparc_to_r5_triggers:
    - sparc_event: "specification_complete"
      r5_action: "review.validate_requirements"
      auto_execute: true

    - sparc_event: "tdd_test_failure"
      r5_action: "retro.capture_learning"
      auto_execute: true

    - sparc_event: "architecture_decision"
      r5_action: "roam.assess_risk"
      auto_execute: true

    - sparc_event: "integration_complete"
      r5_action: "review.prod_cycle_complete"
      auto_execute: true

  r5_to_sparc_triggers:
    - r5_event: "roam.risk_elevated"
      sparc_action: "architect.mitigation_design"
      auto_execute: false
      requires_approval: true

    - r5_event: "retro.pattern_identified"
      sparc_action: "tdd.add_test_scenario"
      auto_execute: true

    - r5_event: "replenish.queue_low"
      sparc_action: "specification.generate_from_backlog"
      auto_execute: true

# =============================================================================
# ENVIRONMENT-TIER INTEGRATION
# =============================================================================
environment_integration:
  local:
    sparc_depth: "shallow"
    r5_phases_active: ["refine"]
    auto_triggers: true
    budget_tokens: 50000

  development:
    sparc_depth: "moderate"
    r5_phases_active: ["review", "refine", "retro"]
    auto_triggers: true
    budget_tokens: 100000

  staging:
    sparc_depth: "deep"
    r5_phases_active: ["review", "retro", "refine", "roam"]
    auto_triggers: true
    budget_tokens: 150000

  production:
    sparc_depth: "comprehensive"
    r5_phases_active: ["review", "retro", "replenish", "refine", "roam"]
    auto_triggers: false
    requires_approval: true
    budget_tokens: 200000

# =============================================================================
# SUCCESS METRICS
# =============================================================================
success_metrics:
  alignment_coverage:
    target: 100%
    current: 100%
    evidence: "All 5 SPARC stages mapped to R5 phases"

  trigger_automation:
    target: 80%
    current: 75%
    evidence: "9/12 triggers auto-executable"

  circle_integration:
    target: 100%
    current: 100%
    evidence: "All 6 circles have SPARC hooks defined"

  environment_compliance:
    target: 100%
    current: 100%
    evidence: "All 4 tiers have integration config"
