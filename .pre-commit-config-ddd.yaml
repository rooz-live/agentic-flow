# DDD Architecture Pre-Commit Hooks
# 
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      # ESLint DDD rules check
      - id: eslint-ddd
        name: ESLint DDD Architecture Rules
        entry: bash -c 'npx eslint --ext .ts --plugin @agentic-flow/ddd --rule "@agentic-flow/ddd/no-domain-infrastructure-imports: error" --rule "@agentic-flow/ddd/no-application-domain-mutation: error" src/'
        language: system
        types: [typescript]
        pass_filenames: false
        stages: [commit]
      
      # Architecture tests (layer boundaries)
      - id: architecture-tests
        name: DDD Architecture Boundary Tests
        entry: npm test -- tests/architecture/ddd-boundaries.test.ts --bail
        language: system
        types: [typescript]
        pass_filenames: false
        stages: [commit]
      
      # Check for repository interfaces in non-domain layers
      - id: repository-interface-location
        name: Repository Interfaces Must Be In Domain Layer
        entry: bash -c 'if grep -r "interface.*Repository" src/application src/infrastructure src/presentation 2>/dev/null; then echo "ERROR: Repository interfaces found outside domain layer"; exit 1; fi'
        language: system
        types: [typescript]
        pass_filenames: false
        stages: [commit]
      
      # Warn about anemic domain models
      - id: anemic-domain-check
        name: Check for Anemic Domain Models (warning)
        entry: bash -c 'echo "⚠️  Run architecture tests to check for anemic domain models"'
        language: system
        types: [typescript]
        pass_filenames: false
        stages: [commit]
        verbose: true

  # Standard TypeScript/JavaScript hooks
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.(ts|tsx)$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/parser@7.0.0'
          - '@typescript-eslint/eslint-plugin@7.0.0'

  # Format check
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(ts|tsx|json|md|yml|yaml)$
        types: [file]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-json
      - id: detect-private-key
