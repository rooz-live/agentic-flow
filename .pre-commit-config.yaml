# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: local
    hooks:
    -   id: annotation-audit
        name: Context Annotation Audit
        entry: bash scripts/validators/project/contract-enforcement-gate.sh audit
        language: system
        pass_filenames: false
        always_run: true
    -   id: shellcheck-and-eml-validate
        name: Shellcheck staged sh + BHOPTI validate-email on staged eml
        entry: bash scripts/hooks/pre-commit-staged-validation.sh
        language: system
        pass_filenames: false
        always_run: true
