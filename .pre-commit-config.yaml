# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: local
    hooks:
    -   id: semantic-date-alignment
        name: Semantic Date Alignment (validate-dates.sh)
        entry: bash scripts/validators/semantic/validate-dates.sh --file tests/fixtures/perfect-pass-dates.txt
        language: system
        pass_filenames: false
        always_run: true
    -   id: deep-foundation-evidence-audit
        name: Deep Foundation Evidence Audit (check-csqbm.sh)
        entry: bash scripts/validators/project/check-csqbm.sh --deep-why
        language: system
        pass_filenames: false
        always_run: true
    -   id: annotation-audit
        name: Context Annotation Audit
        entry: bash scripts/validators/project/contract-enforcement-gate.sh audit
        language: system
        pass_filenames: false
        always_run: true
    -   id: shellcheck-and-eml-validate
        name: Shellcheck staged sh + BHOPTI validate-email on staged eml
        entry: bash scripts/hooks/pre-commit-staged-validation.sh
        language: system
        pass_filenames: false
        always_run: true
