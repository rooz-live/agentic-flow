# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: local
    hooks:
    -   id: loop-artifact-guard
        name: Loop artifact guard (.goalie/, reports/ unless LOOP_ARTIFACT_OK=1)
        entry: bash scripts/hooks/pre-commit-loop-artifacts.sh
        language: system
        pass_filenames: false
        always_run: true
    -   id: semantic-date-alignment
        name: Semantic Date Alignment (run-commit-gates dates)
        entry: bash scripts/hooks/run-commit-gates.sh dates
        language: system
        pass_filenames: false
        always_run: true
    -   id: deep-foundation-evidence-audit
        name: Deep Foundation Evidence Audit (run-commit-gates csqbm)
        entry: bash scripts/hooks/run-commit-gates.sh csqbm
        language: system
        pass_filenames: false
        always_run: true
    -   id: annotation-audit
        name: Context Annotation Audit
        entry: bash scripts/hooks/run-commit-gates.sh audit
        language: system
        pass_filenames: false
        always_run: true
    -   id: typescript-boundary-enforcement
        name: Core Typescript Boundary Enforcement
        entry: bash scripts/hooks/run-commit-gates.sh ts
        language: system
        pass_filenames: false
        always_run: true
    -   id: execution-evidence-validate
        name: Execution Evidence Verification
        entry: bash scripts/hooks/run-commit-gates.sh claims
        language: system
        pass_filenames: false
        always_run: true
    -   id: shellcheck-and-eml-validate
        name: Shellcheck staged sh + BHOPTI validate-email on staged eml
        entry: bash scripts/hooks/pre-commit-staged-validation.sh
        language: system
        pass_filenames: false
        always_run: true
    -   id: originality-impact-scorecard
        name: Originality/Impact Scorecard Verification
        entry: bash -c 'AF_REQUIRE_SCORECARD=${AF_REQUIRE_SCORECARD:-1} python3 scripts/gates/scorecard_gate.py --verify --ingest-only --precommit'
        language: system
        pass_filenames: false
        always_run: true

