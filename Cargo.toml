[package]
name = "agentic-flow-rust"
version = "0.1.0"
edition = "2021"

[dependencies]
# RuVector core dependencies for high-performance vector operations
ruvector-core = { version = "0.1", optional = true }
ruvector-graph = { version = "0.1", optional = true }
ruvector-gnn = { version = "0.1", optional = true }

# Alternative: use published crates if available
# For now, we'll use git dependencies as backup
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ruvector-postgres = { version = "0.2.3", optional = true }
ruvector-sona = "0.1.4"
ruvector-scipix = "0.1.16"

[features]
default = []
ruvector = ["ruvector-core", "ruvector-graph", "ruvector-gnn"]
ruvector-core = ["dep:ruvector-core"]
ruvector-graph = ["dep:ruvector-graph"]
ruvector-gnn = ["dep:ruvector-gnn"]
postgres = ["dep:ruvector-postgres"]

[[bin]]
name = "agentic-demo"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
