    status: ACCEPTED
    category: CRITICAL
    description: >
      MAA filed eviction case (26CV007491-590) during active settlement
      negotiations on case 26CV005596-590. Pressure tactic — $363.39 claim
      vs. multi-thousand dollar habitability damages ($43K-$113K exposure).
      Dual claims (non-payment + holdover) are inconsistent. Filed 2/9/2026,
      lease ended 2/5/2026 — only 4 days "holdover". NC § 1D-15 punitive
      damages eligibility applies (systemic indifference).
    impact: HIGH
    probability: CERTAIN
    deadline: "2026-03-10"
    wsjf: 30.0
    owner: SB
    defenses:
      - "Habitability (N.C.G.S. § 42-42) — rent abatement for uninhabitable conditions"
      - "Retaliatory eviction (N.C.G.S. § 42-37.1) — filing during settlement talks"
      - "Set-off — damages exceed $363.39 claim"
      - "Related pending litigation — consolidation appropriate under NC Rule 42(a)"
      - "Inconsistent claims — can't claim both non-payment AND holdover"
      - "Breach by Plaintiff — failed to maintain habitable premises (40+ work orders)"
    mitigation_strategy: >
      File written Answer denying allegations by 2/24/2026.
      Assert affirmative defenses (habitability, retaliation).
      Motion to Consolidate with 26CV005596-590.
      Counterclaim for habitability damages.
      Use filing as evidence of retaliation during settlement talks.
