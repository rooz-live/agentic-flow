# ngrok Configuration File v3
# Location: ~/.ngrok2/ngrok.yml
# Documentation: https://ngrok.com/docs/agent/config/v3

# API key for ngrok authentication
# Get your token from: https://dashboard.ngrok.com/get-started/your-authtoken
# Then run: ngrok config add-authtoken <token>
api_key: ${NGROK_API_KEY}

# Server region (us, eu, au, ap, sa, jp, in)
region: us

# Web Inspection UI configuration
web_addr: localhost:4040

# Logging configuration
log: stdout
log_level: info

# Tunnel definitions
tunnels:
  # Dashboard tunnel - reserved domain (requires paid plan)
  dashboard:
    addr: 8080
    proto: http
    # Uncomment after upgrading to paid plan and reserving domain:
    # domain: interface-tag-vote.ngrok.io
    # For free tier, domain is auto-generated
    
  # API tunnel (if needed for additional services)
  api:
    addr: 3000
    proto: http
    # domain: api-interface-tag-vote.ngrok.io

# Version identifier (required for v3 config format)
version: 2
