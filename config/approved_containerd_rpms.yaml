# Approved containerd RPM URLs for manual installation
# 
# This file contains the whitelist of approved RPM URLs that can be used
# for manual containerd 1.7.x installation when not available in repositories.
#
# IMPORTANT: As of December 2025, containerd 1.7.x RPMs are NOT available
# from official sources for EL8/AlmaLinux 8. The latest available is 1.6.32.
#
# Current Situation:
# - Docker CE repositories only have up to containerd 1.6.32
# - Containerd GitHub releases do not provide EL8 RPMs
# - Manual RPM installation would require third-party builds (high drift risk)
#
approved_urls:
  # NOTE: No containerd 1.7.x RPMs currently available for EL8
  # The following are placeholders for when/if they become available
  # - "https://github.com/containerd/containerd/releases/download/v1.7.30/containerd-1.7.30-1.el8.x86_64.rpm"
  
  # Alternative: Consider building from source or using different OS
  # - Build from source: https://github.com/containerd/containerd/blob/main/BUILDING.md
  
# Recommendations:
# 1. Wait for containerd 1.7.x to appear in Docker CE repositories
# 2. Consider upgrading to a newer OS with containerd 1.7.x packages
# 3. Build from source if absolutely necessary (highest drift risk)
