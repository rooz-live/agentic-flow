# Automated Rituals Configuration
# Defines automated rituals for enforcing philosophical adherence

rituals:
  - name: "pre_commit_manthra_validation"
    trigger: "pre-commit"
    description: "Run Manthra three-dimensional validation before commit"
    actions:
      - "run_manthra_validation"
      - "run_yasna_validation"
      - "run_mithra_validation"
      - "check_iteration_budget"
    enforcement:
      mode: "block"
      override_required: true
      override_command: "git commit --no-verify"
    
  - name: "merge_time_coherence_check"
    trigger: "merge_request"
    description: "Run comprehensive coherence check before merge"
    actions:
      - "run_comprehensive_manthra_validation"
      - "verify_three_way_alignment"
      - "check_ritual_adherence"
      - "validate_iteration_budget_status"
    enforcement:
      mode: "block"
      override_required: true
      override_command: "git merge --no-verify"
    
  - name: "daily_iteration_budget_review"
    trigger: "scheduled"
    schedule: "0 9 * * *"  # 9 AM daily
    description: "Review iteration budget status daily"
    actions:
      - "check_budget_consumption"
      - "analyze_efficiency_trends"
      - "generate_budget_report"
    enforcement:
      mode: "report"
      alert_on_warning: true
      alert_on_critical: true
    
  - name: "weekly_knowledge_sync"
    trigger: "scheduled"
    schedule: "0 10 * * 1"  # 10 AM Monday
    description: "Sync knowledge across all redundancy layers weekly"
    actions:
      - "sync_institutional_cloud"
      - "sync_personal_documentation"
      - "sync_physical_offline"
      - "validate_cross_system_consistency"
    enforcement:
      mode: "report"
      alert_on_failure: true
    
  - name: "intention_statement_validation"
    trigger: "pre_commit"
    description: "Validate intention statements for Manthra compliance"
    actions:
      - "check_measurable_criteria"
      - "validate_word_count"
      - "verify_action_verbs"
    enforcement:
      mode: "block"
      override_required: true
      override_command: "git commit --no-verify"
    
  - name: "documentation_completeness_check"
    trigger: "pre_commit"
    description: "Ensure documentation meets completeness standards"
    actions:
      - "check_code_examples"
      - "validate_word_count"
      - "verify_clarity_score"
    enforcement:
      mode: "block"
      override_required: true
      override_command: "git commit --no-verify"
    
  - name: "implementation_quality_check"
    trigger: "pre_commit"
    description: "Verify implementation meets quality standards"
    actions:
      - "check_test_coverage"
      - "verify_documentation_comments"
      - "analyze_code_complexity"
    enforcement:
      mode: "block"
      override_required: true
      override_command: "git commit --no-verify"
    
  - name: "cross_system_validation"
    trigger: "scheduled"
    schedule: "0 14 * * *"  # 2 PM daily
    description: "Validate consistency across all knowledge systems"
    actions:
      - "compare_gitlab_leantime"
      - "compare_leantime_plane"
      - "compare_plane_gitlab"
      - "report_inconsistencies"
    enforcement:
      mode: "report"
      alert_on_inconsistency: true
    
  - name: "ritual_adherence_report"
    trigger: "scheduled"
    schedule: "0 17 * * 5"  # 5 PM Friday
    description: "Generate weekly ritual adherence report"
    actions:
      - "calculate_adherence_score"
      - "identify_violations"
      - "generate_improvement_suggestions"
    enforcement:
      mode: "report"
      send_summary: true
