# 4-Tier Environment Configuration for Canary Releases
# Integrates with bounded reasoning framework (REP-009)
# Version: 1.0.0

metadata:
  version: "1.0.0"
  created: "2025-12-31"
  framework: "Bounded Reasoning + Canary Release"
  owner: orchestrator_circle

# =============================================================================
# ENVIRONMENT TIER DEFINITIONS
# =============================================================================
tiers:
  local:
    token_budget: 50000
    risk_tolerance: high
    autocommit_policy: aggressive
    
    canary_config:
      enabled: false
      min_compliance_score: 80
      traffic_stages: [100]  # Direct deployment
      monitoring_interval_sec: 60
      rollback_threshold:
        error_rate: 0.10       # 10% - more lenient
        latency_p99_ms: 1000   # 1 second
    
    validation_gates:
      - syntax_check
      - type_check
    
    spiritual_alignment:
      manthra_weight: 0.7
      yasna_weight: 0.9
      mithra_weight: 0.8

  development:
    token_budget: 100000
    risk_tolerance: medium
    autocommit_policy: moderate
    
    canary_config:
      enabled: true
      min_compliance_score: 85
      traffic_stages: [25, 50, 100]
      monitoring_interval_sec: 300  # 5 minutes
      rollback_threshold:
        error_rate: 0.05           # 5%
        latency_p99_ms: 750
    
    validation_gates:
      - syntax_check
      - type_check
      - unit_tests
    
    spiritual_alignment:
      manthra_weight: 0.8
      yasna_weight: 0.95
      mithra_weight: 0.9

  staging:
    token_budget: 150000
    risk_tolerance: low
    autocommit_policy: conservative
    
    canary_config:
      enabled: true
      min_compliance_score: 90
      traffic_stages: [5, 10, 25, 50, 100]
      monitoring_interval_sec: 600  # 10 minutes
      rollback_threshold:
        error_rate: 0.02           # 2%
        latency_p99_ms: 600
      
      # Staging-specific checks
      pre_promotion_checks:
        - compliance_scan
        - performance_baseline
        - security_scan
    
    validation_gates:
      - syntax_check
      - type_check
      - unit_tests
      - integration_tests
    
    spiritual_alignment:
      manthra_weight: 0.85
      yasna_weight: 1.0
      mithra_weight: 0.95

  production:
    token_budget: 200000
    risk_tolerance: minimal
    autocommit_policy: manual_approval
    
    canary_config:
      enabled: true
      min_compliance_score: 95
      traffic_stages: [5, 10, 25, 50, 100]
      monitoring_interval_sec: 600  # 10 minutes
      consecutive_success_required: 3
      rollback_threshold:
        error_rate: 0.01           # 1%
        latency_p99_ms: 500
        business_metric_delta: 0.05  # 5%
      
      # Production-specific controls
      approval_required: true
      cab_change_id_required: true
      maintenance_window_required: true
      
      pre_promotion_checks:
        - compliance_scan
        - performance_baseline
        - security_scan
        - business_metrics_validation
        - cab_approval_verified
    
    validation_gates:
      - syntax_check
      - type_check
      - unit_tests
      - integration_tests
      - security_scan
      - performance_check
    
    spiritual_alignment:
      manthra_weight: 0.9
      yasna_weight: 1.0
      mithra_weight: 1.0

# =============================================================================
# CANARY PROMOTION MATRIX
# =============================================================================
promotion_matrix:
  local_to_development:
    required_compliance: 80
    required_test_pass_rate: 0.90
    approval: none
    
  development_to_staging:
    required_compliance: 85
    required_test_pass_rate: 0.95
    approval: tech_lead
    
  staging_to_production:
    required_compliance: 95
    required_test_pass_rate: 0.99
    approval: cab_change_request
    change_window: true

# =============================================================================
# ROLLBACK PRIORITY BY TIER
# =============================================================================
rollback_priority:
  production:
    priority: P1
    response_sla_minutes: 5
    automatic: true
    notification: [pagerduty, slack, discord]
    
  staging:
    priority: P2
    response_sla_minutes: 15
    automatic: true
    notification: [slack]
    
  development:
    priority: P3
    response_sla_minutes: 60
    automatic: false
    notification: [email]
    
  local:
    priority: P4
    response_sla_minutes: null
    automatic: false
    notification: []

# =============================================================================
# INTEGRATION WITH BOUNDED REASONING
# =============================================================================
bounded_reasoning_integration:
  context_switches_limit:
    local: 10
    development: 5
    staging: 3
    production: 0  # No context switches in prod canary
  
  batch_size:
    local: 50
    development: 25
    staging: 15
    production: 5
  
  circuit_breaker_threshold: 0.90  # 90% budget consumed
  
  pattern_metrics:
    emit_canary_events: true
    track_alignment_score: true
    goalie_integration: true

