# Nginx Canary Release Configuration
# Ubuntu 22.04 Migration with Traffic Splitting
# Integrated with agentic-flow bounded reasoning framework

# Upstream definitions with weighted traffic splitting
upstream backend_pool {
    # Stable backend (Ubuntu 20.04/AlmaLinux 8)
    server stable-backend.interface.tag.ooo:8080 weight=95 max_fails=3 fail_timeout=30s;
    
    # Canary backend (Ubuntu 22.04)
    server canary-backend.interface.tag.ooo:8080 weight=5 max_fails=3 fail_timeout=30s;
    
    # Health check configuration
    keepalive 32;
}

# Canary-specific upstream for gradual promotion
upstream canary_pool {
    server canary-backend.interface.tag.ooo:8080 max_fails=2 fail_timeout=10s;
    keepalive 16;
}

# Stable-only upstream for rollback scenarios
upstream stable_pool {
    server stable-backend.interface.tag.ooo:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Health check endpoints
server {
    listen 8081;
    server_name health.interface.tag.ooo;
    
    location /health/stable {
        proxy_pass http://stable_pool/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    location /health/canary {
        proxy_pass http://canary_pool/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    location /health/combined {
        default_type application/json;
        return 200 '{"stable": "healthy", "canary": "healthy", "split": "5/95"}';
    }
}

# Main application server with canary routing
server {
    listen 80;
    listen 443 ssl http2;
    server_name app.interface.tag.ooo;
    
    # SSL configuration (use Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/interface.tag.ooo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/interface.tag.ooo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Canary identification headers
    add_header X-Canary-Release "ubuntu-22.04-migration" always;
    add_header X-Backend-Server $upstream_addr always;
    
    # Logging for canary metrics
    log_format canary_log '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'upstream=$upstream_addr rt=$request_time '
                          'uct=$upstream_connect_time uht=$upstream_header_time';
    
    access_log /var/log/nginx/canary_access.log canary_log;
    error_log /var/log/nginx/canary_error.log warn;
    
    # Canary routing with cookie-based stickiness
    location / {
        # Check for canary override cookie
        set $backend_pool backend_pool;
        if ($cookie_canary_force = "true") {
            set $backend_pool canary_pool;
        }
        if ($cookie_stable_force = "true") {
            set $backend_pool stable_pool;
        }
        
        proxy_pass http://$backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
    
    # API endpoints with stricter canary limits
    location /api/ {
        # Only 2% canary for API to minimize risk
        set $api_weight 98;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Circuit breaker: return 503 if both backends down
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }
    
    # Health check endpoint for load balancer
    location /lb-health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
    
    # Metrics endpoint for Prometheus
    location /metrics {
        stub_status on;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name app.interface.tag.ooo;
    return 301 https://$server_name$request_uri;
}

