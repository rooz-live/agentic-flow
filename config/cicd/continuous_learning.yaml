# CI/CD Continuous Learning Swarm Configuration
version: "1.0"
pipeline: "continuous-learning-swarm"
enabled: true

paths:
  agentdb: "~/.agentdb/agentdb_learning.db"
  vectors: "~/vectors.db"
  mcp_server: "projects/investing/agentic-flow/frontend/src/integrations/cognitum_mcp_server.ts"

thresholds:
  freshness_days: 7
  confidence_min: 0.85

verification:
  ssr_port: 3001
  cog_ref: "2rbzTT"
  mcp:
    required_tools:
      - "cognitum_referral_link"
      - "cognitum_record_click"
      - "cognitum_record_sale"
      - "cognitum_commission_status"
