schema_version: "1.0.0"
flags:
  knob_auto_adjust:
    default: true
    rollout_stage: prod
    rollback_forbidden: true
    description: Per-cycle CLS knob auto-adjustment (FA/SA modes)
  cycle_unsigned_overlay_ci:
    default: false
    rollout_stage: stg
    rollback_forbidden: true
    description: Allow unsigned cycle_knobs.json overlay only in CI
  openspec_validate:
    default: false
    rollout_stage: dev
    rollback_forbidden: true
    description: Run OpenSpec validate in cicd/openspec_check.sh
  earnings_receipt_chain:
    default: true
    rollout_stage: prod
    rollback_forbidden: true
    description: Run receipt_chain.sh after tick (earnings verify → export → hire)
  deploy_happy_path:
    default: true
    rollout_stage: stg
    rollback_forbidden: true
    description: deploy_happy_path.sh orchestrator (confirm-gated UAPI)
  ceremony_in_tick:
    default: true
    rollout_stage: prod
    rollback_forbidden: true
    description: Run ceremony_tick.sh between max-ROI cycles in tick_post_hooks
  prod_maturity_strict_tld:
    default: false
    rollout_stage: dev
    rollback_forbidden: true
    description: billing-deploy sets TLD_GATE_PROD_MATURITY=1; lenient skips are BLOCK not green

  ruflo_memory_graph:
    default: true
    rollout_stage: stg
    rollback_forbidden: true
    description: HNSW + learningBridge + memoryGraph in .claude-flow/config.yaml
  ruflo_intel_pipeline:
    default: true
    rollout_stage: stg
    rollback_forbidden: true
    description: Run intel_pipeline_post_task after receipt_chain PASS
  ruflo_slow_ci_harness:
    default: true
    rollout_stage: stg
    rollback_forbidden: true
    description: Slow CI runs redblue/impeccable CLI smoke + ruflo doctor evidence
