schema_version: "1.1.0"
# Primary cloud provider for GLM 5.2 challenger / standard AQE tier (not OpenRouter).
provider: zai

provider_config:
  zai:
    base_url: https://api.z.ai/api/paas/v4
    # Coding-plan subscribers may override:
    # export ZAI_API_BASE=https://api.z.ai/api/coding/paas/v4
    api_key_env: ZAI_API_KEY
    openai_compat:
      api_key_env: OPENAI_API_KEY
      base_url_env: OPENAI_API_BASE

compare_ref: https://openrouter.ai/compare/z-ai/glm-5.2/google/gemma-4-31b-it

echo_storage_path: .goalie/evidence/llm_echo/

env_keys:
  ZAI_API_KEY:
    sources:
      - env: ZAI_API_KEY
      - op: op://Personal/Z.ai/Devin
      - op: op://Personal/Z.ai/API Key/credential
      - op: op://Personal/Z.ai/credential
      - op: op://Agentic-Flow/Z.ai/credential

tiers:
  free:
    provider: echo
    model_id: qwen3-30b-a3b-q4-k-m
    description: Local Echo — zero API cost scoped AQE
    aqe_env:
      AQE_MODEL: qwen3-30b-a3b-q4-k-m
      AQE_FREE_TIER_MODEL: qwen3-30b-a3b-q4-k-m
      OPENAI_API_BASE: http://127.0.0.1:11434/v1
  standard:
    provider: zai
    model_id: glm-5.2
    description: Z.ai direct GLM 5.2 — challenger / quality assess
    aqe_env:
      AQE_MODEL: glm-5.2
      AQE_CHALLENGER_MODEL: glm-5.2
      AQE_FREE_TIER_MODEL: qwen3-30b-a3b-q4-k-m
