version: 1.0.0
repo_root: ~/Documents/code
mode: dynamic
max_minutes_per_tick: 20
termination_requires:
- perceive_exit_0
- compliance_exit_lte_2
- staged_diff_non_empty
wsjf_now_items:
- id: P1-LOOP-AUTO-01
  prompt: 'Auto-merge loop branch when hard gates only pass: wire CI provenance + scorecard
    --verify + receipt_chain enforce=1; no DNS/SPOF work. Document in DEFINITIONS.md.
    One bounded commit.'
- id: P1-CICD-01
  prompt: 'Expand upstream harness scope in upstream_runner.py: add downstream result
    classification (harness_family + http_status_class), 4xx/5xx retry policy, and
    throughput metric (deliveries_per_hour). Emit via upstream_reporter.py CICD receipt.
    Add tests in tests/gates/test_upstream_engine.sh. One bounded commit.'
- id: P1-EDGE-01
  prompt: 'Unify edge gateway sync evidence with CICD receipt store: edge_reporter.py
    writes a standard receipt; fetch_run_report.py can query it by context=edge. Add
    tests in tests/gates/test_edge_gateway_sync.sh. One bounded commit.'
- id: P1-TRUST-01
  prompt: 'Harden scorecard artifact binding (R-CLS-03): make --precommit --ingest-only
    scorecard SHIP without AF_GATE_CONTEXT=review/AF_RD_ENFORCE=0 hacks when signed
    coherence artifact matches HEAD. Add tests in tests/gates/test_scorecard_gate.py.
    One bounded commit.'
- id: P1-ADB-01
  prompt: 'Run agentdb_freshness and compliance --cog --scope=governance until exit
    0 or documented warn.

    Write docs/research/bit_P1-ADB-01.md with artifact paths.

    '
- id: NNEAR-01
  prompt: 'Implement artifact-only perceive read (no curl) in dod-gate --perceive
    output doc.

    One ADR paragraph in docs/research/bit_NNEAR-01.md.

    '
- id: CVT-004
  prompt: 'Reduce phase1 backlog blockers listed in latest compliance_cog_governance
    artifact.

    One failing test or gate fix per tick.

    '
ceremony_cadence:
  standup_perceive: each_tick
  review: per_staged_slice
  retro_replenish: weekly
  wsjf_refine: after_retro
  roam_risks: daily_via_cls
  pi_prep: monthly
loop_sentinel: AGENT_LOOP_TICK_CLS
wake_sentinel: AGENT_LOOP_WAKE_CLS
budget:
  max_remediate_retries: 2
  max_index_paths_per_tick: 25
  auto_commit: false
  stop_on_roam_critical:
  - R01
  - R04
  session:
    min_ticks: 1
    sweet_spot_ticks: 3
    max_ticks_before_reset: 5
    max_ticks_per_session: 7
    summarize_after_tick: 3
  program:
    pi_slice_ticks: 8
    max_ticks_before_ceremony: 12
    horizon_cap_ticks: 72
  rehydration:
    breakthrough_id: BT-9
    schema: cls.rehydration.v1
    writer: scripts/cicd/write_tick_rehydration_manifest.sh
    reader: scripts/cicd/session_rehydration_reader.sh
    host_reset_url: ''
    host_reset_enabled: false
quality_vectors:
- perceive_exit_0
- compliance_exit_lte_2
- staged_diff_non_empty
- coherence_exit_0
- trust_path_exit_0
- scorecard_not_block
- aqe_quality_pass
- aqe_coverage_pass
- wave_autopilot_exit_0
knob_auto_adjust:
  modes:
  - SA
  - FA
  overlay_path: .goalie/cron_state/cycle_knobs.json
  session_stamp_path: .goalie/cron_state/cycle_knobs.session
  bounds:
    sweet_spot_ticks:
    - 2
    - 5
    max_ticks_per_session:
    - 3
    - 9
    max_minutes_per_tick:
    - 20
    - 60
    max_remediate_retries:
    - 1
    - 4
  proposal_path: .goalie/cron_state/cycle_proposal.json
  cycle_dispatch: ./scripts/one.sh cycle [FA|SA]
timer:
  interval_minutes: 10
  duration_hours: 4
  default_idle_task: ceremony
  ceremony_in_idle: true
  iterate_after_tick: true
  engine: scripts/cicd/loop_timer_engine.sh
  dispatch: ./scripts/cicd/loop_timer_engine.sh
wsjf_done_items:
- id: P1-INDEX-01
  status: done
  completed: '2026-06-28'
  prompt: 'Surgical index batch (max 40 files) under scripts/ and code/tooling/scripts/
    only.

    Update docs/billing/CONSOLIDATION_INVENTORY.md with paths indexed.

    Run dod-gate --perceive. Stage only; no commit unless perceive=0 and compliance=0.

    '
  note: Surgical index batch complete; promoted P1-INDEX-02 to shippable now.
- id: P1-INDEX-02
  status: done
  completed: '2026-06-28'
  prompt: Bounded substrate index (INDEX_SLICE_MAX<=25) via index_slice_substrate.sh.
    WSJF pathspec order; never blocks perceive (substrate_total advisory). Stage only;
    commit when autopilot perceive=0. Update manifest at .goalie/evidence/learning/index_substrate_manifest.json.
  note: Substrate index slice staged via index_slice_substrate.sh; manifest at .goalie/evidence/learning/index_substrate_manifest.json
- id: P1-CICD-01
  status: done
  completed: '2026-06-29'
  prompt: 'Expand upstream harness scope in upstream_runner.py: add downstream result
    classification (harness_family + http_status_class), 4xx/5xx retry policy, and
    throughput metric (deliveries_per_hour). Emit via upstream_reporter.py CICD receipt.
    Add tests in tests/gates/test_upstream_engine.sh. One bounded commit.'
  note: 'harness_family, http_status_class, retry policy, and throughput committed; tests 26/26 pass'
wsjf_backlog_items:
- id: P1-OPENSPEC-01
  prompt: 'OpenSpec sweep: npx @fission-ai/openspec status + align specs to HEAD.'
  status: deferred
- id: P1-IMPECCABLE-01
  prompt: "npx impeccable update \u2014 refresh impeccable CLI/tooling pin."
  status: deferred
- id: P1-REDBLUE-01
  prompt: '@metaharness/redblue + weight-eft harness integration.'
  status: deferred
- id: P1-HUMANLAYER-01
  prompt: HumanLayer cask install + MCP bridge smoke.
  status: deferred
- id: P1-HIRE-01
  prompt: hire.agentics.org profile sync (HIRE_SYNC_EARNINGS).
  status: deferred
- id: P1-MOBILE-01
  prompt: Native pipeline (Detox/fastlane); links R-MOBILE-01 accepted risk.
  status: deferred
  roam_link: R-MOBILE-01
