# Circle Batching Strategy Configuration
# =======================================
# Priority matrix-based batch grouping for circle-based task orchestration
# Based on RCA analysis (2025-12-30) showing circle distribution:
#   - testing: 2,702 events, avg 1,428ms
#   - orchestrator: 412 events, avg 1,951ms (highest latency)
#   - innovator: 1,068 events, avg 1,502ms
#   - analyst/assessor/seeker/intuitive: 200-300 events each

version: "1.0.0"
created: "2025-12-30"
source: "RCA analysis from pattern_metrics.jsonl and evidence.jsonl"

# Batch group definitions
# Each group shares memory namespace and has coordinated execution settings
circle_batch_groups:
  # Group 1: Coordination & Governance (Sequential, Low Concurrency)
  # These circles make decisions that affect other circles - must be sequential
  coordination:
    circles: ["orchestrator", "assessor"]
    batch_size: 2
    concurrency: 1  # Sequential execution - decisions affect others
    timeout_multiplier: 1.5  # Allow more time for complex decisions
    memory_namespace: "aqe/coordination/*"
    priority: 1  # Highest priority - runs first
    characteristics:
      decision_frequency: "daily"
      risk_tolerance: "low"
      collaboration_style: "leading"

  # Group 2: Analysis & Insights (Parallel, Medium Concurrency)
  # Data processing and pattern recognition can run in parallel
  analysis:
    circles: ["analyst", "innovator"]
    batch_size: 5
    concurrency: 3  # Moderate parallelism
    timeout_multiplier: 1.2
    memory_namespace: "aqe/analysis/*"
    priority: 2
    characteristics:
      decision_frequency: "weekly"
      risk_tolerance: "medium"
      collaboration_style: "collaborative"

  # Group 3: Exploration & Discovery (Parallel, High Concurrency)
  # Discovery activities are independent and can scale
  exploration:
    circles: ["seeker", "intuitive"]
    batch_size: 10
    concurrency: 5  # High parallelism
    timeout_multiplier: 1.0
    memory_namespace: "aqe/exploration/*"
    priority: 3
    characteristics:
      decision_frequency: "weekly"
      risk_tolerance: "high"
      collaboration_style: "independent"

  # Group 4: Testing & Validation (Parallel, Max Concurrency)
  # Testing activities can be highly parallelized
  testing:
    circles: ["testing", "workflow"]
    batch_size: 20
    concurrency: 8  # Maximum parallelism
    timeout_multiplier: 0.8  # Faster timeout for quick feedback
    memory_namespace: "aqe/testing/*"
    priority: 4  # Lowest priority - runs after decisions made
    characteristics:
      decision_frequency: "daily"
      risk_tolerance: "medium"
      collaboration_style: "parallel"

# Dynamic batch sizing based on system load
load_balancing:
  enabled: true
  algorithm: "adaptive"
  factors:
    system_load_weight: 0.5
    complexity_weight: 0.3
    historical_success_weight: 0.2
  complexity_factors:
    orchestrator: 0.6  # Complex coordination
    assessor: 0.7      # Risk analysis
    analyst: 0.8       # Data processing
    innovator: 0.9     # Creative work
    seeker: 1.0        # Discovery
    intuitive: 1.0     # User focus
    testing: 1.2       # High throughput

# Stability thresholds per tier (aligned with evidence_config.json)
tier_stability_thresholds:
  coordination:
    min_stability_score: 70  # Higher bar for decision-making circles
    max_cv: 0.15
  analysis:
    min_stability_score: 65
    max_cv: 0.20
  exploration:
    min_stability_score: 60
    max_cv: 0.25
  testing:
    min_stability_score: 55  # Lower bar for high-volume testing
    max_cv: 0.30

# Agent affinity mapping for circle-aware routing
agent_affinity:
  orchestrator: ["coordinator", "planner", "system-architect"]
  analyst: ["researcher", "code-analyzer", "perf-analyzer"]
  assessor: ["reviewer", "security-manager", "production-validator"]
  innovator: ["coder", "refactoring-specialist", "api-designer"]
  intuitive: ["ux-specialist", "accessibility-tester", "user-advocate"]
  seeker: ["researcher", "market-analyst", "opportunity-finder"]
  testing: ["tester", "qe-test-generator", "regression-analyzer"]

# Memory namespace structure for cross-circle coordination
memory_namespaces:
  root: "aqe"
  structure:
    - coordination/decisions/*
    - coordination/governance/*
    - analysis/patterns/*
    - analysis/metrics/*
    - exploration/opportunities/*
    - exploration/insights/*
    - testing/coverage/*
    - testing/results/*
    - stability/learnings/*
    - stability/variance/*
    - graduation/status/*
    - graduation/history/*

# Environment variables to export for child processes
environment_exports:
  - AF_CIRCLE
  - AF_BATCH_GROUP
  - AF_STABILITY_SCORE
  - AF_GRADUATION_STATUS
  - AF_MEMORY_NAMESPACE
  - AF_CONCURRENCY_LIMIT

