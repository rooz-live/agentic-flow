# Compiler Matrix - Adaptive Toolchain
# Deconstructs: One-size-fits-all compiler monolith
# 
# ROAM: R6 MITIGATED - Per-language optimization
# WSJF: LATER - Compiler optimization
# Invert thinking: Use right tool for each job, not one tool for all

version: "1.0.0"

# ═══════════════════════════════════════════════════════════════════════════
# Toolchain Definitions
# ═══════════════════════════════════════════════════════════════════════════

toolchains:
  typescript:
    description: "TypeScript compilation with environment-specific optimizers"
    
    environments:
      dev:
        compiler: swc
        command: "npx swc src -d dist --source-maps"
        # Fast compilation, no type checking
        incremental: true
        parallel: true
        cache: ".swc-cache"
        
      test:
        compiler: ts-node
        command: "npx ts-node --transpile-only"
        # JIT execution for tests
        register: tsconfig-paths/register
        
      prod:
        compiler: tsc
        command: "npx tsc --noEmitOnError --strict"
        # Full type checking + optimization
        incremental: true
        declaration: true
        sourceMap: false
        
      lint:
        compiler: eslint
        command: "npx eslint src --ext .ts,.tsx"
        parallel: true
        cache: ".eslintcache"
        
    optimization_levels:
      quick: swc
      standard: tsc --skipLibCheck
      strict: tsc --strict --noImplicitAny

  rust:
    description: "Rust compilation with cargo"
    
    environments:
      dev:
        compiler: cargo
        command: "cargo check"
        # Fast syntax/type checking
        incremental: true
        
      test:
        compiler: cargo
        command: "cargo test"
        parallel: true
        
      prod:
        compiler: cargo
        command: "cargo build --release"
        # Full optimization
        lto: true
        opt-level: 3
        
      lint:
        compiler: clippy
        command: "cargo clippy --all-targets --all-features"

  python:
    description: "Python with modern tooling"
    
    environments:
      dev:
        compiler: ruff
        command: "ruff check src"
        # Fast linting (Rust-based)
        fix: true
        
      test:
        compiler: pytest
        command: "pytest -xvs"
        parallel: true
        coverage: true
        
      typecheck:
        compiler: mypy
        command: "mypy src --strict"
        incremental: true
        cache: ".mypy_cache"
        
      prod:
        compiler: compileall
        command: "python -m compileall src -b"
        # Bytecode compilation
        optimize: 2

# ═══════════════════════════════════════════════════════════════════════════
# Build Pipeline Definitions
# ═══════════════════════════════════════════════════════════════════════════

pipelines:
  vector-search:
    description: "Build pipeline for vector search module"
    
    stages:
      - name: lint
        toolchains: [typescript.lint]
        parallel: true
        fail_fast: true
        
      - name: typecheck
        toolchains: [typescript.prod]
        dependencies: [lint]
        
      - name: test
        toolchains: [typescript.test]
        dependencies: [typecheck]
        command: "npx playwright test tests/vector-lean.e2e.spec.ts"
        
      - name: build
        toolchains: [typescript.prod]
        dependencies: [test]
        artifacts:
          - "dist/"
          - "types/"

  email-bridge:
    description: "Build pipeline for email integration"
    
    stages:
      - name: lint
        toolchains: [typescript.lint]
        
      - name: test
        toolchains: [typescript.test]
        command: "npx ts-node src/integrations/email-bridge.ts --dry-run"
        
      - name: build
        toolchains: [typescript.prod]

  revenue-platform:
    description: "Build pipeline for HostBill/Oro/Stripe integration"
    
    stages:
      - name: lint
        toolchains: [typescript.lint, python.lint]
        parallel: true
        
      - name: typecheck
        toolchains: [typescript.prod, python.typecheck]
        parallel: true
        
      - name: integration-test
        toolchains: [typescript.test]
        command: "npx playwright test tests/integration/"
        env:
          STRIPE_TEST_KEY: "${STRIPE_TEST_KEY}"
          
      - name: build
        toolchains: [typescript.prod]

# ═══════════════════════════════════════════════════════════════════════════
# Cross-Compilation Matrix
# ═══════════════════════════════════════════════════════════════════════════

cross_compile:
  targets:
    - platform: macos-x64
      rust_target: x86_64-apple-darwin
      
    - platform: macos-arm64
      rust_target: aarch64-apple-darwin
      
    - platform: linux-x64
      rust_target: x86_64-unknown-linux-gnu
      
    - platform: linux-arm64
      rust_target: aarch64-unknown-linux-gnu

  workflows:
    vector-search-wasm:
      source: rust/crates/vector-search
      target: wasm32-unknown-unknown
      output: pkg/
      
    embedding-native:
      source: rust/crates/embeddings
      targets: [macos-arm64, linux-x64]
      output: bin/

# ═══════════════════════════════════════════════════════════════════════════
# Performance Optimization
# ═══════════════════════════════════════════════════════════════════════════

performance:
  # Cache strategies per toolchain
  cache:
    typescript:
      strategy: persistent
      location: .tscache
      max_size: 1GB
      
    rust:
      strategy: sccache
      location: ${SCCACHE_DIR}
      
    python:
      strategy: local
      location: __pycache__

  # Parallelization
  parallel:
    max_workers: 8
    strategy: per-file  # vs per-module
    
  # Incremental builds
  incremental:
    enabled: true
    diff_algorithm: git
    
# ═══════════════════════════════════════════════════════════════════════════
# Anti-Fragile: Fallback Chains
# ═══════════════════════════════════════════════════════════════════════════

fallbacks:
  # If primary compiler fails, try alternatives
  typescript:
    - swc
    - tsc --skipLibCheck
    - tsc --noEmitOnError  # Last resort
    
  rust:
    - cargo check
    - rustc --crate-type lib  # Direct compilation
    
  python:
    - ruff
    - flake8  # Slower but more thorough
    - pylint  # Last resort

# ═══════════════════════════════════════════════════════════════════════════
# Integration with CI/CD
# ═══════════════════════════════════════════════════════════════════════════

ci_integration:
  github_actions:
    matrix:
      os: [ubuntu-latest, macos-latest]
      node: [18, 20, 22]
      toolchain: [typescript]
      
    caching:
      - ~/.npm
      - ~/.cargo
      - .tscache
      - __pycache__
      
    parallel_jobs: 8
    
  gitlab_ci:
    stages:
      - lint
      - typecheck
      - test
      - build
      
    cache:
      key: ${CI_COMMIT_REF_SLUG}
      paths:
        - node_modules/
        - target/
        - .tscache/
