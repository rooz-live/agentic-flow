# Domain Routing Configuration
# Multi-tenant accessible dashboards preferred over local IP dashboards
# Phase 1: Domain Routing & Deployment

version: "1.0"
updated: "2025-12-11"

# Infrastructure Endpoints
infrastructure:
  stx_aio_0:
    ip: "23.92.79.2"
    hostname: "stx-aio-0.corp.interface.tag.ooo"
    type: "starlingx"
    region: "edge-primary"
    services:
      - horizon
      - keystone
      - nova
      - neutron
      - cinder
    dashboard_url: "https://stx-aio-0.corp.interface.tag.ooo/dashboard"
    
  aws_primary:
    ip: "54.241.233.105"
    instance_id: "i-097706d9355b9f1b2"
    type: "aws-ec2"
    region: "us-west-1"
    services:
      - goalie-api
      - metrics-collector
      - webhook-receiver
    dashboard_url: "https://aws.interface.tag.ooo/dashboard"

# Multi-Tenant Domain Routing
tenants:
  default:
    domain: "app.interface.tag.ooo"
    features: ["wsjf", "kanban", "metrics"]
    
  enterprise:
    domain: "enterprise.interface.tag.ooo"
    features: ["wsjf", "kanban", "metrics", "governance", "risk-analytics"]
    
  affiliate:
    domain: "affiliate.interface.tag.ooo"
    features: ["affiliate-tracking", "commission-calc", "partner-portal"]
    integrations:
      - symfony_oro
      - hostbill

# Platform Integration Domains (Accessible URLs preferred)
platforms:
  # Analytics & Decision Making
  analytics:
    domain: "analytics.interface.tag.ooo"
    provider: "tag.vote"
    wsjf_enabled: true
    
  decision_call:
    domain: "decisioncall.com"
    api_base: "https://api.decisioncall.com/v1"
    features: ["voting", "consensus", "governance"]
    
  half_massive:
    domain: "half.masslessmassive.com"
    type: "analytics-dashboard"
    
  multi_massive:
    domain: "multi.masslessmassive.com"
    type: "multi-tenant-dashboard"

  # Infrastructure Dashboards
  openstack_horizon:
    domain: "horizon.openstack.interface.tag.ooo"
    backend: "stx_aio_0"
    auth: "keystone"
    
  starlingx_dashboard:
    domain: "starlingx.interface.tag.ooo"
    backend: "stx_aio_0"
    features: ["device-provisioning", "edge-compute", "container-orchestration"]

  # Commerce & Affiliate
  oro_commerce:
    domain: "commerce.interface.tag.ooo"
    backend: "symfony_oro"
    features: ["b2b-ecommerce", "crm", "affiliate-tracking"]
    
  hostbill:
    domain: "billing.interface.tag.ooo"
    api_base: "https://api.hostbillapp.com/v1"
    features: ["invoicing", "provisioning", "automation"]

  # Community & Content
  wordpress:
    domain: "blog.interface.tag.ooo"
    type: "cms"
    features: ["content-management", "seo", "plugins"]
    
  flarum:
    domain: "forum.interface.tag.ooo"
    type: "forum"
    features: ["discussions", "moderation", "extensions"]

  # Financial Services Integration
  tradingview:
    domain: "charts.interface.tag.ooo"
    api_base: "https://api.tradingview.com"
    features: ["charting", "alerts", "screener"]
    
  finviz:
    api_base: "https://finviz.com/api"
    features: ["screener", "maps", "news"]
    
  interactive_brokers:
    api_base: "https://localhost:5000"  # TWS Gateway
    features: ["trading", "portfolio", "market-data"]
    auth: "oauth2"

# AI Reasoning Integration (Phase 2)
ai_services:
  vibe_thinker:
    model: "WeiboAI/VibeThinker-1.5B"
    huggingface_url: "https://huggingface.co/WeiboAI/VibeThinker-1.5B"
    paper: "https://arxiv.org/pdf/2511.06221"
    features: ["diversity-sampling", "pass-at-k", "reasoning"]
    
  harbor:
    framework_url: "https://harborframework.com/"
    features: ["agent-orchestration", "tool-use", "memory"]
    
  prime_intellect:
    github: "https://github.com/PrimeIntellect-ai/"
    blog: "https://www.primeintellect.ai/blog/environments"
    features: ["distributed-training", "decentralized-compute"]
    
  goose:
    install: "brew install block-goose-cli"
    configure: "goose configure"
    features: ["code-generation", "task-automation"]

# Testing Methodology (Phase 2)
testing:
  sft_spectrum_phase:
    description: "Maximize diversity across potential correct answers"
    objective: "Improve Pass@K score"
    output: "Wide range of plausible solution paths"
    
  rl_signal_phase:
    description: "MaxEnt-Guided Policy Optimization (MGPO)"
    objective: "Identify and amplify most correct paths"
    weighting: "entropy-based"
    focus: "Problems where model is most uncertain"

# UI/UX Integration (Phase 3)
ui_frameworks:
  heroui:
    url: "https://heroui.chat/"
    type: "component-library"
    
  reactflow:
    npm: "npm i reactflow"
    docs: "https://reactflow.dev/api-reference"
    features: ["node-graphs", "workflow-visualization", "drag-drop"]
    
  v0_dev:
    url: "https://v0.app/docs/design-mode"
    zed_integration: "https://v0.app/docs/zed"
    features: ["ai-design", "component-generation"]
    
  bolt_new:
    url: "https://bolt.new/gallery/all"
    troubleshooting: "https://support.bolt.new/troubleshooting/integrations-issues"
    features: ["rapid-prototyping", "deployment"]
    
  lovable:
    url: "https://lovable.dev/guides"
    features: ["ai-app-builder", "figma-integration"]

# Budget & Replenishment (Temporal)
budget:
  capex:
    allocation: "infrastructure"
    replenishment_cycle: "quarterly"
    
  opex:
    allocation: "operations"
    replenishment_cycle: "monthly"
    
  method_pattern_availability:
    high_priority: ["TDD", "BDD", "WSJF"]
    medium_priority: ["Spike", "POC", "Research"]
    low_priority: ["Documentation", "Cleanup"]

# GitHub Integration
github:
  organization: "rooz-live"
  pat_location: "~/.config/gh/hosts.yml"
  cli: "gh"
  
  poc_branches:
    lionagi_qe_fleet:
      repo: "proffesor-for-testing/lionagi-qe-fleet"
      issues: ["#7"]
      prs: ["#8", "#10"]
      releases: ["v1.2.0"]
      
    agentic_qe:
      repo: "proffesor-for-testing/agentic-qe"
      prs: ["#127"]

# Monitoring & Metrics
monitoring:
  pattern_metrics:
    file: ".goalie/pattern_metrics.jsonl"
    retention_days: 90
    
  donor_advised_funding:
    tracking: true
    metrics: ["cod", "wsjf", "throughput"]
    
  rank_options:
    by_wsjf: true
    by_cod: true
    by_value_weighted_throughput: true
