stripe:
  test_mode_webhook_url: ${STRIPE_WEBHOOK_URL}
  live_mode_webhook_url: https://billing.bhopti.com/webhooks/stripe
  signature_header: Stripe-Signature
  rejection_status_codes:
  - 400
  - 403
  notes: 'Tampered or missing Stripe-Signature must return 400 or 403. Must NOT return
    500 (crash = security boundary violation).

    '
validation:
  require_server_header: true
  max_response_status: 399
  tls_required: true
  live_edge_test_env_var: LIVE_EDGE_TEST
  batch_size_env_var: MAX_DOMAINS_PER_BATCH
  default_batch_size: 3
  notes: 'Tests skip (not fail) when LIVE_EDGE_TEST is absent. Skipped ≠ Failed ≠
    Theater. Set LIVE_EDGE_TEST=true only in CI with confirmed DNS delegation.

    '
pi_plan:
  iteration_1:
    goal: DNS delegation confirmed for all 5 FQDNs
    gate: 'migration_status: delegated for all entries above'
  iteration_2:
    goal: TLS + WAF active on billing.bhopti.com + crm.bhopti.com
    gate: 'waf_enabled: true; TLS regression spec green'
  iteration_3:
    goal: Stripe live-mode webhook wired to billing.bhopti.com/webhooks/stripe
    gate: assertStripeWebhookBoundary green against live URL
  iteration_4:
    goal: HostBill → Oro → Stripe full purchase flow E2E verified
    gate: tests/integration/hostbill-stripe-boundary.e2e.spec.ts green
