# WordPress CMS Platform Deployment
# Target VM: wordpress (10.20.0.21)
# SLA: 99.9% availability, <200ms P95 response time
version: '3.8'

services:
  wordpress:
    image: wordpress:6.4-php8.2-apache
    container_name: wordpress-app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - WORDPRESS_DB_HOST=wordpress-mysql
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${WP_DB_PASSWORD:-WPSecure123!}
      - WORDPRESS_TABLE_PREFIX=wp_
      - WORDPRESS_CONFIG_EXTRA=|
          define('WP_REDIS_HOST', 'wordpress-redis');
          define('WP_CACHE', true);
          define('DISALLOW_FILE_EDIT', true);
          define('WP_AUTO_UPDATE_CORE', true);
    volumes:
      - wp_data:/var/www/html
      - wp_uploads:/var/www/html/wp-content/uploads
      - ./wp-config:/var/www/html/wp-config-extra:ro
    networks:
      - wordpress-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-admin/install.php"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    labels:
      - "com.stx.platform=wordpress"
      - "com.stx.role=cms"
      - "traefik.enable=true"
      - "traefik.http.routers.wordpress.rule=Host(`www.interface.tag.ooo`)"

  wordpress-mysql:
    image: mysql:8.0
    container_name: wordpress-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-RootSecure123!}
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=${WP_DB_PASSWORD:-WPSecure123!}
    volumes:
      - wp_mysql_data:/var/lib/mysql
    networks:
      - wordpress-net
    command: --default-authentication-plugin=mysql_native_password

  wordpress-redis:
    image: redis:7-alpine
    container_name: wordpress-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - wp_redis_data:/data
    networks:
      - wordpress-net

  # Nginx reverse proxy with caching
  wordpress-nginx:
    image: nginx:alpine
    container_name: wordpress-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/wordpress.conf:/etc/nginx/conf.d/default.conf:ro
      - wp_cache:/var/cache/nginx
    networks:
      - wordpress-net
    depends_on:
      - wordpress

  # WP-CLI for maintenance tasks
  wordpress-cli:
    image: wordpress:cli
    container_name: wordpress-cli
    volumes:
      - wp_data:/var/www/html
    networks:
      - wordpress-net
    entrypoint: ["tail", "-f", "/dev/null"]

networks:
  wordpress-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  wp_data:
  wp_uploads:
  wp_mysql_data:
  wp_redis_data:
  wp_cache:

