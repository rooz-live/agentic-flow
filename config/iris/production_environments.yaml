# Production Environments Configuration for IRIS Integration
#
# This configuration defines the production environments monitored by IRIS
# and their priority levels for incident classification.

environments:
  # Infrastructure
  infrastructure:
    - name: starlingx_openstack
      description: StarlingX OpenStack cloud infrastructure
      priority: critical
      components:
        - compute
        - network
        - storage
        - orchestration

    - name: hostbill
      description: HostBill billing and customer management
      priority: urgent
      components:
        - billing
        - invoicing
        - customer_portal
        - api

    - name: loki
      description: Loki log aggregation environments
      priority: urgent
      components:
        - ingestion
        - storage
        - query
        - alerting

  # CMS Interfaces
  cms_interfaces:
    - name: symfony
      description: Symfony web application framework
      priority: important
      components:
        - web_server
        - database
        - cache
        - messaging

    - name: oro
      description: OroCRM customer relationship management
      priority: important
      components:
        - crm
        - sales
        - marketing
        - api

    - name: wordpress
      description: WordPress content management system
      priority: important
      components:
        - core
        - themes
        - plugins
        - database

    - name: flarum
      description: Flarum forum software
      priority: important
      components:
        - forum
        - extensions
        - database
        - cache

  # Communication Stack
  communication_stack:
    - name: telnyx
      description: Telnyx voice and messaging
      priority: critical
      components:
        - voice
        - messaging
        - sip
        - api

    - name: plivo
      description: Plivo cloud communications
      priority: critical
      components:
        - voice
        - sms
        - mms
        - api

    - name: sms
      description: SMS gateway services
      priority: urgent
      components:
        - gateway
        - delivery
        - routing
        - reporting

    - name: ivr
      description: Interactive Voice Response system
      priority: urgent
      components:
        - call_flow
        - speech_recognition
        - text_to_speech
        - dtmf

    - name: tts
      description: Text-to-Speech services
      priority: important
      components:
        - synthesis
        - voice_models
        - audio_processing
        - api

  # Messaging Protocols
  messaging_protocols:
    - name: smtp
      description: Simple Mail Transfer Protocol
      priority: normal
      components:
        - mail_relay
        - authentication
        - encryption
        - delivery

    - name: websocket
      description: WebSocket real-time communication
      priority: normal
      components:
        - connection_pool
        - message_broker
        - authentication
        - heartbeat

    - name: grpc
      description: gRPC high-performance RPC
      priority: normal
      components:
        - service_discovery
        - load_balancing
        - authentication
        - streaming

    - name: rest
      description: RESTful API endpoints
      priority: normal
      components:
        - routing
        - authentication
        - rate_limiting
        - caching

# Monitoring Configuration
monitoring:
  # Health check intervals (in seconds)
  health_check_interval:
    critical: 60
    urgent: 300
    important: 900
    normal: 1800

  # SLA thresholds
  sla_thresholds:
    critical:
      uptime: 99.95
      response_time_ms: 100
      error_rate: 0.01
    urgent:
      uptime: 99.9
      response_time_ms: 500
      error_rate: 0.1
    important:
      uptime: 99.5
      response_time_ms: 1000
      error_rate: 1.0
    normal:
      uptime: 99.0
      response_time_ms: 2000
      error_rate: 5.0

  # Alert routing
  alert_routing:
    critical:
      - pagerduty
      - slack_channel: "#infrastructure-critical"
      - email: ops-critical@example.com
    urgent:
      - slack_channel: "#infrastructure-urgent"
      - email: ops-urgent@example.com
    important:
      - slack_channel: "#infrastructure-alerts"
    normal:
      - email: ops-info@example.com

# Component Dependencies
dependencies:
  starlingx_openstack:
    - loki
  hostbill:
    - symfony
    - smtp
  symfony:
    - rest
    - grpc
  oro:
    - symfony
    - rest
  wordpress:
    - smtp
    - rest
  flarum:
    - websocket
    - smtp
  telnyx:
    - sms
    - ivr
    - tts
  plivo:
    - sms
    - ivr
    - tts
  ivr:
    - tts
    - grpc

# Incremental Execution Strategy
execution:
  # Enable incremental execution (small, continuous improvements)
  incremental: true

  # Enable relentless execution (never stop improving)
  relentless: true

  # Enable focused execution (prioritize critical components)
  focused: true

  # Batch size for parallel checks
  batch_size: 5

  # Retry strategy
  retry:
    max_attempts: 3
    backoff_multiplier: 2
    initial_delay_ms: 1000
