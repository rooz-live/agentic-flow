# 1Password (OP) credential map — all password resets MUST call op_credential_sync.sh
version: "1.0"
vault: "${OP_VAULT:-Dev}"

credentials:
  whm_root:
    title: "${OP_WHM_ITEM_TITLE:-cPanel WHM root (mail.bhopti.com)}"
    category: login
    url: "https://mail.bhopti.com:2087/"
    rotate_script: scripts/mail/whm-credential-refresh.sh

  mailstore_admin:
    title: "${OP_MAILSTORE_ITEM_TITLE:-MailStore STX admin}"
    category: login
    url: "https://mailadmin.bhopti.com/admin/"
    rotate_script: scripts/mail/mailstore-credential-refresh.sh

swarm:
  after_rotate: scripts/mail/op_credential_sync.sh
  evidence_dir: .goalie/evidence/mail
  dry_run_env: OP_SYNC_DRY_RUN
