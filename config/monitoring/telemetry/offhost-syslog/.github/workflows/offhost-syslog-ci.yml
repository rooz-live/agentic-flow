# CI/CD Pipeline - Off-Host Syslog Black Box Recorder
# Continuous Integration and Deployment

name: Off-Host Syslog CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: 'Run terraform apply'
        required: true
        type: boolean
        default: false
      ansible_apply:
        description: 'Run ansible apply'
        required: true
        type: boolean
        default: false
      deploy_client:
        description: 'Deploy client config to stx-aio-0'
        required: true
        type: boolean
        default: false

env:
  TERRAFORM_VERSION: '1.5.0'
  ANSIBLE_VERSION: '2.15.0'
  AWS_REGION: 'us-east-1'

jobs:
  # CI Jobs - Run on every PR
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform validate

  terraform-security:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: config/telemetry/offhost-syslog/terraform
          soft_fail: false
          additional_args: '--severity HIGH,CRITICAL'

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible==${{ env.ANSIBLE_VERSION }} ansible-lint

      - name: Install Ansible Collections
        run: |
          cd config/telemetry/offhost-syslog/ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Run Ansible Lint
        run: |
          cd config/telemetry/offhost-syslog/ansible
          ansible-lint --force-color

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog-action@v0.12.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json --only-verified

  policy-check:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Validate Firewall Policies
        run: |
          # Check no 0.0.0.0/0 on port 6514
          if grep -r "0.0.0.0/0" config/telemetry/offhost-syslog/terraform/; then
            echo "ERROR: 0.0.0.0/0 found in firewall rules"
            exit 1
          fi

          # Check allowlist contains only 23.92.79.2/32
          if grep -r "port.*6514" config/telemetry/offhost-syslog/terraform/ | grep -v "23.92.79.2/32"; then
            echo "ERROR: Non-allowlist IP found for port 6514"
            exit 1
          fi

          # Check TLS is enabled (port 6514, not 514)
          if grep -r "port.*514" config/telemetry/offhost-syslog/terraform/ | grep -v "6514"; then
            echo "ERROR: Plaintext syslog port 514 found"
            exit 1
          fi

          echo "All policy checks passed"

  # CD Jobs - Manual trigger only
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_apply == true
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: config/telemetry/offhost-syslog/terraform/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_apply == true
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform init

      - name: Terraform Apply
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform apply -auto-approve

      - name: Output Terraform Results
        run: |
          cd config/telemetry/offhost-syslog/terraform
          terraform output -json > outputs.json
          cat outputs.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v3
        with:
          name: terraform-outputs
          path: config/telemetry/offhost-syslog/terraform/outputs.json

  ansible-apply:
    name: Ansible Apply
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.event_name == 'workflow_dispatch' && inputs.ansible_apply == true
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible==${{ env.ANSIBLE_VERSION }}
          pip install boto3

      - name: Install Ansible Collections
        run: |
          cd config/telemetry/offhost-syslog/ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Download Terraform Outputs
        uses: actions/download-artifact@v3
        with:
          name: terraform-outputs
          path: config/telemetry/offhost-syslog/terraform

      - name: Update Inventory with Terraform Outputs
        run: |
          cd config/telemetry/offhost-syslog/ansible
          # Update inventory with VPS IP from Terraform output
          VPS_IP=$(jq -r '.vps_public_ip.value' ../terraform/outputs.json)
          sed -i "s/# ansible_host=.*/ansible_host=$VPS_IP ansible_user=root ansible_port=22/" inventory/hosts.ini

      - name: Run Ansible Playbook
        run: |
          cd config/telemetry/offhost-syslog/ansible
          ansible-playbook -i inventory/hosts.ini playbooks/configure-syslog-sink.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_PRIVATE_KEY_FILE: ${{ secrets.SSH_PRIVATE_KEY }}

  deploy-client:
    name: Deploy Client Config
    runs-on: ubuntu-latest
    needs: ansible-apply
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_client == true
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible==${{ env.ANSIBLE_VERSION }}
          pip install boto3

      - name: Install Ansible Collections
        run: |
          cd config/telemetry/offhost-syslog/ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Run Ansible Playbook for Client
        run: |
          cd config/telemetry/offhost-syslog/ansible
          ansible-playbook -i inventory/hosts.ini playbooks/configure-starlingx-shipper.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_PRIVATE_KEY_FILE: ${{ secrets.STX_SSH_PRIVATE_KEY }}
