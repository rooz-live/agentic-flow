# Ansible Group Variables - Off-Host Syslog Black Box Recorder
# Common variables for all hosts

# Syslog Configuration
syslog_port: 6514
syslog_protocol: "tcp"
log_dir: "/var/log/syslog"

# TLS Certificate Configuration
ca_cert_path: "/etc/rsyslog.d/ca.pem"
server_cert_path: "/etc/rsyslog.d/server.pem"
server_key_path: "/etc/rsyslog.d/server.key"
client_cert_path: "/etc/rsyslog.d/client.pem"
client_key_path: "/etc/rsyslog.d/client.key"
ca_validity_days: 3650
cert_validity_days: 365

# Log Retention Settings
auth_log_retention_days: 30
system_warn_retention_days: 7
system_info_retention_days: 3

# Network Configuration
admin_ip: "173.94.53.113"
source_server_ip: "23.92.79.2"

# Security Settings
ssh_port: 22
ssh_allowed_users: ["root", "ubuntu"]
ssh_key_authentication_only: true
ssh_password_authentication: false

# Firewall Settings
firewall_default_incoming: "deny"
firewall_default_outgoing: "allow"

# System Hardening Settings
enable_fail2ban: true
enable_automatic_updates: true
enable_auditd: false

# Rsyslog Configuration
rsyslog_max_message_size: 64k
rsyslog_queue_size: 100000
rsyslog_queue_disk_spool: true

# Logrotate Configuration
logrotate_weekly: true
logrotate_rotate: "{{ auth_log_retention_days }}"
logrotate_compress: true
logrotate_delaycompress: false
logrotate_missingok: true
logrotate_notifempty: true

# Monitoring
enable_monitoring: false
monitoring_port: 9090

# Backup Settings
enable_backup: false
backup_retention_days: 7
backup_location: "/var/backups/syslog"
