---
# Ansible Inventory for Syslog Infrastructure
# Updated for password authentication (SSH_AUTH_MODE=password)
# Password is provided via HIVELOCITY_SSH_PASSWORD environment variable

all:
  children:
    syslog_sink:
      hosts:
        syslog-sink-01:
          ansible_host: 23.92.79.2
          ansible_port: 2222
          ansible_user: ubuntu
          ansible_ssh_pass: "{{ lookup('env', 'HIVELOCITY_SSH_PASSWORD') | default('', true) }}"
          ansible_ssh_private_key_file: ""
          ansible_python_interpreter: /usr/bin/python3
    
    syslog_client:
      hosts:
        stx-aio-0:
          ansible_host: 23.92.79.2
          ansible_port: 2222
          ansible_user: ubuntu
          ansible_ssh_pass: "{{ lookup('env', 'HIVELOCITY_SSH_PASSWORD') | default('', true) }}"
          ansible_ssh_private_key_file: ""
          ansible_python_interpreter: /usr/bin/python3
    
    starlingx:
      hosts:
        stx-aio-0:
          ansible_host: 23.92.79.2
          ansible_port: 2222
          ansible_user: ubuntu
          ansible_ssh_pass: "{{ lookup('env', 'HIVELOCITY_SSH_PASSWORD') | default('', true) }}"
          ansible_ssh_private_key_file: ""
          ansible_python_interpreter: /usr/bin/python3

  vars:
    # TLS Configuration
    tls_dir: /etc/rsyslog.d/tls
    log_dir: /var/log/remote
    
    # Network Configuration
    starlingx_ip: "23.92.79.2"
    admin_ip: "173.94.53.113"
    
    # Log Retention
    auth_retention_days: 30
    system_retention_days: 7
    
    # Syslog Port
    syslog_port: 6514
    
    # SSH Configuration
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

