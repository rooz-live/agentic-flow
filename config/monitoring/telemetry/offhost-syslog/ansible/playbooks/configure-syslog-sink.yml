---
# Configure Syslog Sink with TLS
# This playbook configures rsyslog with mutual TLS authentication
#
# Prerequisites:
# - VPS provisioned via Terraform
# - SSH access configured
#
# Usage:
#   ansible-playbook -i inventory/hosts playbooks/configure-syslog-sink.yml

- name: Configure Syslog Sink with TLS
  hosts: syslog_sink
  become: yes
  vars:
    tls_dir: /etc/rsyslog.d/tls
    log_dir: /var/log/remote
    starlingx_ip: "23.92.79.2"
    auth_retention_days: 30
    system_retention_days: 7

  tasks:
    # ========================================================================
    # TLS Certificate Generation
    # ========================================================================
    - name: Create TLS directory
      file:
        path: "{{ tls_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Generate CA private key
      command: >
        openssl genrsa -out {{ tls_dir }}/ca.key 4096
      args:
        creates: "{{ tls_dir }}/ca.key"

    - name: Set CA key permissions
      file:
        path: "{{ tls_dir }}/ca.key"
        owner: root
        group: root
        mode: '0600'

    - name: Generate CA certificate
      command: >
        openssl req -x509 -new -nodes -key {{ tls_dir }}/ca.key
        -sha256 -days 3650 -out {{ tls_dir }}/ca.crt
        -subj "/CN=Syslog-CA/O=Infrastructure/OU=Observability"
      args:
        creates: "{{ tls_dir }}/ca.crt"

    - name: Generate server private key
      command: >
        openssl genrsa -out {{ tls_dir }}/server.key 2048
      args:
        creates: "{{ tls_dir }}/server.key"

    - name: Set server key permissions
      file:
        path: "{{ tls_dir }}/server.key"
        owner: root
        group: root
        mode: '0600'

    - name: Generate server certificate request
      command: >
        openssl req -new -key {{ tls_dir }}/server.key
        -out /tmp/server.csr
        -subj "/CN={{ inventory_hostname }}/O=Infrastructure/OU=Syslog-Sink"
      args:
        creates: "{{ tls_dir }}/server.crt"

    - name: Sign server certificate
      command: >
        openssl x509 -req -in /tmp/server.csr
        -CA {{ tls_dir }}/ca.crt -CAkey {{ tls_dir }}/ca.key
        -CAcreateserial -out {{ tls_dir }}/server.crt
        -days 365 -sha256
      args:
        creates: "{{ tls_dir }}/server.crt"

    - name: Generate client private key (for stx-aio-0)
      command: >
        openssl genrsa -out {{ tls_dir }}/client.key 2048
      args:
        creates: "{{ tls_dir }}/client.key"

    - name: Generate client certificate request
      command: >
        openssl req -new -key {{ tls_dir }}/client.key
        -out /tmp/client.csr
        -subj "/CN=stx-aio-0/O=Infrastructure/OU=StarlingX"
      args:
        creates: "{{ tls_dir }}/client.crt"

    - name: Sign client certificate
      command: >
        openssl x509 -req -in /tmp/client.csr
        -CA {{ tls_dir }}/ca.crt -CAkey {{ tls_dir }}/ca.key
        -CAcreateserial -out {{ tls_dir }}/client.crt
        -days 365 -sha256
      args:
        creates: "{{ tls_dir }}/client.crt"

    - name: Set certificate permissions
      file:
        path: "{{ item.path }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ tls_dir }}/ca.crt", mode: '0644' }
        - { path: "{{ tls_dir }}/server.crt", mode: '0644' }
        - { path: "{{ tls_dir }}/client.crt", mode: '0644' }
        - { path: "{{ tls_dir }}/client.key", mode: '0600' }

    # ========================================================================
    # Rsyslog Configuration
    # ========================================================================
    - name: Create remote log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: syslog
        group: adm
        mode: '0750'

    - name: Configure rsyslog TLS receiver
      template:
        src: ../templates/rsyslog-tls.conf.j2
        dest: /etc/rsyslog.d/10-tls-receiver.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart rsyslog

    - name: Configure log separation
      template:
        src: ../templates/rsyslog-separation.conf.j2
        dest: /etc/rsyslog.d/20-log-separation.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart rsyslog

    # ========================================================================
    # Logrotate Configuration
    # ========================================================================
    - name: Configure logrotate for auth logs
      template:
        src: ../templates/logrotate-auth.j2
        dest: /etc/logrotate.d/remote-auth
        owner: root
        group: root
        mode: '0644'

    - name: Configure logrotate for system logs
      template:
        src: ../templates/logrotate-system.j2
        dest: /etc/logrotate.d/remote-system
        owner: root
        group: root
        mode: '0644'

  handlers:
    - name: Restart rsyslog
      service:
        name: rsyslog
        state: restarted

