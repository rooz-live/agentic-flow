---
# Ansible Playbook: Configure Syslog Client (stx-aio-0)
# Off-Host Syslog Black Box Recorder

- name: Configure StarlingX as TLS syslog client
  hosts: syslog_client
  become: true
  vars:
    syslog_server: "23.92.79.2"
    syslog_port: 6514

  tasks:
    - name: Ensure rsyslog is installed
      apt:
        name: rsyslog
        state: present
        update_cache: yes

    - name: Ensure rsyslog-gnutls is installed
      apt:
        name: rsyslog-gnutls
        state: present

    - name: Configure journald to forward to syslog
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?ForwardToSyslog='
        line: 'ForwardToSyslog=yes'
        create: yes
        mode: '0644'
      notify: restart journald

    - name: Deploy rsyslog client configuration
      template:
        src: "{{ playbook_dir }}/../roles/syslog-client/templates/rsyslog-client.conf"
        dest: /etc/rsyslog.d/99-tls-forward.conf
        mode: '0644'
        owner: root
        group: root
      notify: restart rsyslog

    - name: Ensure rsyslog service is enabled and started
      systemd:
        name: rsyslog
        enabled: yes
        state: started

  handlers:
    - name: restart rsyslog
      systemd:
        name: rsyslog
        state: restarted

    - name: restart journald
      systemd:
        name: systemd-journald
        state: restarted
