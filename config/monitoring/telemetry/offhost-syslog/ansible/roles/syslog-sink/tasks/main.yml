---
# Ansible Role: Syslog Sink Tasks
# Off-Host Syslog Black Box Recorder

- name: Create log directory
  file:
    path: "{{ log_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: adm

- name: Ensure rsyslog is installed
  apt:
    name: rsyslog
    state: present
    update_cache: yes

- name: Ensure rsyslog-gnutls is installed
  apt:
    name: rsyslog-gnutls
    state: present

- name: Deploy firewall rules
  copy:
    src: files/firewall-rules.sh
    dest: /usr/local/bin/configure-firewall.sh
    mode: '0755'
    owner: root
    group: root

- name: Apply firewall rules
  command: /usr/local/bin/configure-firewall.sh
  changed_when: true

- name: Deploy rsyslog server configuration
  template:
    src: templates/rsyslog-server.conf
    dest: /etc/rsyslog.d/99-tls-server.conf
    mode: '0644'
    owner: root
    group: root
  notify: restart rsyslog

- name: Deploy logrotate configuration
  template:
    src: templates/logrotate-syslog
    dest: /etc/logrotate.d/syslog-sink
    mode: '0644'
    owner: root
    group: root

- name: Ensure rsyslog service is enabled and started
  systemd:
    name: rsyslog
    enabled: yes
    state: started
