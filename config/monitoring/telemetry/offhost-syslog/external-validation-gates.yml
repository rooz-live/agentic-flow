# External Validation Gates Configuration
# Validates internal metrics against user-facing outcomes to prevent metric gaming

validation_gates:
  - name: "internal_metrics_user_outcome_correlation"
    description: "Correlate internal performance metrics with user-facing outcomes"
    threshold: 0.85
    enabled: true
    severity: "high"
    metrics:
      - "response_time"
      - "error_rate"
      - "throughput"
    outcomes:
      - "user_satisfaction"
      - "task_completion_rate"
      - "user_retention"
    action_on_failure: "alert_and_escalate"

  - name: "metric_gaming_prevention"
    description: "Prevent metric gaming by cross-referencing multiple data sources"
    threshold: 0.90
    enabled: true
    severity: "critical"
    data_sources:
      - "application_logs"
      - "user_analytics"
      - "infrastructure_metrics"
      - "business_metrics"
    cross_validation_rules:
      - "log_volume_vs_user_activity"
      - "response_time_vs_user_satisfaction"
      - "error_rate_vs_support_tickets"
    action_on_failure: "immediate_escalation"

  - name: "deployment_success_rate"
    description: "Track deployment success rate across all environments"
    threshold: 0.95
    enabled: true
    severity: "high"
    environments:
      - "development"
      - "staging"
      - "production"
    calculation_period: "7d"
    min_deployments: 5
    action_on_failure: "alert_and_review"

  - name: "alert_response_time"
    description: "Track alert response time for critical incidents"
    threshold: 300  # seconds
    enabled: true
    severity: "critical"
    alert_levels:
      - "critical"
      - "high"
    measurement_window: "24h"
    min_alerts: 3
    action_on_failure: "escalate_to_management"

  - name: "system_availability_sla"
    description: "Ensure system meets availability SLA requirements"
    threshold: 0.999  # 99.9%
    enabled: true
    severity: "critical"
    measurement_period: "30d"
    downtime_budget: 43.2  # minutes per month
    action_on_failure: "sla_breach_escalation"

  - name: "data_integrity_validation"
    description: "Validate data integrity across all system components"
    threshold: 1.0  # 100% integrity required
    enabled: true
    severity: "critical"
    validation_types:
      - "checksum_verification"
      - "data_consistency_checks"
      - "replication_lag_monitoring"
    action_on_failure: "immediate_escalation"

  - name: "security_compliance_validation"
    description: "Validate security compliance across all environments"
    threshold: 0.95
    enabled: true
    severity: "critical"
    compliance_standards:
      - "SOC2"
      - "GDPR"
      - "PCI_DSS"
    scan_frequency: "daily"
    action_on_failure: "security_escalation"

# Global configuration
global_settings:
  evaluation_interval: 300  # seconds
  alert_suppression_window: 900  # seconds (15 minutes)
  historical_data_retention: 90  # days
  auto_remediation_enabled: false
  notification_channels:
    - "sns"
    - "slack"
    - "syslog"

# Escalation matrix
escalation_matrix:
  critical:
    level_1:
      delay: 0  # immediate
      channels: ["sns", "slack", "syslog"]
      recipients: ["devops@corp.interface.tag.ooo"]
    level_2:
      delay: 900  # 15 minutes
      channels: ["sns", "slack"]
      recipients: ["devops@corp.interface.tag.ooo", "management@corp.interface.tag.ooo"]
  high:
    level_1:
      delay: 300  # 5 minutes
      channels: ["slack", "syslog"]
      recipients: ["devops@corp.interface.tag.ooo"]
  medium:
    level_1:
      delay: 1800  # 30 minutes
      channels: ["syslog"]
      recipients: ["devops@corp.interface.tag.ooo"]
