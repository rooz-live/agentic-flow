#!/usr/sbin/nft -f
# =============================================================================
# Off-Host Syslog Sink VPS - nftables Firewall Configuration
# =============================================================================
# Purpose: Secure the syslog sink VPS with strict ingress rules
# Target: AWS Lightsail or Hivelocity VPS ($10/month budget)
# Phase: 3.2 - Firewall Rules and Network Security
# =============================================================================

# Flush existing rules
flush ruleset

# Define network constants
define ADMIN_IP = 173.94.53.113
define STX_SOURCE_IP = 23.92.79.2
define SYSLOG_TLS_PORT = 6514
define SSH_PORT = 22

table inet filter {
    # Track connection states
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow established and related connections
        ct state established,related accept

        # Drop invalid connections
        ct state invalid drop

        # Allow loopback traffic
        iif "lo" accept

        # Allow ICMP for diagnostics (rate limited)
        ip protocol icmp icmp type { echo-request, echo-reply } limit rate 10/second accept
        ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply } limit rate 10/second accept

        # =================================================================
        # RULE 1: SSH Admin Access - Only from admin IP
        # Source: 173.94.53.113/32 (Admin workstation)
        # =================================================================
        ip saddr $ADMIN_IP tcp dport $SSH_PORT ct state new accept \
            comment "SSH: Admin access from 173.94.53.113"

        # =================================================================
        # RULE 2: Syslog TLS - Only from StarlingX server
        # Source: 23.92.79.2/32 (stx-aio-0.corp.interface.tag.ooo)
        # Port: 6514/TCP (TLS syslog - RFC 5425)
        # =================================================================
        ip saddr $STX_SOURCE_IP tcp dport $SYSLOG_TLS_PORT ct state new accept \
            comment "Syslog TLS: stx-aio-0 on port 6514"

        # =================================================================
        # RULE 3: Default Deny - Log and drop all other inbound traffic
        # =================================================================
        # Rate-limited logging to prevent log flooding
        limit rate 5/minute burst 10 packets log prefix "[NFTABLES-DROP] " level info

        # Implicit drop via policy (policy drop at chain definition)
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        # No forwarding allowed on this host
    }

    chain output {
        type filter hook output priority 0; policy accept;

        # Allow all outbound traffic (needed for updates, DNS, etc.)
        # Consider restricting in high-security environments
    }
}

# =============================================================================
# Connection Tracking Tuning
# =============================================================================
table inet conntrack_tuning {
    chain prerouting {
        type filter hook prerouting priority raw; policy accept;

        # Don't track broadcast/multicast (optimization)
        pkttype broadcast notrack
        pkttype multicast notrack
    }
}

# =============================================================================
# Rate Limiting Table for DDoS Mitigation
# =============================================================================
table inet rate_limit {
    set ssh_meter { type ipv4_addr; flags dynamic; timeout 1m; }
    set syslog_meter { type ipv4_addr; flags dynamic; timeout 1m; }

    chain input {
        type filter hook input priority -10; policy accept;

        # Rate limit SSH connections (max 3 new connections per minute per IP)
        tcp dport $SSH_PORT ct state new \
            update @ssh_meter { ip saddr limit rate 3/minute } accept

        tcp dport $SSH_PORT ct state new drop

        # Rate limit syslog connections (max 10 new connections per minute per IP)
        tcp dport $SYSLOG_TLS_PORT ct state new \
            update @syslog_meter { ip saddr limit rate 10/minute } accept

        tcp dport $SYSLOG_TLS_PORT ct state new drop
    }
}

# =============================================================================
# Security Hardening
# =============================================================================
table inet security_hardening {
    chain input {
        type filter hook input priority 5; policy accept;

        # Drop TCP Christmas tree packets (all flags set)
        tcp flags & (fin|syn|rst|psh|ack|urg) == fin|syn|rst|psh|ack|urg drop

        # Drop NULL packets (no flags set)
        tcp flags & (fin|syn|rst|psh|ack|urg) == 0x0 drop

        # Drop SYN-FIN packets
        tcp flags syn,fin / syn,fin drop

        # Drop SYN-RST packets
        tcp flags syn,rst / syn,rst drop

        # Drop FIN without ACK
        tcp flags & (fin|ack) == fin drop

        # Drop fragments
        ip frag-off & 0x1fff != 0 drop
    }
}
