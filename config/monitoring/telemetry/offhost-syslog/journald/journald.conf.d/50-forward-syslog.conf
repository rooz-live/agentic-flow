# =============================================================================
# Journald Configuration - Forward to Syslog
# =============================================================================
# Purpose: Configure journald to forward logs to rsyslog for off-host transmission
# Target: StarlingX (stx-aio-0.corp.interface.tag.ooo)
# Phase: 3.5 - Journald Configuration for stx-aio-0
# =============================================================================
#
# INSTALLATION:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp 50-forward-syslog.conf /etc/systemd/journald.conf.d/
#   sudo systemctl restart systemd-journald
#
# VERIFICATION:
#   journalctl -f  # Verify logs are still being recorded
#   logger -t test "Test message"  # Send test message
#   tail -f /var/log/syslog  # Verify rsyslog receives it
#
# =============================================================================

[Journal]
# =============================================================================
# Syslog Forwarding
# =============================================================================

# Forward all journal messages to syslog
# This enables rsyslog to receive messages and forward them to the remote sink
ForwardToSyslog=yes

# =============================================================================
# Storage Configuration
# =============================================================================

# Keep local storage as well (belt and suspenders approach)
# This ensures logs are preserved locally even if remote forwarding fails
Storage=persistent

# =============================================================================
# Rate Limiting
# =============================================================================

# Rate limit burst (messages per interval before rate limiting kicks in)
RateLimitBurst=10000

# Rate limit interval in seconds
RateLimitIntervalSec=30s

# =============================================================================
# Disk Space Management
# =============================================================================

# Maximum disk space journal can use
SystemMaxUse=500M

# Keep at least this much free on the file system
SystemKeepFree=1G

# Maximum size of individual journal files
SystemMaxFileSize=50M

# =============================================================================
# Compression
# =============================================================================

# Compress journal files to save space
Compress=yes

# =============================================================================
# Sealing (Optional - for tamper detection)
# =============================================================================

# Enable FSS sealing for journal integrity
# Note: Requires setup of sealing key
# Seal=yes

# =============================================================================
# Additional Options
# =============================================================================

# Include kernel messages
ForwardToKMsg=no

# Don't forward to console (avoid noise)
ForwardToConsole=no

# Don't forward to wall (avoid user interruption)
ForwardToWall=no

# =============================================================================
# Notes
# =============================================================================
#
# The journal is the primary log collector on modern systemd systems.
# By enabling ForwardToSyslog, we allow rsyslog to:
#   1. Receive all journal messages
#   2. Apply filters (authpriv.*, *.warn)
#   3. Forward to the off-host syslog sink via TLS
#
# This configuration works in conjunction with:
#   - /etc/rsyslog.d/50-tls-forward.conf (client TLS config)
#   - rsyslog-journald-filter.conf (selective forwarding)
#
# =============================================================================
