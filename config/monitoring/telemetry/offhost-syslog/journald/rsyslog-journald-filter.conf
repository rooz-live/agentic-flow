# =============================================================================
# Rsyslog Journald Filter Rules - Selective Forwarding
# =============================================================================
# Purpose: Filter journal messages before forwarding to remote syslog sink
# Target: StarlingX (stx-aio-0.corp.interface.tag.ooo)
# Phase: 3.5 - Journald Configuration for stx-aio-0
# =============================================================================
#
# FILTER STRATEGY:
#   Forward ONLY:
#     1. authpriv.* (authentication events)
#     2. *.warn and above (warnings, errors, critical, alert, emergency)
#   Exclude:
#     - authpriv duplicates from *.warn stream
#     - Informational and debug messages
#
# INSTALLATION:
#   sudo cp rsyslog-journald-filter.conf /etc/rsyslog.d/40-journald-filter.conf
#   sudo rsyslogd -N1  # Validate
#   sudo systemctl restart rsyslog
#
# =============================================================================

# =============================================================================
# Module for Journal Integration
# =============================================================================

# Load imjournal module for direct journal access (alternative to imuxsock)
# This provides more metadata than traditional syslog forwarding
module(load="imjournal"
    StateFile="imjournal.state"
    ratelimit.interval="60"
    ratelimit.burst="20000"
)

# =============================================================================
# Filter Ruleset for Selective Forwarding
# =============================================================================

# Create a ruleset for filtered forwarding
ruleset(name="selective_forward") {
    
    # =========================================================================
    # RULE 1: Forward all authpriv facility messages
    # =========================================================================
    # Captures: SSH logins, PAM authentication, sudo, su, etc.
    # This is critical security telemetry for the Black Box Recorder
    # =========================================================================
    
    if ($syslogfacility-text == 'authpriv') then {
        # Forward to remote sink
        call forward_to_sink
        
        # Mark as processed to avoid duplicate in *.warn rule
        set $.authpriv_processed = 1;
        
        # Stop further processing for this message
        stop
    }
    
    # =========================================================================
    # RULE 2: Forward sudo program messages (any facility)
    # =========================================================================
    # Some sudo messages may come through different facilities
    # Ensure all privilege escalation events are captured
    # =========================================================================
    
    if ($programname == 'sudo') then {
        call forward_to_sink
        stop
    }
    
    # =========================================================================
    # RULE 3: Forward *.warn and above (excluding authpriv)
    # =========================================================================
    # Captures: Warnings, errors, criticals, alerts, emergencies
    # authpriv is excluded since it was handled in Rule 1
    # =========================================================================
    
    if ($syslogseverity <= 4) and ($syslogfacility-text != 'authpriv') then {
        call forward_to_sink
        stop
    }
    
    # =========================================================================
    # DEFAULT: Do not forward (info, notice, debug)
    # =========================================================================
    # These messages are kept locally but not forwarded to conserve
    # bandwidth and remote storage
    # =========================================================================
    
    # Discard silently (no action needed - just don't forward)
}

# =============================================================================
# Forward Action Ruleset
# =============================================================================

ruleset(name="forward_to_sink") {
    # Forward to remote syslog sink via TLS
    # Uses the TLS configuration from rsyslog-tls-client.conf
    action(
        type="omfwd"
        
        # Target syslog sink VPS
        # IMPORTANT: Replace VPS_IP_ADDRESS with actual VPS IP after provisioning
        target="VPS_IP_ADDRESS"
        port="6514"
        protocol="tcp"
        
        # TLS Configuration
        StreamDriver="gtls"
        StreamDriverMode="1"
        StreamDriverAuthMode="x509/name"
        StreamDriverPermittedPeers="syslog-sink.internal"
        
        # Queue configuration for reliability
        queue.type="LinkedList"
        queue.filename="filter_fwd_queue"
        queue.maxDiskSpace="500m"
        queue.saveOnShutdown="on"
        
        # Retry settings
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}

# =============================================================================
# Apply Selective Forwarding to Journal Input
# =============================================================================

# Route all journal messages through the selective filter
input(
    type="imjournal"
    ruleset="selective_forward"
)

# =============================================================================
# Statistics and Monitoring
# =============================================================================

# Enable statistics for monitoring filter effectiveness
module(load="impstats"
    interval="300"
    resetCounters="on"
    log.syslog="on"
    log.file="/var/log/rsyslog-stats.log"
)

# =============================================================================
# Local Logging (for troubleshooting)
# =============================================================================

# Keep a local record of what was forwarded (for debugging)
# Comment out in production to reduce disk I/O
# 
