# =============================================================================
# Rsyslog TLS Client Configuration - StarlingX (stx-aio-0)
# =============================================================================
# Purpose: Forward logs to off-host syslog sink via TLS
# Source: stx-aio-0.corp.interface.tag.ooo (23.92.79.2)
# Target: Syslog Sink VPS on port 6514/TCP
# Phase: 3.3 - Rsyslog TLS Configuration
# =============================================================================
#
# INSTALLATION:
#   1. Install rsyslog with TLS support:
#      sudo apt install rsyslog rsyslog-gnutls
#      # Or on CentOS/StarlingX:
#      sudo dnf install rsyslog rsyslog-gnutls
#
#   2. Copy this file to /etc/rsyslog.d/:
#      sudo cp rsyslog-tls-client.conf /etc/rsyslog.d/50-tls-forward.conf
#
#   3. Ensure certificates are in place (see TLS_CERTIFICATE_INFRASTRUCTURE_DESIGN.md):
#      - /etc/ssl/certs/observability-ca.crt (CA certificate)
#      - /etc/ssl/certs/stx-aio-0.crt (Client certificate)
#      - /etc/ssl/private/stx-aio-0.key (Client private key)
#
#   4. Update VPS_IP_ADDRESS placeholder with actual VPS IP
#
#   5. Validate and restart:
#      sudo rsyslogd -N1
#      sudo systemctl restart rsyslog
#
# =============================================================================

# =============================================================================
# Configuration Variables
# =============================================================================
# NOTE: Replace VPS_IP_ADDRESS with the actual IP of the syslog sink VPS
#       after provisioning (AWS Lightsail or Hivelocity)
# =============================================================================

# Define the target syslog sink - UPDATE THIS AFTER VPS PROVISIONING
$!target_vps = "VPS_IP_ADDRESS"

# =============================================================================
# Global TLS Settings
# =============================================================================

global(
    # Use GnuTLS as the default network stream driver
    DefaultNetstreamDriver="gtls"
    
    # CA certificate for verifying server certificate
    # This is the Observability Root CA that signed all certificates
    DefaultNetstreamDriverCAFile="/etc/ssl/certs/observability-ca.crt"
    
    # Client certificate for mutual TLS authentication
    # CN=stx-aio-0.corp.interface.tag.ooo
    DefaultNetstreamDriverCertFile="/etc/ssl/certs/stx-aio-0.crt"
    
    # Client private key (must be readable by rsyslog - root:root 0600)
    DefaultNetstreamDriverKeyFile="/etc/ssl/private/stx-aio-0.key"
    
    # Work directory for rsyslog queue files
    workDirectory="/var/spool/rsyslog"
)

# =============================================================================
# Main Queue Configuration (for reliability)
# =============================================================================

main_queue(
    # Use disk-assisted queue for reliability
    queue.type="LinkedList"
    queue.filename="main_queue"
    
    # Disk queue settings
    queue.maxDiskSpace="1g"
    queue.saveOnShutdown="on"
    
    # High watermark for queue
    queue.highWatermark="50000"
    queue.lowWatermark="40000"
)

# =============================================================================
# Forward All Logs to Remote Syslog Sink
# =============================================================================

# Forward all facility.* to the remote syslog sink
# This is the primary forwarding rule for the Black Box Recorder
*.* action(
    type="omfwd"
    
    # Target syslog sink VPS
    # IMPORTANT: Replace VPS_IP_ADDRESS with actual VPS IP after provisioning
    target="VPS_IP_ADDRESS"
    port="6514"
    protocol="tcp"
    
    # TLS Configuration
    StreamDriver="gtls"
    StreamDriverMode="1"                              # TLS-only mode
    StreamDriverAuthMode="x509/name"                  # Mutual TLS with CN verification
    StreamDriverPermittedPeers="syslog-sink.internal" # Server certificate CN
    
    # Queue configuration for reliability
    queue.type="LinkedList"
    queue.filename="syslog_fwd_queue"
    queue.maxDiskSpace="1g"
    queue.saveOnShutdown="on"
    
    # Retry settings
    action.resumeRetryCount="-1"     # Infinite retries
    action.resumeInterval="30"       # Retry every 30 seconds
    
    # Action timeout
    action.execOnlyWhenPreviousIsSuspended="off"
    
    # Connection keep-alive
    KeepAlive="on"
    KeepAlive.Probes="3"
    KeepAlive.Interval="60"
    KeepAlive.Time="120"
    
    # Rate limiting (protect against log storms)
    ratelimit.interval="60"
    ratelimit.burst="10000"
)

# =============================================================================
# Action Queue Template (for additional actions if needed)
# =============================================================================

# Template for action queues with disk persistence
template(name="DiskQueueTemplate" type="list") {
    property(name="rawmsg")
}

# =============================================================================
# Error Handling
# =============================================================================

# Log forwarding errors locally
# This helps diagnose connection issues
*.* action(
    type="omfile"
    file="/var/log/rsyslog-forward-errors.log"
    action.execOnlyWhenPreviousIsSuspended="on"
    FileCreateMode="0640"
)

# =============================================================================
# Local Logging (maintain local copies)
# =============================================================================

# Keep local copies of critical logs as backup
# Auth logs - local backup
authpriv.* action(
    type="omfile"
    file="/var/log/auth.log"
    FileCreateMode="0600"
)

# Sudo logs - local backup
if $programname == 'sudo' then {
    action(
        type="omfile"
        file="/var/log/sudo.log"
        FileCreateMode="0600"
    )
}

# System warnings and above - local backup
*.warn action(
    type="omfile"
    file="/var/log/syslog.warn"
    FileCreateMode="0640"
)

# =============================================================================
# Debug Configuration (comment out in production)
# =============================================================================

# Uncomment to enable debug logging for TLS connections
# $DebugLevel 2
# $DebugFile /var/log/rsyslog-debug.log
