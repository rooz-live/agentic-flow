# Journald configuration for stx-aio-0
# Enables syslog forwarding for off-host logging

[Journal]
# Forward to syslog (rsyslog) for off-host transmission
ForwardToSyslog=yes

# Maximum retention for local journal
MaxRetentionSec=7day

# Ensure we don't duplicate logs locally
# ForwardToKMsg=no
# ForwardToConsole=no
# ForwardToWall=no
