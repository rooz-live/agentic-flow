# Logrotate configuration for off-host syslog
# Manages retention periods for different log streams

# Auth/Sudo stream - 30-day retention
/var/log/syslog/auth-sudo.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0600 root root
    sharedscripts
    postrotate
        /usr/bin/systemctl reload rsyslog.service > /dev/null 2>&1 || true
    endscript
}

# System warnings/errors - 7-day retention
/var/log/syslog/system-warn.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0600 root root
    sharedscripts
    postrotate
        /usr/bin/systemctl reload rsyslog.service > /dev/null 2>&1 || true
    endscript
}
