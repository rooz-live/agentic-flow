# Rsyslog Client Configuration for stx-aio-0
# Forwards logs to syslog sink over TLS with client certificate authentication

# Load modules
module(load="imuxsock")
module(load="imjournal")
module(load="omfwd")

# Global settings
$ActionQueueType LinkedList
$ActionQueueSize 100000
$ActionResumeRetryCount -1
$WorkDirectory /var/spool/rsyslog

# Journald integration
$IMJournalStateFile imjournal.state
$IMJournalIgnorePreviousMessages on

# TLS Forwarding Configuration
# Forward to syslog sink over TCP/6514 with mutual TLS
$DefaultNetstreamDriver gtls
$DefaultNetstreamDriverCAFile /etc/rsyslog.d/tls/ca.crt
$ActionSendStreamDriverMode 1
$ActionSendStreamDriverAuthMode x509/name
$ActionSendStreamDriverPermittedPeer ${SYSLOG_SINK_HOSTNAME}
$ActionSendStreamDriverCertFile /etc/rsyslog.d/tls/client.crt
$ActionSendStreamDriverKeyFile /etc/rsyslog.d/tls/client.key

# Log forwarding rules
# Forward only: authpriv.* and *.warn (excluding authpriv duplicates)

# Forward authpriv.* (includes sudo, sshd, etc.)
if ($syslogfacility-text == 'authpriv') then {
    action(type="omfwd"
           protocol="tcp"
           target="${SYSLOG_SINK_IP}"
           port="6514"
           TCP_Framing="octet-counted"
           action.resumeRetryCount="-1"
           queue.type="LinkedList"
           queue.size="100000"
           queue.saveonshutdown="on")
    stop
}

# Forward *.warn (excluding authpriv)
if ($syslogseverity <= 4) and ($syslogfacility-text != 'authpriv') then {
    action(type="omfwd"
           protocol="tcp"
           target="${SYSLOG_SINK_IP}"
           port="6514"
           TCP_Framing="octet-counted"
           action.resumeRetryCount="-1"
           queue.type="LinkedList"
           queue.size="100000"
           queue.saveonshutdown="on")
    stop
}

# Discard everything else (we only forward authpriv and warn+)
& stop
