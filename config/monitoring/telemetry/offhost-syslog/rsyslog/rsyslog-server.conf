# Rsyslog Server Configuration for Off-Host Syslog Sink
# Listens on TCP/6514 with mutual TLS authentication

# Load TLS modules
module(load="gtls")
module(load="omfile")

# Global settings
$ActionQueueType LinkedList
$ActionQueueSize 100000
$ActionResumeRetryCount -1

# Log format template with timestamp, hostname, program, message
template(name="SyslogFormat" type="string"
         string="%timereported% %HOSTNAME% %programname%: %msg%\n")

# Create log directory
$DirCreateMode 0700
$FileCreateMode 0600
$Umask 0022

# TLS Input Configuration - Mutual TLS on TCP/6514
input(type="imtcp"
      port="6514"
      name="imtcp-tls"
      StreamDriver.Name="gtls"
      StreamDriver.Mode="1"
      StreamDriver.AuthMode="x509/name"
      PermittedPeer="stx-aio-0"
      gnutls.PriorityString="NORMAL:-VERS-TLS1.0:-VERS-TLS1.1"
      gnutls.ConfigFile="/etc/rsyslog.d/tls/rsyslog-server.prm")

# Log routing based on facility and severity

# Auth/Sudo stream: authpriv.* + sudo program messages
# 30-day retention
if ($syslogtag contains 'sudo') or ($syslogfacility-text == 'authpriv') then {
    action(type="omfile"
           file="/var/log/syslog/auth-sudo.log"
           template="SyslogFormat"
           dirCreateMode="0755"
           fileCreateMode="0600")
    stop
}

# System warnings/errors: *.warn (excluding authpriv)
# 7-day retention
if ($syslogseverity <= 4) and ($syslogfacility-text != 'authpriv') then {
    action(type="omfile"
           file="/var/log/syslog/system-warn.log"
           template="SyslogFormat"
           dirCreateMode="0755"
           fileCreateMode="0600")
    stop
}

# Discard everything else (we only want authpriv and warn+)
& stop
