# =============================================================================
# Rsyslog Filter Rules - Log Stream Separation
# =============================================================================
# Purpose: Route incoming syslog messages to appropriate log files
# Target: Syslog Sink VPS
# Phase: 3.3 - Rsyslog TLS Configuration
# =============================================================================
#
# LOG STREAMS:
#   1. Auth/Sudo Stream: authpriv.* + sudo program → /var/log/remote/auth/
#   2. System Warnings: *.warn (excluding authpriv) → /var/log/remote/system/
#
# INSTALLATION:
#   sudo cp rsyslog-filters.conf /etc/rsyslog.d/10-remote-filters.conf
#   sudo rsyslogd -N1
#   sudo systemctl restart rsyslog
#
# =============================================================================

# =============================================================================
# Ruleset for Filter Processing (called from main TLS config)
# =============================================================================

ruleset(name="remote_filters") {

    # =========================================================================
    # STREAM 1: Auth/Sudo Logs
    # =========================================================================
    # Captures:
    #   - All authpriv facility messages (SSH logins, PAM, etc.)
    #   - All messages from the sudo program (privilege escalation)
    #
    # Security Value: Critical for detecting unauthorized access attempts,
    #                 privilege escalation, and authentication anomalies
    # =========================================================================

    if ($syslogfacility-text == 'authpriv') or ($programname == 'sudo') then {
        
        # Write to daily auth log file
        action(
            type="omfile"
            DynaFile="AuthLogDynamic"
            template="AuthLogTemplate"
            FileCreateMode="0600"
            FileOwner="root"
            FileGroup="adm"
            DirCreateMode="0750"
            DirOwner="root"
            DirGroup="adm"
            CreateDirs="on"
            flushOnTXEnd="on"
        )
        
        # Also write to unified auth log (for easier tailing)
        action(
            type="omfile"
            file="/var/log/remote/auth/auth.log"
            template="AuthLogTemplate"
            FileCreateMode="0600"
            FileOwner="root"
            FileGroup="adm"
        )
        
        # Stop processing - don't duplicate in system logs
        stop
    }

    # =========================================================================
    # STREAM 2: System Warnings and Above (excluding authpriv)
    # =========================================================================
    # Captures:
    #   - All messages with severity warning (4) or higher
    #   - Excludes authpriv facility (already handled above)
    #
    # Severity levels:
    #   0 = emerg, 1 = alert, 2 = crit, 3 = err, 4 = warning
    #
    # Security Value: Captures system errors, service failures, kernel warnings,
    #                 and other operational issues that may indicate problems
    # =========================================================================

    if ($syslogseverity <= 4) and ($syslogfacility-text != 'authpriv') then {
        
        # Write to daily system warnings log
        action(
            type="omfile"
            DynaFile="SystemLogDynamic"
            template="SystemLogTemplate"
            FileCreateMode="0640"
            FileOwner="root"
            FileGroup="adm"
            DirCreateMode="0750"
            DirOwner="root"
            DirGroup="adm"
            CreateDirs="on"
            flushOnTXEnd="on"
        )
        
        # Also write to unified system log
        action(
            type="omfile"
            file="/var/log/remote/system/syslog.warn"
            template="SystemLogTemplate"
            FileCreateMode="0640"
            FileOwner="root"
            FileGroup="adm"
        )
        
        # Stop processing for this severity
        stop
    }

    # =========================================================================
    # CATCHALL: All other messages
    # =========================================================================
    # Messages that don't match above filters go to a general log
    # This includes informational and debug messages
    # =========================================================================

    action(
        type="omfile"
        DynaFile="GeneralLogDynamic"
        template="GeneralLogTemplate"
        FileCreateMode="0640"
        FileOwner="root"
        FileGroup="adm"
        DirCreateMode="0750"
        DirOwner="root"
        DirGroup="adm"
        CreateDirs="on"
    )
}

# =============================================================================
# Dynamic File Templates
# =============================================================================

# Auth logs - organized by date
template(name="AuthLogDynamic" type="string"
    string="/var/log/remote/auth/%$YEAR%/%$MONTH%/%$DAY%/auth.log"
)

# System warnings - organized by date
template(name="SystemLogDynamic" type="string"
    string="/var/log/remote/system/%$YEAR%/%$MONTH%/%$DAY%/syslog.warn"
)

# General logs - organized by hostname and date
template(name="GeneralLogDynamic" type="string"
    string="/var/log/remote/general/%HOSTNAME%/%$YEAR%/%$MONTH%/%$DAY%/messages.log"
)

# =============================================================================
# Log Format Templates
# =============================================================================

# Auth log format - includes full details for security analysis
template(name="AuthLogTemplate" type="list") {
    constant(value="[")
    property(name="timereported" dateFormat="rfc3339")
    constant(value="] [")
    property(name="fromhost-ip")
    constant(value="] [")
    property(name="fromhost")
    constant(value="] [")
    property(name="syslogfacility-text")
    constant(value=".")
    property(name="syslogseverity-text")
    constant(value="] [")
    property(name="programname")
    constant(value="] ")
    property(name="msg" spifno1stsp="on")
    constant(value="\n")
}

# System log format - compact but complete
template(name="SystemLogTemplate" type="list") {
    constant(value="[")
    property(name="timereported" dateFormat="rfc3339")
    constant(value="] [")
    property(name="fromhost-ip")
    constant(value="] [")
    property(name="syslogfacility-text")
    constant(value=".")
    property(name="syslogseverity-text")
    constant(value="] [")
    property(name="programname")
    constant(value="] ")
    property(name="msg" spifno1stsp="on")
    constant(value="\n")
}

# General log format - standard syslog style
template(name="GeneralLogTemplate" type="string"
    string="%timereported:::date-rfc3339% %fromhost-ip% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n"
)

# =============================================================================
# Additional Filters for Specific Programs
# =============================================================================

# SSH-specific filter (subset of authpriv)
# Can be used for detailed SSH session tracking
template(name="SSHLogDynamic" type="string"
    string="/var/log/remote/auth/ssh/%$YEAR%/%$MONTH%/%$DAY%/ssh.log"
)

# Sudo-specific filter
# Captures all privilege escalation events
template(name="SudoLogDynamic" type="string"
    string="/var/log/remote/auth/sudo/%$YEAR%/%$MONTH%/%$DAY%/sudo.log"
)

