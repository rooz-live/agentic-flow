# =============================================================================
# Rsyslog TLS Server Configuration - Syslog Sink VPS
# =============================================================================
# Purpose: Receive TLS-encrypted syslog from StarlingX server (stx-aio-0)
# Target: AWS Lightsail or Hivelocity VPS
# Port: 6514/TCP (RFC 5425 - TLS Syslog Transport)
# Phase: 3.3 - Rsyslog TLS Configuration
# =============================================================================
#
# INSTALLATION:
#   1. Install rsyslog with TLS support:
#      sudo apt install rsyslog rsyslog-gnutls
#
#   2. Copy this file to /etc/rsyslog.d/:
#      sudo cp rsyslog-tls-server.conf /etc/rsyslog.d/00-tls-server.conf
#
#   3. Ensure certificates are in place (see TLS_CERTIFICATE_INFRASTRUCTURE_DESIGN.md):
#      - /etc/ssl/certs/observability-ca.crt (CA certificate)
#      - /etc/ssl/certs/syslog-sink.crt (Server certificate)
#      - /etc/ssl/private/syslog-sink.key (Server private key)
#
#   4. Validate and restart:
#      sudo rsyslogd -N1
#      sudo systemctl restart rsyslog
#
# =============================================================================

# =============================================================================
# Module Loading
# =============================================================================

# Load the TCP input module with GnuTLS stream driver
module(
    load="imtcp"
    StreamDriver.Name="gtls"
    StreamDriver.Mode="1"
    StreamDriver.Authmode="x509/name"
)

# =============================================================================
# Global TLS Settings
# =============================================================================

global(
    # Use GnuTLS as the default network stream driver
    DefaultNetstreamDriver="gtls"
    
    # CA certificate for verifying client certificates
    # This is the Observability Root CA that signed all certificates
    DefaultNetstreamDriverCAFile="/etc/ssl/certs/observability-ca.crt"
    
    # Server certificate presented during TLS handshake
    # CN=syslog-sink.internal
    DefaultNetstreamDriverCertFile="/etc/ssl/certs/syslog-sink.crt"
    
    # Server private key (must be readable by rsyslog - root:root 0600)
    DefaultNetstreamDriverKeyFile="/etc/ssl/private/syslog-sink.key"
    
    # Work directory for rsyslog
    workDirectory="/var/spool/rsyslog"
    
    # Maximum message size (default is 8k, increase for large messages)
    maxMessageSize="32k"
)

# =============================================================================
# TLS Syslog Input Listener - Port 6514
# =============================================================================

input(
    type="imtcp"
    port="6514"
    
    # TLS Configuration
    StreamDriver.Name="gtls"
    StreamDriver.Mode="1"                    # TLS-only mode (no plaintext fallback)
    StreamDriver.Authmode="x509/name"        # Mutual TLS with CN verification
    
    # Permitted Peers - ONLY accept connections from stx-aio-0
    # This is the CN from the client certificate
    PermittedPeer=["stx-aio-0.corp.interface.tag.ooo"]
    
    # Ruleset to process incoming messages
    ruleset="remote_syslog"
    
    # Connection settings
    KeepAlive="on"
    KeepAlive.Probes="3"
    KeepAlive.Interval="60"
    KeepAlive.Time="120"
)

# =============================================================================
# Ruleset for Remote Syslog Processing
# =============================================================================

ruleset(name="remote_syslog") {
    # Add metadata about the source
    set $.remote_host = $fromhost-ip;
    set $.remote_hostname = $fromhost;
    set $.facility = $syslogfacility-text;
    set $.severity = $syslogseverity-text;
    
    # Log all received messages to a general remote log for debugging
    action(
        type="omfile"
        file="/var/log/remote/all.log"
        template="RemoteLogTemplate"
        FileCreateMode="0640"
        FileOwner="root"
        FileGroup="adm"
        DirCreateMode="0750"
        DirOwner="root"
        DirGroup="adm"
        CreateDirs="on"
    )
    
    # Route to specific handlers via included filter rules
    call remote_filters
}

# =============================================================================
# Log Templates
# =============================================================================

# Template for remote log files with additional context
template(name="RemoteLogTemplate" type="list") {
    constant(value="[")
    property(name="timereported" dateFormat="rfc3339")
    constant(value="] [")
    property(name="fromhost-ip")
    constant(value="] [")
    property(name="syslogfacility-text")
    constant(value=".")
    property(name="syslogseverity-text")
    constant(value="] [")
    property(name="programname")
    constant(value="] ")
    property(name="msg" spifno1teleading="on")
    constant(value="\n")
}

# Template with ISO8601 timestamp for structured logs
template(name="RemoteLogTemplateISO" type="string"
    string="%timereported:::date-rfc3339% %fromhost-ip% %syslogtag%%msg:::sp-if-no-1st-sp%%msg:::drop-last-lf%\n"
)

# Template for JSON output (useful for log aggregation)
template(name="RemoteLogJSON" type="list") {
    constant(value="{")
    constant(value="\"@timestamp\":\"")
    property(name="timereported" dateFormat="rfc3339")
    constant(value="\",\"host\":\"")
    property(name="fromhost-ip")
    constant(value="\",\"hostname\":\"")
    property(name="fromhost")
    constant(value="\",\"facility\":\"")
    property(name="syslogfacility-text")
    constant(value="\",\"severity\":\"")
    property(name="syslogseverity-text")
    constant(value="\",\"program\":\"")
    property(name="programname")
    constant(value="\",\"message\":\"")
    property(name="msg" format="json")
    constant(value="\"}\n")
}

# =============================================================================
# Include Filter Rules (processed via rsyslog-filters.conf)
# =============================================================================

# The filter rules are defined in a separate file for modularity
# They define routing for auth, system, and other log streams
