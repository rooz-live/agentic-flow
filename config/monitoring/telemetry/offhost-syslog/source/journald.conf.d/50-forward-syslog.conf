# =============================================================================
# Journald Configuration for Off-Host Syslog Forwarding
# =============================================================================
# Location: /etc/systemd/journald.conf.d/50-forward-syslog.conf
# Purpose: Enable syslog forwarding from systemd-journald to rsyslog
# Target: stx-aio-0.corp.interface.tag.ooo (StarlingX)
# =============================================================================

[Journal]
# Forward all journal messages to syslog for off-host transmission
# This enables rsyslog to receive and forward logs via TLS
ForwardToSyslog=yes

# Storage settings - keep local copy
Storage=persistent

# Compression for local storage
Compress=yes

# Maximum journal size (retain locally even when forwarding)
SystemMaxUse=1G
RuntimeMaxUse=200M

# Forward rate limiting (messages per interval per service)
# Disable rate limiting to ensure all auth events are captured
RateLimitIntervalSec=0
RateLimitBurst=0
