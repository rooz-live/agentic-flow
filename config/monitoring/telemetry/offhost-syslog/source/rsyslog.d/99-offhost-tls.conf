# =============================================================================
# rsyslog TLS Client Configuration for Off-Host Syslog Forwarding
# =============================================================================
# Location: /etc/rsyslog.d/99-offhost-tls.conf
# Source: stx-aio-0.corp.interface.tag.ooo (23.92.79.2)
# Target: VPS Syslog Sink (TCP/6514 TLS)
# Purpose: Forward authpriv.* and *.warn to off-host syslog collector
# =============================================================================

# -----------------------------------------------------------------------------
# Global TLS Configuration
# -----------------------------------------------------------------------------

# Load GnuTLS driver for TLS support
global(
    defaultNetstreamDriver="gtls"
    defaultNetstreamDriverCAFile="/etc/ssl/certs/observability-ca.crt"
    defaultNetstreamDriverCertFile="/etc/ssl/certs/stx-aio-0.crt"
    defaultNetstreamDriverKeyFile="/etc/ssl/private/stx-aio-0.key"
)

# -----------------------------------------------------------------------------
# Action Queue Configuration (for reliability)
# -----------------------------------------------------------------------------

# Main queue for buffering during network issues
main_queue(
    queue.filename="main_q"
    queue.maxdiskspace="1g"
    queue.saveonshutdown="on"
    queue.type="LinkedList"
)

# -----------------------------------------------------------------------------
# Forward Action Template
# -----------------------------------------------------------------------------

# Template for structured syslog forwarding (RFC 5424)
template(name="OffHostFormat" type="string"
    string="<%pri%>1 %timestamp:::date-rfc3339% %hostname% %app-name% %procid% %msgid% %structured-data% %msg%\n"
)

# -----------------------------------------------------------------------------
# Action: Forward authpriv.* to VPS (auth stream)
# -----------------------------------------------------------------------------
# Captures: SSH logins, sudo usage, PAM events, authentication failures
# Retention: 30 days on VPS

# Forward all authpriv messages
authpriv.* action(
    type="omfwd"
    target="__VPS_IP__"
    port="6514"
    protocol="tcp"
    streamdriver="gtls"
    streamdrivermode="1"
    streamdriverauthmode="x509/name"
    streamdriverpermittedpeers="syslog-sink.internal"
    template="OffHostFormat"
    queue.filename="authpriv_fwd"
    queue.maxdiskspace="500m"
    queue.saveonshutdown="on"
    queue.type="LinkedList"
    action.resumeRetryCount="-1"
    action.resumeInterval="30"
)

# -----------------------------------------------------------------------------
# Action: Forward *.warn to VPS (system stream)
# -----------------------------------------------------------------------------
# Captures: System warnings, errors, critical events
# Excludes: authpriv (already forwarded above)
# Retention: 7 days on VPS

# Forward warnings and above, excluding authpriv (to avoid duplicates)
*.warn;authpriv.none action(
    type="omfwd"
    target="__VPS_IP__"
    port="6514"
    protocol="tcp"
    streamdriver="gtls"
    streamdrivermode="1"
    streamdriverauthmode="x509/name"
    streamdriverpermittedpeers="syslog-sink.internal"
    template="OffHostFormat"
    queue.filename="warn_fwd"
    queue.maxdiskspace="500m"
    queue.saveonshutdown="on"
    queue.type="LinkedList"
    action.resumeRetryCount="-1"
    action.resumeInterval="30"
)

# -----------------------------------------------------------------------------
# Forward sudo messages explicitly (may be in auth or local*)
# -----------------------------------------------------------------------------

# Catch sudo messages that might not be in authpriv
if $programname == 'sudo' then action(
    type="omfwd"
    target="__VPS_IP__"
    port="6514"
    protocol="tcp"
    streamdriver="gtls"
    streamdrivermode="1"
    streamdriverauthmode="x509/name"
    streamdriverpermittedpeers="syslog-sink.internal"
    template="OffHostFormat"
    queue.filename="sudo_fwd"
    queue.maxdiskspace="100m"
    queue.saveonshutdown="on"
    queue.type="LinkedList"
    action.resumeRetryCount="-1"
    action.resumeInterval="30"
)

# =============================================================================
# Notes:
# - Replace __VPS_IP__ with actual VPS IP address during deployment
# - TLS 1.2+ is enforced by GnuTLS driver
# - Mutual authentication via x509/name ensures server identity
# - Queue configuration provides reliability during network outages
# - Resume settings ensure logs are delivered after connectivity restored
# =============================================================================
