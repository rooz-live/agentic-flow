# CA Certificate Configuration for Off-Host Syslog
# Internal Certificate Authority for mutual TLS authentication

[ ca ]
default_ca = CA_default

[ CA_default ]
dir               = .
certificate       = $dir/ca.crt
private_key       = $dir/ca.key
new_certs_dir     = $dir/certs
database          = $dir/index.txt
serial            = $dir/serial
default_md        = sha256
default_crl_days  = 30
default_days      = 3650
default_ca        = ca.crt
default_ca_private= ca.key
policy            = policy_match
unique_subject    = no
x509_extensions   = v3_ca

[ policy_match ]
countryName             = optional
stateOrProvinceName     = optional
organizationName        = optional
organizationalUnitName  = optional
commonName              = supplied
emailAddress            = optional

[ req ]
default_bits       = 4096
default_keyfile    = ca.key
default_md         = sha256
prompt             = no
distinguished_name = req_distinguished_name
x509_extensions    = v3_ca

[ req_distinguished_name ]
C  = US
ST = New York
L  = New York
O  = Internal Syslog Infrastructure
OU = Certificate Authority
CN = Internal Syslog CA

[ v3_ca ]
subjectKeyIdentifier   = hash
authorityKeyIdentifier = keyid:always,issuer
basicConstraints       = critical,CA:true,pathlen:1
keyUsage               = critical, digitalSignature, keyCertSign, cRLSign
subjectAltName         = email:ca@syslog.internal
