# Server Certificate Configuration for Syslog Sink (VPS)
# Certificate for syslog receiver (off-host sink)

[ req ]
default_bits       = 4096
default_md         = sha256
prompt             = no
distinguished_name = req_distinguished_name
req_extensions     = v3_req
x509_extensions   = v3_req

[ req_distinguished_name ]
CN = ${SYSLOG_SINK_HOSTNAME}
O  = Internal Syslog Infrastructure
OU = Syslog Sink

[ v3_req ]
basicConstraints       = critical,CA:false
keyUsage               = critical, digitalSignature, keyEncipherment
extendedKeyUsage       = serverAuth
subjectKeyIdentifier   = hash
authorityKeyIdentifier = keyid,issuer
subjectAltName         = @alt_names

[ alt_names ]
DNS.1 = ${SYSLOG_SINK_HOSTNAME}
DNS.2 = syslog-sink.internal
IP.1 = ${SYSLOG_SINK_IP}
