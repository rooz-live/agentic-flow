schema: monorepo_root.v1
version: "1.0.0"
root_env: REPO_ROOT
default_root: ~/Documents/code

orchestration:
  canonical_router: scripts/one.sh
  primitives:
    goal: scripts/one-sh.d/goal.sh
    workflow: scripts/one-sh.d/workflow.sh
    schedule: scripts/one-sh.d/schedule.sh
    loop: scripts/one-sh.d/loop.sh
    ceremony: scripts/one-sh.d/ceremony.sh
  routes:
    disk_steward: scripts/one.sh disk-steward
    harness: scripts/one.sh harness
    agenticow: scripts/one.sh agenticow
    portfolio: scripts/one.sh portfolio
    run_all: scripts/one.sh run-all
    harness_delegate: scripts/one-sh.d/harness.sh
    agenticow_delegate: scripts/one-sh.d/agenticow.sh
    weight_eft_delegate: scripts/one-sh.d/weight-eft.sh
    cycle_delegate: scripts/one-sh.d/cycle.sh
  tick_engine: scripts/cicd/tick_post_hooks.sh
  loop_timer: scripts/cicd/loop_timer_engine.sh

memory_graph:
  ruflo_hybrid: .swarm/memory.db
  agentdb: .agentdb
  aqe: .agentic-qe/memory.db
  beads: .beads
  gitnexus_index: .gitnexus
  config: config/ruflo/memory_graph.yaml

evidence:
  inbox_zero: .goalie/evidence/inbox_zero_latest.json
  timescape: .goalie/evidence/timescape_latest.json
  tick_post: .goalie/evidence/tick_post_latest.json
  ceremony: .goalie/evidence/ceremony_unit_latest.json
  ruflo_doctor: .goalie/evidence/ruflo_doctor_latest.json
  intel_pipeline: .goalie/evidence/intel_pipeline_latest.json
  exit_artifacts: .goalie/evidence/exit_artifact_inbox_latest.json

lanes:
  lnnnl: .goalie/LNNNL.yaml
  loop_prompts: config/cicd/loop_prompts.yaml
  roam: .goalie/ROAM_TRACKER.yaml

ruflo:
  plugins_manifest: config/ruflo/plugins.yaml
  upgrade_script: scripts/cicd/ruflo_wsjf_upgrade.sh
  intel_tick: scripts/cicd/intel_pipeline_tick.sh

ci_tiers:
  fast: tests/cicd/run_all.sh fast
  slow: tests/cicd/run_all.sh slow
