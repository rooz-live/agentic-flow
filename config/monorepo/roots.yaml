schema: monorepo_roots.v1
canonical_root: ~/Documents/code
workspaces:
  agentic_flow:
    path: projects/investing/agentic-flow
    role: primary_qe_orchestration
    ruflo_config: .claude-flow/config.yaml
  agent_harness:
    path: apps/agent-harness
    role: metaharness_darwin_evolve
    metaharness_config: .metaharness
  nginx_edge:
    path: ../nginx_deployed
    role: edge_gateway_deploy
    optional: true
harness_paths:
  goalie_evidence: .goalie/evidence
  cicd_fast: tests/cicd/run_all.sh fast
  cicd_slow: tests/cicd/run_all.sh slow
  ruflo_doctor: scripts/ruflo/doctor_remediate.sh
  ruflo_ceremony: scripts/ruflo/ceremony_ruflo_sync.sh
  pi_backlog: config/cicd/ruflo_pi_backlog.yaml
pnpm_workspace: pnpm-workspace.yaml
version_pin: config/ruflo/version.env
