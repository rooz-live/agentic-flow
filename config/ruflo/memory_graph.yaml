schema: ruflo_memory_graph.v1
version: "1.0.0"
description: Tier/namespace mapping for Ruflo hybrid memory (AgentDB, GitNexus, Beads).
tiers:
  hot:
    backend: ruflo_hybrid
    path: .swarm/memory.db
    namespaces:
      - coordination
      - session
      - swarm
  warm:
    backend: agentdb
    path: .agentdb
    namespaces:
      - learning
      - patterns
      - routing
  quality:
    backend: aqe
    path: .agentic-qe/memory.db
    namespaces:
      - qe
      - coverage
      - defects
  durable:
    backend: beads
    path: .beads
    namespaces:
      - issues
      - decisions
      - blockers
  graph:
    backend: gitnexus
    path: .gitnexus
    namespaces:
      - symbols
      - processes
      - impact
bindings:
  ruflo_config: .claude-flow/config.yaml
  root_manifest: config/monorepo/root_manifest.yaml
  evidence:
    doctor: .goalie/evidence/ruflo_doctor_latest.json
    intel: .goalie/evidence/intel_pipeline_latest.json
    inbox: .goalie/evidence/inbox_zero_latest.json
    exit_artifacts: .goalie/evidence/exit_artifact_inbox_latest.json
namespace_routing:
  patterns/*: warm
  learning/*: warm
  qe/*: quality
  coordination/*: hot
  issues/*: durable
  symbols/*: graph
