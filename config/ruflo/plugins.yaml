schema: ruflo_plugins.v1
version: "1.0.0"
description: Pinned Ruflo plugins in WSJF priority order (install via ruflo_wsjf_upgrade.sh --install-plugins).
install_env: RUFLO_PLUGIN_INSTALL=1
skip_network_env: AF_SKIP_NETWORK=1
plugins:
