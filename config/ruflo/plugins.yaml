  - id: test-intelligence
    package: plugin-test-intelligence
    wsjf: 9.2
    roam: R-RUFLO-PLUGIN-01
    lane: now
    notes: Test generation, gap analysis, flaky detection.
  - id: code-intelligence
    package: plugin-code-intelligence
    wsjf: 8.8
    roam: R-RUFLO-PLUGIN-01
    lane: near
    notes: Code analysis, pattern detection, GitNexus blast radius.
  - id: gastown-bridge
    package: plugin-gastown-bridge
    wsjf: 8.0
    roam: R-RUFLO-CONFIG-01
    lane: near
    notes: WASM orchestration, Beads sync bridge.
  - id: teammate-plugin
    package: plugin-teammate
    wsjf: 7.5
    roam: R-RUFLO-CONFIG-01
    lane: next
    notes: Native Agent Teams ↔ Ruflo swarm bridge.
