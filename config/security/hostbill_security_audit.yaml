# ============================================================================
# SECTION 2: Payment Gateway Configuration Audit
# ============================================================================
payment_gateway_audit:
  stripe:
    status: "NEEDS_VALIDATION"
    checks:
      - id: "STRIPE-001"
        check: "Verify test keys (sk_test_*) used in non-production"
        environment: "local,dev,stg"
        expected_key_prefix: "sk_test_"
        actual_key_prefix: null
        verified: false
        
      - id: "STRIPE-002"
        check: "Verify live keys (sk_live_*) ONLY in production"
        environment: "prod"
        expected_key_prefix: "sk_live_"
        actual_key_prefix: null
        verified: false
        
      - id: "STRIPE-003"
        check: "Webhook endpoints are environment-specific"
        expected: |
          local: https://localhost:*/stripe/webhook
          dev: https://dev.interface.tag.ooo/stripe/webhook
          stg: https://billing-stg.interface.tag.ooo/stripe/webhook
          prod: https://billing.interface.tag.ooo/stripe/webhook
        actual: null
        verified: false

  paypal:
    status: "NEEDS_VALIDATION"
    checks:
      - id: "PAYPAL-001"
        check: "Verify sandbox mode in non-production"
        environment: "local,dev,stg"
        expected_mode: "sandbox"
        actual_mode: null
        verified: false
        
      - id: "PAYPAL-002"
        check: "Verify live mode ONLY in production"
        environment: "prod"
        expected_mode: "live"
        actual_mode: null
        verified: false

# ============================================================================
# SECTION 3: Affiliate Data Flow Audit
# ============================================================================
affiliate_data_flow:
  status: "DOCUMENTED"
  last_updated: "2025-12-31"
  concerns:
    - id: "AFF-001"
      concern: "Affiliate commissions calculated using which environment's data?"
      risk: "Dev test data affecting prod commission calculations"
      mitigation: "Ensure affiliate calculations ONLY use production data for payouts"
      
    - id: "AFF-002"
      concern: "Test affiliate accounts in production?"
      risk: "Test commissions being paid out as real money"
      mitigation: "Tag all test affiliates with is_test=true flag, exclude from payouts"
      
    - id: "AFF-003"
      concern: "Commission reporting accuracy"
      risk: "Reports including test transactions"
      mitigation: "Filter reports by environment and test flags"

  data_sources_per_environment:
    local:
      database: "sqlite or local postgres"
      affiliate_data: "mock/seed data only"
      commission_calculation: "disabled"
      
    dev:
      database: "shared dev postgres"
      affiliate_data: "test affiliates only"
      commission_calculation: "simulation mode"
      
    stg:
      database: "stx-aio-0 staging tenant"
      affiliate_data: "copy of prod structure, sanitized data"
      commission_calculation: "simulation mode with real formulas"
      
    prod:
      database: "stx-aio-0 production tenant"
      affiliate_data: "real affiliate accounts"
      commission_calculation: "live - real payouts"

