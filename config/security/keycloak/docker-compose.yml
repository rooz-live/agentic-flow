# Keycloak Identity Provider for RISK-005 Multi-Domain SSO
# Deploy: docker-compose -f config/security/keycloak/docker-compose.yml up -d
# Admin Console: https://auth.interface.tag.ooo/admin
version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: interface-keycloak
    environment:
      # Admin credentials - CHANGE IN PRODUCTION
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      
      # Database configuration
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USERNAME:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak}
      
      # Hostname configuration
      - KC_HOSTNAME=auth.interface.tag.ooo
      - KC_HOSTNAME_STRICT=true
      - KC_HOSTNAME_STRICT_HTTPS=true
      
      # Proxy configuration (behind Nginx/Traefik)
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      
      # Feature flags
      - KC_FEATURES=token-exchange,admin-fine-grained-authz,declarative-user-profile
      
      # Metrics and health
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    command: start
    ports:
      - "8080:8080"
    volumes:
      - ./realm-config:/opt/keycloak/data/import
      - keycloak-data:/opt/keycloak/data
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - sso-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.interface.tag.ooo`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-postgres
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KC_DB_USERNAME:-keycloak}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sso-network

  # Redis for session management
  keycloak-redis:
    image: redis:7-alpine
    container_name: keycloak-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      - keycloak-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sso-network

volumes:
  keycloak-data:
  keycloak-db-data:
  keycloak-redis-data:

networks:
  sso-network:
    driver: bridge
    name: interface-sso-network

