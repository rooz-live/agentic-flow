# STX Health Probe Thresholds Configuration
# This file defines alert thresholds for the STX health monitoring system
#
# Usage:
#   - Set environment variable STX_HEALTH_THRESHOLDS to override the default path
#   - Values are used by scripts/af/stx_health_probes.sh
#
# All values represent percentage thresholds unless otherwise specified

thresholds:
  # CPU utilization thresholds (percentage)
  cpu_warning: 70
  cpu_critical: 90
  
  # Memory utilization thresholds (percentage)
  memory_warning: 75
  memory_critical: 95
  
  # Node health thresholds (count)
  node_not_ready_critical: 1     # Alert if any node is not ready
  
  # Pod health thresholds (count)
  pod_pending_warning: 5         # Warn if more than 5 pods are pending
  pod_failed_critical: 1         # Critical if any pod has failed
  
  # Disk utilization thresholds (percentage)
  disk_warning: 80
  disk_critical: 95

# Probe-specific configurations
probes:
  api_server:
    enabled: true
    timeout_seconds: 10
    # Maximum acceptable latency for API server health check
    latency_warning_ms: 500
    latency_critical_ms: 2000
  
  nodes:
    enabled: true
    # Minimum expected node count (0 = no minimum)
    min_expected_nodes: 1
  
  resources:
    enabled: true
    # Whether to fail if metrics-server is unavailable
    require_metrics_server: false
  
  critical_pods:
    enabled: true
    namespace: kube-system
    # Restart count threshold for container health
    restart_warning: 5
    restart_critical: 10
  
  services:
    enabled: true
    # Services to monitor (must exist and have endpoints)
    monitored:
      - kubernetes
      - prometheus-server
      - prometheus-kube-prometheus-prometheus
      - grafana
      - kube-dns
      - ingress-nginx-controller
  
  dependencies:
    enabled: true
    # Minimum expected etcd members for healthy quorum
    etcd_min_members: 1
    # Minimum expected CoreDNS replicas
    coredns_min_replicas: 1
  
  ingress:
    enabled: true
    # Expected NGINX ingress ports
    http_port: 30080
    https_port: 30443
  
  monitoring:
    enabled: true
    # Expected monitoring stack ports
    prometheus_port: 30060
    grafana_port: 30091

# Alert routing configuration
alerting:
  # Enable Prometheus pushgateway integration
  pushgateway:
    enabled: false
    url: ""  # Set via environment variable PUSHGATEWAY_URL
    job_name: stx_health_probes
  
  # Slack webhook for critical alerts
  slack:
    enabled: false
    webhook_url: ""  # Set via environment variable SLACK_WEBHOOK_URL
    channel: "#stx-alerts"
  
  # PagerDuty integration for critical alerts
  pagerduty:
    enabled: false
    routing_key: ""  # Set via environment variable PAGERDUTY_ROUTING_KEY

# Report generation settings
reporting:
  # Include detailed node information in report
  include_node_details: true
  # Include pod restart counts in report
  include_restart_counts: true
  # Maximum number of pods to include in detailed output
  max_pods_in_report: 50
  # Include service endpoint details
  include_service_endpoints: false
