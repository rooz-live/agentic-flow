schema: version_portfolio.v1
version: 1.0.0
description: Canonical pin + channel for one.sh portfolio (ruflo, AQE, MetaHarness,
  plugins).
actions:
  observe: drift recorded; no file mutation
  propose_sa: drift >= patch; write cycle_proposal hint; requires CYCLE_APPLY=1 to
    render pins
  apply_fa: "human [FA] commit only \u2014 never autonomous tick_post"
blockers:
- id: R-PACK-CORRUPT
  check: .goalie/evidence/disk_steward_latest.json
  field: pack_corrupt
  expect: false
- id: R-DISK-01
  check: .goalie/evidence/ruflo_doctor_latest.json
  field: inbox_zero_gate
  expect: true
- id: AF_SKIP_NETWORK
  env: AF_SKIP_NETWORK
  expect: '0'
- id: COHERENCE
  check: .goalie/evidence/coherence_results.json
  field: coherence
  expect: PASS
packages:
- id: ruflo
  npm: ruflo
  channel: stable
  pin:
    type: env
    file: config/ruflo/version.env
    key: RUFLO_VERSION
  consumers:
  - scripts/ruflo/lib/ruflo_npx.sh
  - scripts/one-sh.d/workflow.sh
- id: agentic-qe
  npm: agentic-qe
  channel: stable
  pin:
    type: regex
    file: scripts/one-sh.d/aqe.sh
    pattern: agentic-qe@([0-9]+\.[0-9]+\.[0-9]+)
  consumers:
  - scripts/one-sh.d/aqe.sh
- id: metaharness-kernel
  npm: '@metaharness/kernel'
  channel: stable
  pin:
    type: json
    file: apps/agent-harness/package.json
    path: dependencies.@metaharness/kernel
  consumers:
  - apps/agent-harness/package.json
- id: metaharness-darwin
  npm: '@metaharness/darwin'
  channel: stable
  pin:
    type: json
    file: apps/agent-harness/package.json
    path: devDependencies.@metaharness/darwin
- id: agenticow
  npm: agentic-flow
  channel: optional
  degraded_ok: true
  pin:
    type: env
    file: config/ruflo/version.env
    key: AGENTICOW_VERSION
  consumers:
  - scripts/ruflo/agenticow_probe.py
- id: metaharness-redblue
  npm: '@metaharness/redblue'
  channel: optional
  degraded_ok: true
  pin:
    type: json
    file: apps/agent-harness/package.json
    path: devDependencies.@metaharness/redblue
  consumers:
  - apps/agent-harness/package.json
  - tests/cicd/test_redblue_mock_judge.sh
- id: metaharness-weight-eft
  npm: '@metaharness/weight-eft'
  channel: optional
  degraded_ok: true
  pin:
    type: json
    file: apps/agent-harness/package.json
    path: devDependencies.@metaharness/weight-eft
  consumers:
  - apps/agent-harness/package.json
  - scripts/cicd/weight_eft_gate.py
- id: impeccable
  npm: impeccable
  channel: latest
  pin:
    type: env
    file: config/versions/impeccable.env
    key: IMPECCABLE_VERSION
  consumers:
  - tests/cicd/test_redblue_mock.sh
  - npx impeccable update
  notes: "P1-IMPECCABLE-01 \u2014 CLI pin via npx impeccable update"
plugins:
  manifest: config/ruflo/plugins.yaml
  install_via: scripts/cicd/ruflo_wsjf_upgrade.sh
  pin_from: ruflo
help_strings:
  file: scripts/one-sh.d/help.sh
  render_from: packages
deprecated_probes:
- path: scripts/auto-update-upstream.sh
  delegate_to: scripts/cicd/version_portfolio_probe.py
