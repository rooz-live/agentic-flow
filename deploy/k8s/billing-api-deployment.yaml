apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
  namespace: billing-sovereign
  labels:
    app: billing-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-api
  template:
    metadata:
      labels:
        app: billing-api
    spec:
      containers:
        - name: billing-api
          image: ghcr.io/rooz-live/billing-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: HOSTBILL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: HOSTBILL_API_KEY
            - name: HOSTBILL_API_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: HOSTBILL_API_URL
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
