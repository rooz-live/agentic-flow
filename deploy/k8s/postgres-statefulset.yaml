apiVersion: v1
kind: Service
metadata:
  name: billing-pg
  namespace: billing-sovereign
  labels:
    app: billing-pg
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: billing-pg
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: billing-pg
  namespace: billing-sovereign
  labels:
    app: billing-pg
spec:
  serviceName: billing-pg
  replicas: 1
  selector:
    matchLabels:
      app: billing-pg
  template:
    metadata:
      labels:
        app: billing-pg
    spec:
      initContainers:
        - name: run-migrations
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h localhost -p 5432; do
                echo "Waiting for postgres to be ready..."
                sleep 2
              done
              echo "Running migrations..."
              # Place migration SQL files in a ConfigMap or mounted volume
              # psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -f /migrations/init.sql
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: billing-pg-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: billing-pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: billing-pg-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
