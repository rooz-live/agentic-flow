apiVersion: apps/v1
kind: Deployment
metadata:
  name: stripe-webhook
  namespace: billing-sovereign
  labels:
    app: stripe-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stripe-webhook
  template:
    metadata:
      labels:
        app: stripe-webhook
    spec:
      containers:
        - name: stripe-webhook
          image: ghcr.io/rooz-live/stripe-webhook:latest
          ports:
            - containerPort: 9090
              protocol: TCP
          env:
            - name: HOSTBILL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: HOSTBILL_API_KEY
            - name: HOSTBILL_API_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: HOSTBILL_API_URL
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
