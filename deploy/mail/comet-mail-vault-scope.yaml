schema: comet.mail.vault.v1
canonical_webmail: https://mail.bhopti.com:2096
source_of_truth: cPanel VM 192.168.122.237 Dovecot maildirs
migration_source: direct_kvm_bridge

jobs:
  - id: comet-mail-bhopti-primary
    enabled: true
    schedule: "0 3 * * *"
    paths: ["/home/bhopti/mail"]
    notes: "~50GB; do not prune IMAP folders on live server"
  - id: comet-mail-all-accounts
    enabled: true
    schedule: "0 4 * * 0"
    paths: ["/home/*/mail"]
    notes: secondary cPanel accounts
verification:
  roam_touch: R-MAIL-01
