# Wave A production — official MailStore Server image (FA: MAILSTORE_IMAGE + license)
services:
  mailstore:
    image: "${MAILSTORE_IMAGE:?set official MailStore image}"
    container_name: mailstore-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      MAILSTORE_ADMIN_PASSWORD: "${MAILSTORE_ADMIN_PASSWORD:?set in .env}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8081/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
