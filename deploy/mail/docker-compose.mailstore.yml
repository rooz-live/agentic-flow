# Wave A — MailStore Server on StarlingX (stx-aio-0)
# Deploy: docker compose -f docker-compose.mailstore.yml up -d
# SoT: cPanel IMAP 192.168.122.237:993 — direct migration

services:
  mailstore:
    image: mailstore/mailstore-server:latest
    container_name: mailstore-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      MAILSTORE_ADMIN_PASSWORD: "${MAILSTORE_ADMIN_PASSWORD:?set in .env}"
    volumes:
      - mailstore_data:/var/lib/mailstore
      - mailstore_logs:/var/log/mailstore
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  mailstore_data:
  mailstore_logs:
