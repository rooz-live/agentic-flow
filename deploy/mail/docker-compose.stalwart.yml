# Wave B — Stalwart skeleton (deferred MTA cutover)
services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart-mail
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - stalwart_data:/opt/stalwart
      - ./stalwart-config.toml:/opt/stalwart/etc/config.toml:ro
    profiles:
      - wave-b

volumes:
  stalwart_data:
