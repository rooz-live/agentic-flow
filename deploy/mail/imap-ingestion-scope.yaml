# Wave A — MailStore IMAP ingestion PI scope (FA configures in admin UI)
schema: mail.imap_ingestion.v1
source_host: cpanel-whm  # use hostname/SNI; bare IP may RST
source_port: 993
protocol: IMAP_SSL
source_of_truth: cPanel Dovecot maildirs

include:
  pattern: "cPanel-hosted @bhopti.com accounts (~31)"
  notes: "Live SoT on KVM guest; never AWS"

exclude_domains:
  - rooz.live
exclude_reason: "R-MAIL-04 — MX Google Workspace; separate SoT; avoid duplicate/stale GW Sent"

profiles:
  - id: mailstore-cpanel-primary
    owner: FA
    schedule: manual_first_run
    verify: "MailStore job log shows successful sync for >=1 non-rooz.live mailbox"

dod:
  evidence: ".goalie/evidence/mail/mailstore_*.json"
  field: imap_ingest_verified
  roam: R13
  requires_public_mailadmin: true
