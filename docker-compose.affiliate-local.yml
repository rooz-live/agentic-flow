version: '3.8'

services:
  affiliate-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.affiliate
    ports:
      - "8001:8001"
    environment:
      - API_PORT=8001
      - ENVIRONMENT=development
      - TENANT_ID=default
    volumes:
      - ./data/affiliate:/data
    command: python3 -m scripts.agentic.affiliate_platform status

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx-affiliate-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - affiliate-api
