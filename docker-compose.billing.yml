version: '3.8'
# Billing Platform — Append-Only Event Store + Migration Runner
# Usage:
#   docker compose -f docker-compose.billing.yml up -d
#   docker compose -f docker-compose.billing.yml run --rm billing-migrate

services:
  billing-postgres:
    image: postgres:16-alpine
    container_name: billing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: billing_events
      POSTGRES_USER: billing_app
      POSTGRES_PASSWORD: ${BILLING_PG_PASSWORD:-billing_dev_only}
    volumes:
      - billing-pg-data:/var/lib/postgresql/data
      - ./docs/sql/event_store_migration.sql:/docker-entrypoint-initdb.d/01_billing_events.sql:ro
    ports:
      - "${BILLING_PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_app -d billing_events"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  billing-migrate:
    image: postgres:16-alpine
    container_name: billing-migrate
    depends_on:
      billing-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${BILLING_PG_PASSWORD:-billing_dev_only}
    volumes:
      - ./docs/sql/event_store_migration.sql:/migrations/event_store_migration.sql:ro
    command: >
      psql -h billing-postgres -U billing_app -d billing_events
           -f /migrations/event_store_migration.sql
           -v ON_ERROR_STOP=1
    restart: "no"

  billing-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-gateway
    depends_on:
      billing-postgres:
        condition: service_healthy
    environment:
      EVENT_STORE_BACKEND: postgres
      DATABASE_URL: postgresql://billing_app:${BILLING_PG_PASSWORD:-billing_dev_only}@billing-postgres:5432/billing_events
      HOSTBILL_API_URL: ${HOSTBILL_API_URL:-http://localhost:9090}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_test}
    ports:
      - "${BILLING_GATEWAY_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import src.billing.invoice_engine\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  billing-pg-data:
    driver: local
