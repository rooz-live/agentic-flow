version: '3.8'

services:
  trading-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.trading-api
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - API_PORT=8000
      - ENVIRONMENT=development
      - PAPER_TRADING=true
      - FMP_API_KEY=${FMP_API_KEY:-demo}
    volumes:
      - ./data:/data
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=trading
      - POSTGRES_PASSWORD=dev_password_only
      - POSTGRES_DB=trading_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
