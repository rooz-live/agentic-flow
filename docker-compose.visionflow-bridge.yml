# VisionFlow Integration Bridge - docker-compose.visionflow-bridge.yml
# Configures network bridge between agentic-flow and VisionFlow for:
# - 3D knowledge graph visualization
# - Neo4j connectivity
# - MCP protocol bridge
# - CUDA 12.4 GPU acceleration
#
# Usage:
#   docker-compose -f docker-compose.visionflow-bridge.yml up -d
#   docker-compose -f docker-compose.visionflow-bridge.yml --profile full up -d
#
# Prerequisites:
#   - VisionFlow submodule: git submodule update --init VisionFlow
#   - Create network: docker network create docker_ragflow

version: '3.8'

services:
  # Neo4j Knowledge Graph Database
  neo4j:
    image: neo4j:5.13-community
    container_name: af-neo4j
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/agentic-flow-dev
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - docker_ragflow
      - af_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Redis for MCP coordination
  mcp-redis:
    image: redis:7-alpine
    container_name: af-mcp-redis
    command: redis-server --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - mcp_redis_data:/data
    networks:
      - docker_ragflow
      - af_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # MCP Bridge Proxy - Routes MCP traffic between agentic-flow and VisionFlow
  mcp-bridge:
    profiles: ["full"]
    image: nginx:alpine
    container_name: af-mcp-bridge
    ports:
      - "9500:9500"  # MCP TCP port
      - "9001:9001"  # MCP WebSocket
    volumes:
      - ./config/mcp-bridge-nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - docker_ragflow
      - af_internal
    depends_on:
      - mcp-redis
    restart: unless-stopped

  # Agentic Flow API Gateway
  af-gateway:
    profiles: ["full"]
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: af-gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - AF_ENVIRONMENT=${AF_ENVIRONMENT:-local}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=agentic-flow-dev
      - REDIS_URL=redis://mcp-redis:6379
      - VISIONFLOW_API=http://webxr:4000
      - MCP_BRIDGE_URL=ws://mcp-bridge:9001
    networks:
      - docker_ragflow
      - af_internal
    depends_on:
      - neo4j
      - mcp-redis
    restart: unless-stopped

networks:
  # External network shared with VisionFlow
  docker_ragflow:
    external: true

  # Internal agentic-flow network
  af_internal:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  mcp_redis_data:

