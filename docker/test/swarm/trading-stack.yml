version: '3.8'

# Trading Stack for Docker Swarm
# Includes: Trading API, IBKR Integration, Database, Monitoring

services:
  # ===========================================================================
  # TRADING API SERVICE
  # ===========================================================================
  trading-api:
    image: trading-api:${VERSION:-latest}
    build:
      context: ../../
      dockerfile: docker/Dockerfile.trading-api
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.trading-api.rule=Host(`trading.${DOMAIN:-localhost}`)"
        - "traefik.http.routers.trading-api.entrypoints=websecure"
        - "traefik.http.routers.trading-api.tls=true"
        - "traefik.http.services.trading-api.loadbalancer.server.port=8000"
    secrets:
      - anthropic_api_key
      - aws_access_key_id
      - aws_secret_access_key
      - ibkr_credentials
    environment:
      - RUST_LOG=info
      - API_PORT=8000
      - ENVIRONMENT=production
      - METRICS_ENABLED=true
      - PROMETHEUS_PORT=9090
    networks:
      - trading_net
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - trading_data:/data

  # ===========================================================================
  # IBKR GATEWAY (Interactive Brokers)
  # ===========================================================================
  ibkr-gateway:
    image: ibkr-gateway:${VERSION:-latest}
    build:
      context: ../../
      dockerfile: docker/Dockerfile.ibkr-gateway
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    secrets:
      - ibkr_credentials
    environment:
      - IBKR_GATEWAY_PORT=4001
      - IBKR_API_PORT=4002
      - TWS_USERID_FILE=/run/secrets/ibkr_credentials
    networks:
      - trading_net
    ports:
      - "4001:4001"
      - "4002:4002"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4001"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # DATABASE (PostgreSQL for production data)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    secrets:
      - postgres_password
    environment:
      - POSTGRES_USER=trading
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=trading_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      - trading_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # REDIS (Caching and Queue)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    command: redis-server --appendonly yes --requirepass changeme
    networks:
      - trading_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # PROMETHEUS (Metrics Collection)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN:-localhost}`)"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - monitoring
    volumes:
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # GRAFANA (Visualization)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-localhost}`)"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_SERVER_ROOT_URL=http://grafana.${DOMAIN:-localhost}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    secrets:
      - grafana_password
    networks:
      - monitoring
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # CADVISOR (Container Metrics)
  # ===========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    command:
      - '--port=8080'
      - '--housekeeping_interval=10s'
      - '--docker_only=true'

  # ===========================================================================
  # TRAEFIK (Reverse Proxy & Load Balancer)
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`traefik.${DOMAIN:-localhost}`)"
        - "traefik.http.routers.api.service=api@internal"
    command:
      - "--api.dashboard=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--metrics.prometheus=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    networks:
      - trading_net
      - monitoring
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certificates

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  trading_net:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.1.0/24
  monitoring:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.2.0/24

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  trading_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  traefik_certs:
    driver: local

# ===========================================================================
# SECRETS (External - Created via 1Password/Passbolt)
# ===========================================================================
secrets:
  anthropic_api_key:
    external: true
  aws_access_key_id:
    external: true
  aws_secret_access_key:
    external: true
  ibkr_credentials:
    external: true
  postgres_password:
    external: true
  grafana_password:
    external: true

# ===========================================================================
# CONFIGS
# ===========================================================================
configs:
  prometheus_config:
    file: ./configs/prometheus.yml
