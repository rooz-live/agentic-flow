version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradingdb
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: paperpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://trader:paperpass@db:5432/tradingdb
      REDIS_URL: redis://redis:6379
volumes:
  postgres_data:
  redis_data: