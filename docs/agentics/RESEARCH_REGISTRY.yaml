# Research / tool harvest registry — feeds WSJF; no mass install in one wave
version: "1.0.0"
updated: "2026-06-02"
policy:
  retain_dont_delete: true
  vectors_authorize_drift_only: false
  hashes_tests_authorize_change: true
  feature_flag_default: off

tiers:
  T0_in_tree:
    description: Already integrated or canonical in Documents/code
    entries:
      - id: gitnexus
        repo: https://github.com/abhigyanpatwari/GitNexus
        maturity: partial
        roi_stream: [platform, cog]
        artifact: .goalie/evidence/
      - id: agentic-qe
        repo: https://github.com/proffesor-for-testing/agentic-qe
        maturity: partial
        roi_stream: [yo.life, platform]
        dor: run npx agentic-qe init --auto once
        dod: .goalie/evidence/agentic-qe-init.json
        feature_flag: agentic_qe_chaos_off_until_phase2
      - id: ruflo-adrs
        repo: https://github.com/ruvnet/ruflo/tree/main/v3/implementation/adrs
        maturity: reference
        roi_stream: [platform]
      - id: beads
        repo: https://github.com/steveyegge/beads
        maturity: integrated
        roi_stream: [delivery]
      - id: compliance_as_code
        path: scripts/governance/compliance_as_code.py
        maturity: production
        roi_stream: [cog, governance]
      - id: continuous_learning_swarm
        path: scripts/cicd/continuous_learning_swarm.sh
        maturity: production
        roi_stream: [cog, platform]

  T1_evaluate_next:
    description: ADR + spike next quarter; one integration per stream
    entries:
      - id: temporal
        repo: temporal-sdk
        maturity: low
        roi_stream: [agentic-flow, affiliate]
        dor: schema_locked_workflow
      - id: dbos
        url: https://docs.dbos.dev/python/reference/queues
        maturity: low
        roi_stream: [billing, platform]
      - id: hf_jobs
        skill: hugging-face-jobs
        maturity: low
        roi_stream: [research, ml]
      - id: agentic-jujutsu
        crates: https://crates.io/crates/agentic-jujutsu
        maturity: watch
        roi_stream: [platform]
      - id: openenv
        repo: https://github.com/meta-pytorch/OpenEnv
        maturity: watch
        roi_stream: [qe]
      - id: gitnexus-vercel
        url: https://gitnexus.vercel.app/
        maturity: watch
        roi_stream: [platform]
      - id: risk-analytics
        repo: https://github.com/rooz-live/risk-analytics
        maturity: partial
        roi_stream: [yo.life, stx]
        artifact: docs/BLOCKERS_RESOLVED.md
      - id: opencode-router
        repo: https://github.com/musistudio/claude-code-router
        maturity: watch
        roi_stream: [devx]

  T2_watchlist:
    description: Arxiv, marketplaces, skills.sh — no install without WSJF approval
    entries:
      - id: arxiv-meta-harness
        arxiv: "arXiv:2603.28052"
        title: Meta-Harness End-to-End Optimization of Model Harnesses
      - id: anthropic-agent-evals
        url: https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents
      - id: mcp-apps
        url: https://blog.modelcontextprotocol.io/posts/2026-01-26-mcp-apps/
      - id: skills-sh
        url: https://skills.sh
      - id: subagents-cc
        url: https://subagents.cc/
      - id: wolfram-cag
        url: https://writings.stephenwolfram.com/2026/02/making-wolfram-tech-available-as-a-foundation-tool-for-llm-systems/
        note: computation-augmented generation reference

streams:
  yo_life_roi: [cog, affiliate, billing, artchat]
  summerjobswap: feature_flag_off_in_cls
  stx_openstack: separate_pi_cadence
  immutable_pg_k6: later_bucket

pubmed_reembed:
  trigger: agentdb_freshness_days_gt_7
  dlq_on: storage_exhaustion
  batch_spec_only: true

dlq:
  path: .goalie/evidence/learning/dlq.jsonl
  breakthrough_threshold: 3
  window_runs: 10
