# TUI Framework Evaluation Matrix
# Comparing Textual, Urwid, Bubbletea (Go), and Ratatui (Rust)

evaluation_criteria:
  python_compatibility: "Weight: HIGH - Must work seamlessly with Python codebase"
  performance: "Weight: MEDIUM - Terminal UI performance matters but not critical"
  widget_library: "Weight: HIGH - Rich widget set reduces development time"
  documentation: "Weight: HIGH - Critical for rapid development"
  community: "Weight: MEDIUM - Affects long-term maintenance"
  async_support: "Weight: HIGH - Required for concurrent operations"
  testing: "Weight: MEDIUM - Need automated testing capabilities"

frameworks:
  textual:
    name: "Textual"
    language: "Python"
    version: "0.89.x"
    maintainer: "Textualize.io (Will McGugan - Rich creator)"
    
    python_compatibility:
      score: 10
      notes: "Native Python, async/await support, works with existing code"
      integration: "Direct import, no FFI overhead"
      
    performance:
      score: 8
      notes: "Excellent for Python TUI, uses Rich for rendering"
      benchmarks: "Handles 60fps updates, efficient terminal drawing"
      
    widget_library:
      score: 10
      notes: "Comprehensive built-in widgets"
      widgets:
        - "DataTable (perfect for search results)"
        - "Tree (file navigation)"
        - "Input, Button, Select, Checkbox"
        - "ProgressBar (for search progress)"
        - "Log, RichLog (for output)"
        - "Header, Footer, Sidebar"
        - "Modal dialogs"
        - "Custom widgets via composition"
        
    documentation:
      score: 9
      notes: "Excellent docs, tutorials, examples"
      resources:
        - "https://textual.textualize.io/"
        - "Interactive examples in docs"
        - "Active Discord community"
        
    async_support:
      score: 10
      notes: "Built on asyncio, first-class async support"
      features: "Async message handlers, workers for background tasks"
      
    testing:
      score: 9
      notes: "Pilot testing framework for automated UI tests"
      capabilities: "Simulate user input, verify UI state"
      
    learning_curve:
      score: 8
      notes: "Steeper than basic TUI but well documented"
      
    ecosystem:
      score: 9
      notes: "Part of Rich ecosystem, active development"
      
    pros:
      - "Native Python - zero FFI overhead"
      - "Best widget library for Python"
      - "Excellent async support for concurrent operations"
      - "Built-in testing framework"
      - "Active development and community"
      - "Works with existing code_search/doc_query"
      
    cons:
      - "Younger than Urwid (but more modern)"
      - "May be overkill for simple UIs"
      
    total_score: 9.0
    recommendation: "PRIMARY CHOICE for Python integration"

  urwid:
    name: "Urwid"
    language: "Python"
    version: "2.6.x"
    maintainer: "Community maintained"
    
    python_compatibility:
      score: 10
      notes: "Native Python, mature library"
      
    performance:
      score: 7
      notes: "Good performance, but older architecture"
      
    widget_library:
      score: 7
      notes: "Comprehensive but dated API"
      widgets:
        - "ListBox (for results)"
        - "Edit, Button, CheckBox"
        - "TreeWidget"
        - "ProgressBar"
        - "Custom widgets possible"
        
    documentation:
      score: 6
      notes: "Complete but dated, fewer examples"
      
    async_support:
      score: 6
      notes: "Has event loop but not asyncio-native"
      
    testing:
      score: 7
      notes: "Can be tested but not as clean as Textual"
      
    learning_curve:
      score: 6
      notes: "Steeper due to older API patterns"
      
    ecosystem:
      score: 6
      notes: "Mature but slower development pace"
      
    pros:
      - "Very stable and battle-tested"
      - "Works on many terminal types"
      - "Lower resource usage"
      
    cons:
      - "Older API design patterns"
      - "Not asyncio-native"
      - "Less active development"
      - "Harder to integrate with modern async code"
      
    total_score: 7.0
    recommendation: "FALLBACK if Textual has issues"

  bubbletea:
    name: "Bubbletea (Bubble Tea)"
    language: "Go"
    version: "1.x"
    maintainer: "Charm (charmbracelet)"
    
    python_compatibility:
      score: 2
      notes: "Requires Go rewrite or FFI/subprocess bridge"
      integration: "Would need to rebuild tools in Go or use complex bridge"
      
    performance:
      score: 10
      notes: "Excellent performance, Go's concurrency"
      
    widget_library:
      score: 8
      notes: "Good widget library via Bubbles and Lip Gloss"
      
    documentation:
      score: 9
      notes: "Excellent docs and examples"
      
    async_support:
      score: 9
      notes: "Go goroutines, excellent concurrency"
      
    testing:
      score: 8
      notes: "Standard Go testing applies"
      
    learning_curve:
      score: 4
      notes: "Requires learning Go + Elm architecture"
      
    ecosystem:
      score: 9
      notes: "Part of Charm suite, very active"
      
    pros:
      - "Excellent performance"
      - "Beautiful default styling"
      - "Modern architecture (Elm-inspired)"
      - "Great for new Go projects"
      
    cons:
      - "Requires complete rewrite in Go"
      - "Cannot easily integrate with Python code"
      - "FFI bridge would negate performance benefits"
      - "Significant development overhead"
      
    total_score: 4.5
    recommendation: "NOT RECOMMENDED - language barrier too high"

  ratatui:
    name: "Ratatui"
    language: "Rust"
    version: "0.29.x"
    maintainer: "Community (fork of tui-rs)"
    
    python_compatibility:
      score: 3
      notes: "Requires Rust rewrite or PyO3 bindings"
      integration: "Complex FFI layer needed"
      
    performance:
      score: 10
      notes: "Excellent performance, Rust's efficiency"
      
    widget_library:
      score: 7
      notes: "Good basic widgets, growing ecosystem"
      
    documentation:
      score: 8
      notes: "Good docs, many examples"
      
    async_support:
      score: 9
      notes: "Tokio runtime, excellent async"
      
    testing:
      score: 8
      notes: "Rust testing framework"
      
    learning_curve:
      score: 3
      notes: "Requires learning Rust + borrowing"
      
    ecosystem:
      score: 8
      notes: "Active Rust TUI ecosystem"
      
    pros:
      - "Excellent performance and memory safety"
      - "Modern architecture"
      - "Good for performance-critical UIs"
      
    cons:
      - "Requires complete rewrite in Rust"
      - "PyO3 bindings complex to maintain"
      - "Cannot easily access Python code"
      - "Very high development overhead"
      
    total_score: 4.0
    recommendation: "NOT RECOMMENDED - language barrier too high"

# Decision Matrix Scoring
decision_matrix:
  weights:
    python_compatibility: 0.30
    widget_library: 0.25
    documentation: 0.15
    async_support: 0.15
    performance: 0.10
    testing: 0.05
  
  weighted_scores:
    textual: 9.0
    urwid: 7.0
    bubbletea: 4.5
    ratatui: 4.0

# Final Recommendation
recommendation:
  primary: "Textual"
  rationale:
    - "Native Python integration - zero friction with existing code"
    - "Best widget library for our use case (DataTable, Tree, ProgressBar)"
    - "First-class async support matches code_search/doc_query architecture"
    - "Built-in testing framework for automated validation"
    - "Active development and excellent documentation"
    - "Can start simple and add complexity as needed"
    
  fallback: "Urwid"
  fallback_rationale:
    - "If Textual has terminal compatibility issues"
    - "If we need minimal dependencies"
    - "More stable but less feature-rich"
    
  reject: ["Bubbletea", "Ratatui"]
  reject_rationale:
    - "Language barrier too high (Go/Rust)"
    - "Would require complete rewrite"
    - "Cannot leverage existing Python code"
    - "Development time >> value delivered"

# Implementation Plan
implementation_plan:
  phase_1:
    goal: "Basic prototype with Textual"
    duration: "2-3 days"
    tasks:
      - "Install textual: pip install textual"
      - "Create basic app shell with header/footer"
      - "Add search input widget"
      - "Display results in DataTable"
      - "Test integration with code_search.py"
      
  phase_2:
    goal: "Enhanced features"
    duration: "3-5 days"
    tasks:
      - "Add file tree navigation"
      - "Implement real-time progress bar"
      - "Add keyboard shortcuts"
      - "Syntax highlighting in results"
      - "Test with doc_query.py"
      
  phase_3:
    goal: "Polish and testing"
    duration: "2-3 days"
    tasks:
      - "Write automated UI tests"
      - "Performance optimization"
      - "Error handling and edge cases"
      - "Documentation and examples"

# Quick Start Commands
quick_start:
  install: "pip install textual textual-dev"
  create_app: "textual create app"
  run_app: "textual run app.py"
  debug: "textual console"
  test: "pytest tests/test_tui.py"
