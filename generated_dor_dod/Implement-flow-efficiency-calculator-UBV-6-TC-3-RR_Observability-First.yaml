# DoR/DoD for: Implement flow efficiency calculator (UBV: 6, TC: 3, RR: 3, Size: 2)
# Pattern: Observability-First
# Auto-generated from template

definition_of_ready:
  - criterion: Metrics defined
    description: All key metrics identified with units and thresholds
    validation: Metrics schema documented
  - criterion: Baseline captured
    description: Pre-change baseline measurements recorded
    validation: Baseline data exists in metrics DB
  - criterion: Dashboards created
    description: Grafana/monitoring dashboards prepared
    validation: Dashboard JSON exists and is importable

definition_of_done:
  - criterion: Metrics emitting
    description: All defined metrics flowing to telemetry system
    validation: Metrics visible in last 5 minutes
    command: "python3 scripts/metrics/verify_metrics.py --module {{module}} --window 5m"
    blocking: True
  - criterion: Alerting configured
    description: Critical metric thresholds trigger alerts
    validation: Alert rules deployed and tested
    command: "python3 scripts/metrics/test_alerts.py --module {{module}}"
    blocking: True
  - criterion: Baseline comparison
    description: Post-change metrics compared to baseline
    validation: Regression analysis shows acceptable delta
    command: "python3 scripts/metrics/compare_baseline.py --module {{module}}"
    blocking: True
  - criterion: Logs structured
    description: JSON-formatted logs with trace IDs
    validation: Logs parseable and contain required fields
    command: "python3 scripts/logs/validate_structure.py --module {{module}}"
    blocking: False
  - criterion: Documentation updated
    description: Metrics catalog and runbooks current
    validation: Metrics documented in catalog
    blocking: False
