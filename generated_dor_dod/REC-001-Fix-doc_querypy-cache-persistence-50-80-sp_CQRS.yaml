# Pattern: CQRS
# Auto-generated from template

definition_of_ready:
  - criterion: Read/write patterns identified
    description: Which operations are commands vs queries?
    validation: Command and query lists documented
  - criterion: Sync strategy defined
    description: How to keep read model synchronized with write model?
    validation: Synchronization approach specified (sync/async/eventual)
  - criterion: Storage strategy selected
    description: Same or separate databases for read/write?
    validation: Storage topology documented

definition_of_done:
  - criterion: Command model implemented
    description: Write operations go through command model
    validation: Commands modify only write model
    command: "pytest tests/test_cqrs.py::test_command_writes"
    blocking: True
  - criterion: Query model implemented
    description: Read operations use query model
    validation: Queries read only from query model
    command: "pytest tests/test_cqrs.py::test_query_reads"
    blocking: True
  - criterion: Synchronization working
    description: Read model reflects write model changes
    validation: Query results match expected state after commands
    command: "pytest tests/test_cqrs.py::test_read_write_consistency"
    blocking: True
  - criterion: Performance improved
    description: Read queries faster than before CQRS
    validation: Query latency reduced by >30%
    command: "pytest tests/test_cqrs.py::test_query_performance"
    blocking: False
  - criterion: Telemetry tracking separation
    description: Command/query metrics tracked separately
    validation: Separate metrics for commands vs queries
    command: "grep -E '(command_executed|query_executed)' logs/telemetry.jsonl | jq '.operation_type'"
    blocking: False
