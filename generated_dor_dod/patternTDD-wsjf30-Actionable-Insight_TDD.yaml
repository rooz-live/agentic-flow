# DoR/DoD for: #pattern:TDD #wsjf:3.0 Actionable Insight
# Pattern: TDD
# Auto-generated from template

definition_of_ready:
  - criterion: Test cases written
    description: All test cases documented in test file
    validation: Test file exists and contains test stubs
  - criterion: Test data prepared
    description: Fixtures and mocks defined
    validation: Test fixtures exist or mocks configured
  - criterion: Acceptance criteria clear
    description: Success criteria explicitly stated
    validation: DoD section populated with measurable criteria

definition_of_done:
  - criterion: All tests pass
    description: Full test suite executes successfully
    validation: pytest returns 0 exit code
    command: "pytest tests/{{module}}/test_{{feature}}.py -v"
    blocking: True
  - criterion: Code coverage >= 80%
    description: New code has adequate test coverage
    validation: Coverage report shows >= 80%
    command: "pytest tests/{{module}}/test_{{feature}}.py --cov={{module}} --cov-report=term"
    blocking: True
  - criterion: No regressions
    description: Existing tests still pass
    validation: Full test suite passes
    command: "pytest tests/ -v"
    blocking: True
  - criterion: Code reviewed
    description: At least one team member reviewed changes
    validation: PR approved or manual sign-off
    blocking: False
  - criterion: Documentation updated
    description: README or docstrings reflect changes
    validation: Relevant docs updated
    blocking: False
