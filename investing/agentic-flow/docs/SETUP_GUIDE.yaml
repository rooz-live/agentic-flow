# Setup Guide for TUI, Break-Glass, and Pre-Commit Hooks
# Quick reference for installation and usage

tui_setup:
  title: "Textual TUI for Code Search"
  
  installation:
    step1:
      command: "pip install textual textual-dev"
      description: "Install Textual framework"
      
    step2:
      command: "chmod +x scripts/search_tui.py"
      description: "Make TUI executable"
  
  usage:
    basic:
      command: "python scripts/search_tui.py"
      description: "Launch interactive search TUI"
      
    from_directory:
      command: "cd investing/agentic-flow && python scripts/search_tui.py"
      description: "Run from project root"
  
  keyboard_shortcuts:
    - "Ctrl+S: Switch between code search and doc query modes"
    - "Ctrl+Q: Quit application"
    - "Ctrl+C: Quit application"
    - "Enter: Execute search (in input field)"
    - "Tab: Cycle through results"
    - "Arrow keys: Navigate results table"
  
  features:
    - "Real-time search with progress bar"
    - "Statistics sidebar showing performance metrics"
    - "Tabbed results view with details pane"
    - "Switch between code_search and doc_query modes"
    - "Cache hit rate display"
    - "Performance indicators (✅ <1s or ⚠️ >1s)"

break_glass_setup:
  title: "Break-Glass Audit Logging"
  
  installation:
    step1:
      command: "chmod +x scripts/break_glass.py"
      description: "Make break-glass script executable"
  
  usage:
    view_audit_log:
      command: "python scripts/break_glass.py --recent 10"
      description: "Show last 10 break-glass operations"
      
    verify_integrity:
      command: "python scripts/break_glass.py --verify"
      description: "Verify audit log integrity"
      exit_codes:
        - "0: Integrity verified"
        - "1: Integrity check failed"
  
  integration:
    decorator_usage:
      example: |
        from break_glass import require_break_glass, BreakGlassOperation
        
        @require_break_glass(operation=BreakGlassOperation.INSTALL_PACKAGES)
        def install_packages():
            subprocess.run(["apt", "install", "docker-ce"])
    
    function_usage:
      example: |
        from break_glass import check_break_glass, BreakGlassOperation
        
        check_break_glass(
            operation=BreakGlassOperation.RESTART_SERVICE,
            command="systemctl restart nginx"
        )
  
  environment_variables:
    required:
      AF_BREAK_GLASS: "Must be set to '1'"
      AF_BREAK_GLASS_REASON: "Free-text reason for operation"
      AF_CHANGE_TICKET: "Ticket ID (e.g., INC-2024-001)"
    
    alternative:
      AF_CAB_APPROVAL_ID: "Alternative to AF_CHANGE_TICKET"
    
    example:
      command: |
        AF_BREAK_GLASS=1 \
        AF_BREAK_GLASS_REASON="Emergency nginx restart for memory leak" \
        AF_CHANGE_TICKET="INC-2024-042" \
        systemctl restart nginx
  
  operations:
    critical:
      - "drop_database"
      - "delete_namespace"
      - "disable_docker"
    
    high:
      - "install_packages"
      - "remove_packages"
      - "restart_service"
      - "modify_kubelet"
      - "modify_kubeconfig"
      - "modify_schema"
      - "modify_firewall"
    
    medium:
      - "stop_service"
      - "change_runtime"
      - "change_network"

pre_commit_setup:
  title: "Pre-Commit Hooks"
  
  installation:
    step1:
      command: "chmod +x .git-hooks/pre-commit"
      description: "Make hook executable"
      
    step2:
      command: "cd investing/agentic-flow && git config core.hooksPath .git-hooks"
      description: "Configure git to use custom hooks directory"
      note: "Run from project root (investing/agentic-flow)"
  
  verification:
    command: "git config core.hooksPath"
    expected_output: ".git-hooks"
  
  validation_checks:
    check1:
      name: "Secrets Detection"
      description: "Scans for hardcoded passwords, API keys, tokens"
      patterns:
        - "password = 'value'"
        - "api_key = 'value'"
        - "AWS_SECRET_ACCESS_KEY"
        - "ANTHROPIC_API_KEY"
        - "BEGIN RSA PRIVATE KEY"
    
    check2:
      name: "Linting"
      description: "Runs ruff or flake8 on staged Python files"
      tools:
        - "ruff (preferred)"
        - "flake8 (fallback)"
    
    check3:
      name: "Tests"
      description: "Runs pytest on corresponding test files"
      scope: "Only tests for modified files"
    
    check4:
      name: "DoD Criteria"
      description: "Validates performance baselines for critical files"
      critical_files:
        - "code_search.py"
        - "doc_query.py"
    
    check5:
      name: "Break-Glass Audit"
      description: "Verifies audit log integrity"
  
  bypass:
    command: "git commit --no-verify"
    warning: "NOT RECOMMENDED - Only use in emergencies"
  
  troubleshooting:
    issue1:
      problem: "Hook not running"
      solution: "Verify hooksPath with: git config core.hooksPath"
      
    issue2:
      problem: "Permission denied"
      solution: "chmod +x .git-hooks/pre-commit"
      
    issue3:
      problem: "Tests failing"
      solution: "Fix tests before committing or use --no-verify (not recommended)"

quick_start:
  title: "Quick Start Commands"
  
  tui:
    description: "Launch search TUI"
    command: "python scripts/search_tui.py"
    
  break_glass:
    description: "Check audit log"
    command: "python scripts/break_glass.py --recent 5"
    
  pre_commit:
    description: "Install hooks"
    commands:
      - "chmod +x .git-hooks/pre-commit"
      - "git config core.hooksPath .git-hooks"
  
  test_setup:
    description: "Verify everything works"
    commands:
      - "python scripts/search_tui.py # Should launch TUI"
      - "python scripts/break_glass.py --verify # Should verify audit"
      - "git commit -m 'test' # Should run pre-commit checks"

integration_examples:
  
  example1_tui_search:
    title: "Interactive Code Search"
    steps:
      - "Launch TUI: python scripts/search_tui.py"
      - "Enter pattern: 'def.*search'"
      - "Press Enter or click Search button"
      - "View results in table, stats in sidebar"
      - "Press Ctrl+S to switch to doc query mode"
      - "Enter query: 'DoD.*criteria'"
      - "Press Ctrl+Q to quit"
  
  example2_break_glass_protected:
    title: "Protected Package Installation"
    steps:
      - "Try without approval: ./deploy.sh install-docker"
      - "Should fail with break-glass error"
      - "Set environment variables:"
      - "  export AF_BREAK_GLASS=1"
      - "  export AF_BREAK_GLASS_REASON='Installing Docker for prod deployment'"
      - "  export AF_CHANGE_TICKET='CHG-2024-123'"
      - "Retry: ./deploy.sh install-docker"
      - "Check audit: python scripts/break_glass.py --recent 1"
  
  example3_pre_commit_workflow:
    title: "Code Commit Workflow"
    steps:
      - "Make changes: vim scripts/code_search.py"
      - "Stage changes: git add scripts/code_search.py"
      - "Attempt commit: git commit -m 'Improve search performance'"
      - "Hook runs automatically:"
      - "  ✅ Checks for secrets"
      - "  ✅ Runs linting"
      - "  ✅ Runs tests"
      - "  ✅ Validates DoD"
      - "  ✅ Verifies break-glass audit"
      - "If all pass: commit succeeds"
      - "If any fail: fix issues and retry"

troubleshooting:
  common_issues:
    
    tui_import_error:
      symptom: "ModuleNotFoundError: No module named 'textual'"
      solution: "pip install textual textual-dev"
      
    tui_slow_search:
      symptom: "Search takes >5 seconds"
      solution: "Check max_depth setting, reduce to 5-8"
      
    break_glass_blocked:
      symptom: "BreakGlassError raised"
      solution: "Set required environment variables (AF_BREAK_GLASS, AF_BREAK_GLASS_REASON, AF_CHANGE_TICKET)"
      
    pre_commit_not_running:
      symptom: "Commits succeed without hook checks"
      solution: "git config core.hooksPath .git-hooks"
      
    tests_failing:
      symptom: "pytest errors in pre-commit"
      solution: "Run pytest manually to debug: pytest tests/perf/test_baseline_performance.py -v"

maintenance:
  
  update_tui:
    command: "pip install --upgrade textual"
    frequency: "Monthly or when bugs fixed"
    
  audit_log_cleanup:
    command: "# Archive old entries (keep last 1000)"
    script: |
      tail -1000 .goalie/break_glass_audit.jsonl > /tmp/audit.jsonl
      mv /tmp/audit.jsonl .goalie/break_glass_audit.jsonl
    frequency: "Quarterly"
    
  hook_updates:
    description: "Update pre-commit hook when validation rules change"
    command: "Edit .git-hooks/pre-commit and test with: git commit --dry-run"
