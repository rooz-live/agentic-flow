apiVersion: apps/v1
kind: Deployment
metadata:
  name: orocrm
  namespace: greenfield-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orocrm
  template:
    metadata:
      labels:
        app: orocrm
    spec:
      containers:
      - name: orocrm
        image: php:8.2-fpm
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://oro:oro_secure_password@postgres-oro:5432/orocrm"
---
apiVersion: v1
kind: Service
metadata:
  name: orocrm
  namespace: greenfield-apps
spec:
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: orocrm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stripe-webhook
  namespace: greenfield-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stripe-webhook
  template:
    metadata:
      labels:
        app: stripe-webhook
    spec:
      containers:
      - name: stripe-webhook
        image: python:3.9-slim
        command: ["python3", "-m", "http.server", "5000"]
        ports:
        - containerPort: 5000
        env:
        - name: STRIPE_WEBHOOK_SECRET
          value: "whsec_placeholder"
---
apiVersion: v1
kind: Service
metadata:
  name: stripe-webhook
  namespace: greenfield-apps
spec:
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: stripe-webhook
---
# Ingress Extension for Oro and Stripe
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greenfield-payment-crm-ingress
  namespace: greenfield-apps
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - greenfield-oro.interface.tag.ooo
    - greenfield-stripe.interface.tag.ooo
    secretName: greenfield-payment-crm-tls
  rules:
  - host: greenfield-oro.interface.tag.ooo
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: orocrm
            port:
              number: 80
  - host: greenfield-stripe.interface.tag.ooo
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stripe-webhook
            port:
              number: 80
