---
# billing-secrets — DO NOT COMMIT REAL VALUES
# Create in cluster:
#   kubectl create secret generic billing-secrets \
#     --namespace billing \
#     --from-literal=database-url="postgresql://billing_app:PASS@billing-postgres:5432/billing_events" \
#     --from-literal=stripe-webhook-secret="whsec_REAL_VALUE" \
#     --from-literal=hostbill-api-url="https://billing.bhopti.com/api/index.php" \
#     --from-literal=hostbill-api-key="REAL_API_KEY" \
#     --from-literal=hostbill-api-id="REAL_API_ID"
#
# GitHub Actions: add as repository secrets:
#   BILLING_PG_PASSWORD, STRIPE_WEBHOOK_SECRET,
#   HOSTBILL_API_URL, HOSTBILL_API_KEY, HOSTBILL_API_ID
apiVersion: v1
kind: Secret
metadata:
  name: billing-secrets
  namespace: billing
  annotations:
    note: "Replace all PLACEHOLDER values before applying"
type: Opaque
stringData:
  database-url: "postgresql://billing_app:PLACEHOLDER@billing-postgres:5432/billing_events"
  stripe-webhook-secret: "whsec_PLACEHOLDER"
  hostbill-api-url: "https://billing.bhopti.com/api/index.php"
  hostbill-api-key: "PLACEHOLDER"
  hostbill-api-id: "PLACEHOLDER"
