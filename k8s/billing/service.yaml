---
apiVersion: v1
kind: Service
metadata:
  name: billing-gateway
  namespace: billing
  labels:
    app: billing-gateway
    app.kubernetes.io/part-of: billing-platform
spec:
  selector:
    app: billing-gateway
  ports:
    - name: http
      port: 80
      targetPort: 9090
  type: ClusterIP
---
# ExternalName bridge to OroCRM (crm.bhopti.com)
apiVersion: v1
kind: Service
metadata:
  name: orocrm-bridge
  namespace: billing
  annotations:
    desc: "Bridge to OroCRM for customer relationship data during invoice generation"
spec:
  type: ExternalName
  externalName: crm.bhopti.com
---
# ExternalName bridge to HostBill (billing.bhopti.com)
apiVersion: v1
kind: Service
metadata:
  name: hostbill-bridge
  namespace: billing
  annotations:
    desc: "Bridge to HostBill for metered usage emission (emit_to_hostbill)"
spec:
  type: ExternalName
  externalName: billing.bhopti.com
