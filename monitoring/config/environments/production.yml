# Production Environment Configuration
environment: production

# Service Configuration
service:
  name: agentic-flow
  version: 2.4.0
  replicas: 3
  
# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    retention: 30d
    scrape_interval: 15s
    evaluation_interval: 15s
    
  grafana:
    enabled: true
    admin_user: admin
    admin_password: ${GRAFANA_ADMIN_PASSWORD}
    
  alertmanager:
    enabled: true
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_username: ${SMTP_USERNAME}
    smtp_password: ${SMTP_PASSWORD}
    
  jaeger:
    enabled: true
    sampling_rate: 0.1
    retention: 7d
    
  elasticsearch:
    enabled: true
    replicas: 3
    heap_size: 1g
    retention: 30d
    
  logstash:
    enabled: true
    replicas: 2
    workers: 4
    
  kibana:
    enabled: true
    replicas: 2

# Resource Limits
resources:
  prometheus:
    cpu: 500m
    memory: 2Gi
    storage: 100Gi
    
  grafana:
    cpu: 200m
    memory: 512Mi
    
  alertmanager:
    cpu: 100m
    memory: 256Mi
    
  jaeger:
    cpu: 500m
    memory: 1Gi
    storage: 50Gi
    
  elasticsearch:
    cpu: 2000m
    memory: 4Gi
    storage: 500Gi
    
  logstash:
    cpu: 500m
    memory: 1Gi
    
  kibana:
    cpu: 500m
    memory: 1Gi

# Alerting Rules
alerting:
  critical:
    channels: [email, slack, discord, pagerduty]
    escalation_delay: 5m
    auto_remediation: true
    
  warning:
    channels: [email, slack]
    escalation_delay: 15m
    auto_remediation: false
    
  info:
    channels: [email]
    escalation_delay: 1h
    auto_remediation: false

# Security Configuration
security:
  enable_monitoring: true
  enable_anomaly_detection: true
  enable_threat_intelligence: true
  rate_limiting:
    enabled: true
    window: 1m
    thresholds:
      login_attempts: 5
      api_requests: 100
      failed_auth: 10
      
  ip_blocking:
    enabled: true
    auto_block_threshold: 10
    block_duration: 1h
    
  geo_blocking:
    enabled: false
    blocked_countries: []

# Automation Configuration
automation:
  enabled: true
  self_healing: true
  auto_scaling:
    enabled: true
    min_replicas: 2
    max_replicas: 10
    scale_up_threshold: 80
    scale_down_threshold: 20
    cooldown: 5m
    
  auto_restart:
    enabled: true
    max_retries: 3
    restart_delay: 30s
    
  auto_cleanup:
    enabled: true
    cleanup_interval: 1h
    retention_days: 7

# Backup Configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 30
  storage_class: standard
  encryption: true

# Performance Monitoring
performance:
  apm:
    enabled: true
    sample_rate: 0.1
    trace_timeout: 30s
    
  profiling:
    enabled: false
    duration: 30s
    interval: 1h
    
  slo_monitoring:
    enabled: true
    objectives:
      - name: http_request_latency
        target: 0.95
        window: 30d
        alert_burn_rate: 0.01
      - name: http_availability
        target: 0.999
        window: 30d
        alert_burn_rate: 0.01

# Business Intelligence
business_intelligence:
  enabled: true
  metrics:
    - agent_tasks_completed
    - governance_decisions
    - trading_volume
    - payment_success_rate
    - user_engagement
    - system_uptime
    
  dashboards:
    - executive_overview
    - operational_metrics
    - business_analytics
    - security_dashboard
    - performance_dashboard

# Compliance
compliance:
  audit_logging: true
  data_retention_days: 90
  gdpr_compliance: true
  hipaa_compliance: false
  soc2_compliance: true
  
# Notification Channels
notifications:
  email:
    enabled: true
    smtp_server: smtp.gmail.com
    smtp_port: 587
    use_tls: true
    from_address: noreply@agentic-flow.com
    
  slack:
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: "#alerts"
    
  discord:
    enabled: true
    webhook_url: ${DISCORD_WEBHOOK_URL}
    
  pagerduty:
    enabled: false
    integration_key: ${PAGERDUTY_INTEGRATION_KEY}
    
  webhook:
    enabled: true
    endpoints:
      - name: security_alerts
        url: ${SECURITY_WEBHOOK_URL}
        headers:
          Authorization: "Bearer ${WEBHOOK_AUTH_TOKEN}"
      - name: business_alerts
        url: ${BUSINESS_WEBHOOK_URL}
        headers:
          Authorization: "Bearer ${WEBHOOK_AUTH_TOKEN}"

# High Availability
high_availability:
  enabled: true
  zones: 3
  failover: true
  health_check_interval: 30s
  disaster_recovery: true
  
# Scaling Policies
scaling:
  auto_scaling:
    enabled: true
    min_replicas: 2
    max_replicas: 10
    target_cpu: 70
    target_memory: 80
    scale_up_cooldown: 5m
    scale_down_cooldown: 15m
    
  load_balancing:
    enabled: true
    algorithm: round_robin
    health_check_interval: 10s
    session_affinity: false

# Storage Configuration
storage:
  logs:
    type: elasticsearch
    retention_days: 30
    storage_class: standard
    
  metrics:
    type: prometheus
    retention_days: 30
    storage_class: standard
    
  traces:
    type: jaeger
    retention_days: 7
    storage_class: standard
    
  backups:
    type: s3
    bucket: agentic-flow-backups
    retention_days: 90
    encryption: true