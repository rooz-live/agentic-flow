input {
  # Beats input for filebeat
  beats {
    port => 5044
  }

  # TCP input for structured logs
  tcp {
    port => 5000
    codec => json
  }

  # UDP input for syslog
  udp {
    port => 5000
    codec => json
  }

  # HTTP input for application logs
  http {
    port => 8080
    codec => json
  }

  # File input for local logs
  file {
    path => "/var/log/agentic-flow/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
  }

  # Docker container logs
  docker {
    path => "/var/lib/docker/containers/*/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/docker_sincedb"
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Parse timestamp
  if [parsed][timestamp] {
    date {
      match => [ "[parsed][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  } else if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Parse log levels
  if [parsed][level] {
    mutate {
      add_field => { "log_level" => "%{[parsed][level]}" }
    }
  } else if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }

  # Parse service name
  if [parsed][service] {
    mutate {
      add_field => { "service" => "%{[parsed][service]}" }
    }
  } else if [service] {
    mutate {
      add_field => { "service" => "%{service}" }
    }
  }

  # Parse trace and span IDs
  if [parsed][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{[parsed][trace_id]}" }
    }
  }

  if [parsed][span_id] {
    mutate {
      add_field => { "span_id" => "%{[parsed][span_id]}" }
    }
  }

  # Parse user information
  if [parsed][user_id] {
    mutate {
      add_field => { "user_id" => "%{[parsed][user_id]}" }
    }
  }

  if [parsed][user_email] {
    mutate {
      add_field => { "user_email" => "%{[parsed][user_email]}" }
    }
  }

  # Parse request information
  if [parsed][request_id] {
    mutate {
      add_field => { "request_id" => "%{[parsed][request_id]}" }
    }
  }

  if [parsed][method] {
    mutate {
      add_field => { "http_method" => "%{[parsed][method]}" }
    }
  }

  if [parsed][url] {
    mutate {
      add_field => { "http_url" => "%{[parsed][url]}" }
    }
  }

  if [parsed][status_code] {
    mutate {
      add_field => { "http_status_code" => "%{[parsed][status_code]}" }
    }
  }

  if [parsed][response_time] {
    mutate {
      add_field => { "response_time_ms" => "%{[parsed][response_time]}" }
    }
  }

  # Parse error information
  if [parsed][error] {
    mutate {
      add_field => { "error" => "%{[parsed][error]}" }
    }
  }

  if [parsed][stack_trace] {
    mutate {
      add_field => { "stack_trace" => "%{[parsed][stack_trace]}" }
    }
  }

  # Parse agent information
  if [parsed][agent_id] {
    mutate {
      add_field => { "agent_id" => "%{[parsed][agent_id]}" }
    }
  }

  if [parsed][agent_type] {
    mutate {
      add_field => { "agent_type" => "%{[parsed][agent_type]}" }
    }
  }

  if [parsed][task_id] {
    mutate {
      add_field => { "task_id" => "%{[parsed][task_id]}" }
    }
  }

  # Parse trading information
  if [parsed][trade_id] {
    mutate {
      add_field => { "trade_id" => "%{[parsed][trade_id]}" }
    }
  }

  if [parsed][symbol] {
    mutate {
      add_field => { "symbol" => "%{[parsed][symbol]}" }
    }
  }

  if [parsed][order_type] {
    mutate {
      add_field => { "order_type" => "%{[parsed][order_type]}" }
    }
  }

  if [parsed][quantity] {
    mutate {
      add_field => { "quantity" => "%{[parsed][quantity]}" }
    }
  }

  if [parsed][price] {
    mutate {
      add_field => { "price" => "%{[parsed][price]}" }
    }
  }

  # Parse payment information
  if [parsed][payment_id] {
    mutate {
      add_field => { "payment_id" => "%{[parsed][payment_id]}" }
    }
  }

  if [parsed][amount] {
    mutate {
      add_field => { "amount" => "%{[parsed][amount]}" }
    }
  }

  if [parsed][currency] {
    mutate {
      add_field => { "currency" => "%{[parsed][currency]}" }
    }
  }

  if [parsed][payment_method] {
    mutate {
      add_field => { "payment_method" => "%{[parsed][payment_method]}" }
    }
  }

  # Parse Discord information
  if [parsed][guild_id] {
    mutate {
      add_field => { "guild_id" => "%{[parsed][guild_id]}" }
    }
  }

  if [parsed][channel_id] {
    mutate {
      add_field => { "channel_id" => "%{[parsed][channel_id]}" }
    }
  }

  if [parsed][user_id] {
    mutate {
      add_field => { "discord_user_id" => "%{[parsed][user_id]}" }
    }
  }

  if [parsed][command] {
    mutate {
      add_field => { "discord_command" => "%{[parsed][command]}" }
    }
  }

  # Add environment information
  mutate {
    add_field => { "environment" => "production" }
  }

  # Add host information
  mutate {
    add_field => { "host" => "%{[host][name]}" }
  }

  # Clean up fields
  mutate {
    remove_field => [ "parsed", "message", "host" ]
  }

  # Drop debug logs in production
  if [log_level] == "DEBUG" and [environment] == "production" {
    drop { }
  }

  # Add geoip information for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Add user agent parsing
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }

  # Add grok patterns for unstructured logs
  if ![log_level] and ![service] {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:log_message}"
      }
    }
  }

  # Add fingerprint for deduplication
  fingerprint {
    source => ["service", "log_level", "log_message", "timestamp"]
    target => "fingerprint"
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "agentic-flow-%{+YYYY.MM.dd}"
    document_type => "_doc"
    template_name => "agentic-flow"
    template_pattern => "agentic-flow-*"
    template => {
      "index_patterns" => ["agentic-flow-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "log_level" => { "type" => "keyword" },
          "service" => { "type" => "keyword" },
          "environment" => { "type" => "keyword" },
          "trace_id" => { "type" => "keyword" },
          "span_id" => { "type" => "keyword" },
          "user_id" => { "type" => "keyword" },
          "request_id" => { "type" => "keyword" },
          "http_method" => { "type" => "keyword" },
          "http_url" => { "type" => "text" },
          "http_status_code" => { "type" => "integer" },
          "response_time_ms" => { "type" => "float" },
          "error" => { "type" => "text" },
          "agent_id" => { "type" => "keyword" },
          "agent_type" => { "type" => "keyword" },
          "task_id" => { "type" => "keyword" },
          "trade_id" => { "type" => "keyword" },
          "symbol" => { "type" => "keyword" },
          "order_type" => { "type" => "keyword" },
          "quantity" => { "type" => "float" },
          "price" => { "type" => "float" },
          "payment_id" => { "type" => "keyword" },
          "amount" => { "type" => "float" },
          "currency" => { "type" => "keyword" },
          "payment_method" => { "type" => "keyword" },
          "guild_id" => { "type" => "keyword" },
          "channel_id" => { "type" => "keyword" },
          "discord_user_id" => { "type" => "keyword" },
          "discord_command" => { "type" => "keyword" },
          "client_ip" => { "type" => "ip" },
          "geoip" => {
            "properties" => {
              "location" => { "type" => "geo_point" },
              "country_name" => { "type" => "keyword" },
              "city_name" => { "type" => "keyword" }
            }
          }
        }
      }
    }
  }

  # Debug output
  stdout {
    codec => rubydebug
  }

  # File output for backup
  file {
    path => "/var/log/logstash/output-%{+YYYY-MM-dd}.log"
    codec => json_lines
  }
}