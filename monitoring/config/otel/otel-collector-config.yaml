receivers:
  # Prometheus receiver for scraping metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'agentic-flow-metrics'
          static_configs:
            - targets: ['host.docker.internal:3000']
          scrape_interval: 15s
          metrics_path: /metrics
        - job_name: 'discord-bot-metrics'
          static_configs:
            - targets: ['host.docker.internal:3001']
          scrape_interval: 15s
          metrics_path: /metrics
        - job_name: 'trading-engine-metrics'
          static_configs:
            - targets: ['host.docker.internal:3002']
          scrape_interval: 5s
          metrics_path: /metrics
        - job_name: 'payment-system-metrics'
          static_configs:
            - targets: ['host.docker.internal:3003']
          scrape_interval: 15s
          metrics_path: /metrics

  # OTLP receiver for traces and metrics
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Jaeger receiver for traces
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268

  # Host metrics receiver
  hostmetrics:
    collection_interval: 10s
    scrapers:
      - cpu
      - disk
      - filesystem
      - load
      - memory
      - network
      - processes

  # Docker metrics receiver
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 15s
    timeout: 5s

processors:
  # Resource processor to add resource attributes
  resource:
    attributes:
      - key: environment
        value: production
        action: upsert
      - key: service.name
        value: agentic-flow
        action: upsert

  # Batch processor for efficiency
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Memory limiter
  memory_limiter:
    limit_mib: 512

  # Attributes processor for filtering and transformation
  attributes:
    actions:
      - key: sensitive_data
        action: delete

  # Metric transform processor
  metricstransform:
    transforms:
      - include: ^http_.*
        match_type: regexp
        action: update
        operations:
          - action: add_label
            new_label: unit
            new_value: requests

  # Span processor for traces
  span:
    name: span/processor

  # Resource detection processor
  resourcedetection:
    detectors:
      - env
      - system
      - docker

exporters:
  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "agentic_flow"
    const_labels:
      environment: "production"

  # Jaeger exporter for traces
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  # OTLP exporter for traces and metrics
  otlp:
    endpoint: "http://jaeger:4317"
    tls:
      insecure: true

  # Logging exporter
  logging:
    loglevel: info

  # File exporter for debugging
  file:
    path: /tmp/otel-output.json

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # Pprof extension for profiling
  pprof:
    endpoint: 0.0.0.0:1777

  # Zpages extension for debugging
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  
  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [prometheus, hostmetrics, docker_stats]
      processors: [resource, batch, memory_limiter, metricstransform]
      exporters: [prometheus, logging]

    # Traces pipeline
    traces:
      receivers: [otlp, jaeger]
      processors: [resource, batch, memory_limiter, span, attributes]
      exporters: [jaeger, otlp, logging]

    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [resource, batch, memory_limiter, attributes]
      exporters: [logging, file]

# Telemetry configuration for the collector itself
telemetry:
  logs:
    level: "info"
  metrics:
    address: 0.0.0.0:8888
    level: "detailed"