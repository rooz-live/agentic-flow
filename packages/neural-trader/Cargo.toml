[package]
name = "neural-trader"
version = "2.9.0"
edition = "2021"
description = "Cross-platform neural trading system with WSJF domain transfer learning"
license = "MIT"
authors = ["Agentic Flow Team"]
repository = "https://github.com/proffesor-for-testing/agentic-flow"
keywords = ["trading", "neural-network", "wsjf", "risk-management", "fintech"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# WebAssembly support
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Simple math (WASM compatible)
num-traits = "0.2"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dependencies.web-sys]
version = "0.3"
features = [
  "console",
  "Performance",
  "Window",
]

[dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = ["transfer-learning"]
transfer-learning = []
risk-calculation = []
market-analysis = []

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-simd"]
