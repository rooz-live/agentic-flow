[package]
name = "reverse-recruiting"
version = "1.0.0"
edition = "2021"
description = "Rust WASM service for reverse recruiting with career recommendations"
license = "MIT"
authors = ["Agentic Flow Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# WebAssembly support
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

# HTTP client for API calls
reqwest = { version = "0.11", features = ["json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# URL parsing
url = "2.4"

# Web APIs
web-sys = { version = "0.3", features = [
  "console",
  "Headers",
  "Request",
  "RequestInit",
  "RequestMode",
  "Response",
  "Window",
] }

# Career data structures
uuid = { version = "1.0", features = ["v4", "wasm-bindgen"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = ["career-analysis"]
career-analysis = []
job-matching = []
recommendations = []

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-simd"]
