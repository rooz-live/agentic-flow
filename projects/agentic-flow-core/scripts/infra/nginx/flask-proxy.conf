# cPanel Nginx include for analytics.interface.tag.ooo
# Canonical source — deploy with: scripts/infra/nginx/deploy-proxy.sh
#
# SAFETY: Uses variable-based proxy_pass with resolver directive so that
# DNS failures degrade at runtime (502 for this vhost only) instead of
# preventing Nginx from starting (total outage).
#
# Target: /etc/nginx/conf.d/users/tag/analytics.interface.tag.ooo/flask-proxy.conf

# Resolve upstream at runtime, not startup. Cache 30s, fall back to NXDOMAIN.
resolver 127.0.0.53 valid=30s ipv6=off;
resolver_timeout 5s;

set $flask_backend http://127.0.0.1:5000;

# Root dashboard route
location = / {
    proxy_pass $flask_backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Trading static assets — served DIRECTLY from filesystem, NOT through Flask.
location ^~ /trading/assets/ {
    alias /opt/wsjf/trading-dashboard/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable";
    gzip_static on;
    access_log off;
}

# Trading dashboard — serves built Vite SPA + Flask dynamic routes
location /trading {
    proxy_pass $flask_backend/trading;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}

# Trading static assets referenced as absolute /assets/* paths
location ^~ /assets/ {
    proxy_pass $flask_backend/assets/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# API routes — trading data, health, etc.
location /api/ {
    proxy_pass $flask_backend/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}

# Health check shortcut
location = /health {
    proxy_pass $flask_backend/api/health;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
