<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rooz.yo.life - Flourishing Life Model</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  
  <style>
    :root {
      --rooz-primary: #4ECDC4;
      --rooz-secondary: #45B7D1;
      --rooz-accent: #FF6B6B;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-med: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #333;
    }

    #root {
      min-height: 100vh;
    }

    .rooz-cockpit {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    .rooz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }

    .rooz-logo h1 {
      font-size: 2.5em;
      font-weight: 700;
      background: linear-gradient(135deg, var(--rooz-primary), var(--rooz-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .rooz-tagline {
      color: rgba(255,255,255,0.7);
      font-size: 0.9em;
      display: block;
    }

    .rooz-status {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status-badge {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 600;
    }

    .status-badge.healthy {
      background: rgba(150, 206, 180, 0.2);
      color: #96CEB4;
      border: 1px solid #96CEB4;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2em;
      transition: var(--transition-fast);
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: rotate(180deg);
    }

    .rooz-dimensions {
      margin-bottom: 30px;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      border-radius: 12px;
    }

    .dimension-tabs {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dimension-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 25px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .dimension-tab:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--rooz-primary);
      transform: translateY(-2px);
    }

    .dimension-tab.active {
      background: linear-gradient(135deg, var(--rooz-primary), var(--rooz-secondary));
      border-color: var(--rooz-primary);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .dimension-icon {
      font-size: 1.3em;
    }

    .rooz-content {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .rooz-section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      transition: var(--transition-med);
    }

    .rooz-section:hover {
      border-color: rgba(78, 205, 196, 0.3);
      box-shadow: var(--shadow-lg);
    }

    .rooz-section h2 {
      color: white;
      font-size: 1.8em;
      margin-bottom: 20px;
    }

    .equity-summary {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .total-episodes {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 40px;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(69, 183, 209, 0.2));
      border-radius: 12px;
      border: 2px solid var(--rooz-primary);
    }

    .total-episodes .value {
      font-size: 3em;
      font-weight: 700;
      color: var(--rooz-primary);
    }

    .total-episodes .label {
      color: rgba(255,255,255,0.8);
      font-size: 0.9em;
      margin-top: 5px;
    }

    .circle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .circle-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid;
      border-radius: 12px;
      padding: 20px;
      transition: var(--transition-fast);
    }

    .circle-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .circle-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .circle-header h3 {
      font-size: 1.3em;
      text-transform: capitalize;
    }

    .circle-count {
      font-size: 1.5em;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    .ceremony-tag {
      padding: 4px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 0.85em;
      color: rgba(255,255,255,0.8);
      margin-right: 8px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .rooz-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--rooz-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .rooz-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      text-align: center;
    }

    .rooz-error button {
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--rooz-primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1em;
      cursor: pointer;
    }

    .rooz-footer {
      margin-top: 50px;
      padding: 30px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      color: rgba(255,255,255,0.6);
    }

    .footer-note {
      margin-top: 10px;
      font-size: 0.85em;
      color: rgba(255,255,255,0.4);
    }

    .episodes-section {
      max-height: 500px;
      overflow-y: auto;
    }

    .episode-card {
      background: rgba(255,255,255,0.05);
      border-left: 4px solid;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .episode-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(4px);
    }

    .episode-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .episode-circle {
      font-weight: 600;
      text-transform: capitalize;
    }

    .episode-ceremony {
      font-size: 0.85em;
      opacity: 0.8;
    }

    .episode-timestamp {
      font-size: 0.75em;
      opacity: 0.6;
    }

    .roam-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .roam-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid;
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .roam-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .roam-card.risk { border-color: #FF6B6B; }
    .roam-card.obstacle { border-color: #FFA502; }
    .roam-card.assumption { border-color: #FFEAA7; }
    .roam-card.mitigation { border-color: #96CEB4; }

    .roam-card h4 {
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.9em;
      letter-spacing: 1px;
    }

    .roam-card.risk h4 { color: #FF6B6B; }
    .roam-card.obstacle h4 { color: #FFA502; }
    .roam-card.assumption h4 { color: #FFEAA7; }
    .roam-card.mitigation h4 { color: #96CEB4; }

    .roam-count {
      font-size: 2em;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid var(--rooz-primary);
      border-radius: 16px;
      padding: 30px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.3s;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }

    .modal-header h3 {
      font-size: 1.8em;
      color: var(--rooz-primary);
    }

    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 1.5em;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .modal-close:hover {
      color: var(--rooz-accent);
      transform: rotate(90deg);
    }

    .skill-list {
      list-style: none;
      margin-top: 15px;
    }

    .skill-item {
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid var(--rooz-primary);
      margin-bottom: 8px;
      border-radius: 4px;
    }

    .dimension-content {
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      margin-top: 15px;
    }

    .dimension-content h4 {
      color: var(--rooz-primary);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API_BASE = 'http://localhost:3030';

    const DIMENSIONS = [
      { type: 'temporal', label: 'Temporal', icon: '⏰', description: 'Time-based view' },
      { type: 'spatial', label: 'Spatial', icon: '🌍', description: 'Location-based view' },
      { type: 'economic', label: 'Economic', icon: '💰', description: 'Financial view' },
      { type: 'psychological', label: 'Psychological', icon: '🧠', description: 'Mental model view' },
    ];

    const CIRCLE_COLORS = {
      orchestrator: '#FF6B6B',
      assessor: '#4ECDC4',
      innovator: '#45B7D1',
      analyst: '#96CEB4',
      seeker: '#FFEAA7',
      intuitive: '#DFE6E9',
    };

    function RoozCockpit() {
      const [cockpitData, setCockpitData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [activeDimension, setActiveDimension] = useState('temporal');
      const [selectedCircle, setSelectedCircle] = useState(null);
      const [episodes, setEpisodes] = useState([]);

      const fetchData = useCallback(async () => {
        try {
          setLoading(true);
          const [cockpitRes, episodesRes] = await Promise.all([
            axios.get(`${API_BASE}/api/cockpit`),
            axios.get(`${API_BASE}/api/episodes`)
          ]);
          setCockpitData(cockpitRes.data);
          setEpisodes(episodesRes.data.episodes || []);
          setError(null);
        } catch (err) {
          setError(err.message || 'Failed to load data');
        } finally {
          setLoading(false);
        }
      }, []);

      const handleDimensionChange = async (dimension) => {
        setActiveDimension(dimension);
        try {
          const response = await axios.post(`${API_BASE}/api/pivot`, { dimension });
          console.log(`Pivoted to ${dimension}:`, response.data);
        } catch (err) {
          console.error('Pivot failed:', err);
        }
      };

      const openCircleModal = async (circle) => {
        setSelectedCircle(circle);
      };

      const closeCircleModal = () => {
        setSelectedCircle(null);
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 30000);
        return () => clearInterval(interval);
      }, [fetchData]);

      if (loading && !cockpitData) {
        return (
          <div className="rooz-loading">
            <div className="spinner"></div>
            <p>Loading rooz.yo.life cockpit...</p>
          </div>
        );
      }

      if (error && !cockpitData) {
        return (
          <div className="rooz-error">
            <h2>⚠️ Connection Error</h2>
            <p>{error}</p>
            <button onClick={fetchData}>Retry</button>
          </div>
        );
      }

      if (!cockpitData) return null;

      return (
        <div className="rooz-cockpit">
          <header className="rooz-header">
            <div className="rooz-logo">
              <h1>rooz.yo.life</h1>
              <span className="rooz-tagline">Flourishing Life Model • Circle-Based Learning</span>
            </div>
            <div className="rooz-status">
              <span className={`status-badge ${cockpitData.status.healthy ? 'healthy' : 'unhealthy'}`}>
                {cockpitData.status.healthy ? '✓ Online' : '⚠ Degraded'}
              </span>
              <button onClick={fetchData} className="refresh-btn" title="Refresh">🔄</button>
            </div>
          </header>

          <nav className="rooz-dimensions">
            <div className="dimension-tabs">
              {DIMENSIONS.map(dim => (
                <button
                  key={dim.type}
                  className={`dimension-tab ${activeDimension === dim.type ? 'active' : ''}`}
                  onClick={() => handleDimensionChange(dim.type)}
                  title={dim.description}
                >
                  <span className="dimension-icon">{dim.icon}</span>
                  <span className="dimension-label">{dim.label}</span>
                </button>
              ))}
            </div>
          </nav>

          <div className="rooz-content">
            <section className="rooz-section">
              <h2>🎯 Circle Equity Balance</h2>
              <div className="equity-summary">
                <div className="total-episodes">
                  <span className="value">{cockpitData.equity.total_episodes}</span>
                  <span className="label">Total Episodes</span>
                </div>
              </div>
              <div className="circle-grid">
                {cockpitData.circles.map(circle => (
                  <div 
                    key={circle.name} 
                    className="circle-card" 
                    style={{ borderColor: CIRCLE_COLORS[circle.name] }}
                    onClick={() => openCircleModal(circle)}
                  >
                    <div className="circle-header">
                      <h3 style={{ color: CIRCLE_COLORS[circle.name] }}>{circle.name}</h3>
                      <span className="circle-count">{circle.activity.count}</span>
                    </div>
                    <div>
                      {circle.ceremonies.map(ceremony => (
                        <span key={ceremony} className="ceremony-tag">{ceremony}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            <section className="rooz-section">
              <h2>🎲 ROAM Exposure: {cockpitData.roam.exposureScore}/10</h2>
              <div className="roam-grid">
                <div className="roam-card risk">
                  <h4>⚠️ Risk</h4>
                  <div className="roam-count">{cockpitData.roam.risk}</div>
                  <p style={{ fontSize: '0.85em', opacity: 0.7, marginTop: '8px' }}>Active threats</p>
                </div>
                <div className="roam-card obstacle">
                  <h4>🚧 Obstacle</h4>
                  <div className="roam-count">{cockpitData.roam.obstacle}</div>
                  <p style={{ fontSize: '0.85em', opacity: 0.7, marginTop: '8px' }}>Current blockers</p>
                </div>
                <div className="roam-card assumption">
                  <h4>💭 Assumption</h4>
                  <div className="roam-count">{cockpitData.roam.assumption}</div>
                  <p style={{ fontSize: '0.85em', opacity: 0.7, marginTop: '8px' }}>Unvalidated beliefs</p>
                </div>
                <div className="roam-card mitigation">
                  <h4>✅ Mitigation</h4>
                  <div className="roam-count">{cockpitData.roam.mitigation}</div>
                  <p style={{ fontSize: '0.85em', opacity: 0.7, marginTop: '8px' }}>Active responses</p>
                </div>
              </div>
            </section>

            <section className="rooz-section">
              <h2>📖 Recent Episodes ({episodes.length})</h2>
              <div className="episodes-section">
                {episodes.length === 0 ? (
                  <p style={{ color: 'rgba(255,255,255,0.6)', textAlign: 'center', padding: '40px' }}>
                    No episodes recorded yet. Start your first ceremony to track learning.
                  </p>
                ) : (
                  episodes.slice(0, 20).map((episode, idx) => (
                    <div 
                      key={idx} 
                      className="episode-card" 
                      style={{ borderColor: CIRCLE_COLORS[episode.circle] || '#888' }}
                    >
                      <div className="episode-header">
                        <div>
                          <span className="episode-circle" style={{ color: CIRCLE_COLORS[episode.circle] || '#888' }}>
                            {episode.circle}
                          </span>
                          <span className="episode-ceremony"> • {episode.ceremony}</span>
                        </div>
                        <span className="episode-timestamp">{new Date(episode.timestamp).toLocaleString()}</span>
                      </div>
                      <div style={{ fontSize: '0.9em', opacity: 0.8 }}>
                        {episode.outcome || 'Episode completed'}
                      </div>
                    </div>
                  ))
                )}
              </div>
            </section>
          </div>

          <footer className="rooz-footer">
            <p>Powered by <strong>yo.life FLM</strong> • Private Coop: rooz.live.yoservice.com/circles</p>
            <p className="footer-note">Dimensional UI per ADR-001 • MCP/MPP Integration</p>
          </footer>

          {selectedCircle && (
            <div className="modal-overlay" onClick={closeCircleModal}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h3 style={{ color: CIRCLE_COLORS[selectedCircle.name] }}>
                    {selectedCircle.name.toUpperCase()}
                  </h3>
                  <button className="modal-close" onClick={closeCircleModal}>×</button>
                </div>
                
                <div style={{ marginBottom: '20px', color: 'rgba(255,255,255,0.8)' }}>
                  <p><strong>Episodes:</strong> {selectedCircle.activity.count}</p>
                  <p style={{ marginTop: '8px' }}><strong>Status:</strong> {selectedCircle.activity.status}</p>
                </div>

                <div>
                  <h4 style={{ color: 'var(--rooz-primary)', marginBottom: '10px' }}>Ceremonies</h4>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {selectedCircle.ceremonies.map(ceremony => (
                      <span key={ceremony} className="ceremony-tag">{ceremony}</span>
                    ))}
                  </div>
                </div>

                <div className="dimension-content">
                  <h4>{DIMENSIONS.find(d => d.type === activeDimension)?.icon} {activeDimension.toUpperCase()} View</h4>
                  {activeDimension === 'temporal' && (
                    <p style={{ color: 'rgba(255,255,255,0.7)' }}>
                      Recent activity: {selectedCircle.activity.count} episodes
                      <br />Time-based patterns and learning velocity for this circle.
                    </p>
                  )}
                  {activeDimension === 'spatial' && (
                    <p style={{ color: 'rgba(255,255,255,0.7)' }}>
                      Location context: Local development environment
                      <br />Circle operates in: {selectedCircle.name} domain
                    </p>
                  )}
                  {activeDimension === 'economic' && (
                    <p style={{ color: 'rgba(255,255,255,0.7)' }}>
                      Value contribution: {selectedCircle.activity.count * 10} equity points
                      <br />ROI: Learning efficiency per episode
                    </p>
                  )}
                  {activeDimension === 'psychological' && (
                    <p style={{ color: 'rgba(255,255,255,0.7)' }}>
                      Mental model: Circle-based deliberate practice
                      <br />Cognitive load: {selectedCircle.ceremonies.length} active ceremonies
                    </p>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RoozCockpit />);
  </script>
</body>
</html>
