<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="rooz.yo.life - Flourishing Life Model subscription system with Circle-Based Learning">
  <meta name="keywords" content="yo.life, FLM, flourishing life model, circle equity, ROAM, subscription">
  <title>rooz.yo.life - Flourishing Life Model Subscription</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <!-- Open Graph -->
  <meta property="og:title" content="rooz.yo.life - Flourishing Life Model">
  <meta property="og:description" content="Private coop subscription system for classes, events, and sports with dimensional UI">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rooz.yo.life">
  
  <!-- Preconnect to API -->
  <link rel="preconnect" href="http://localhost:3030">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading fallback */
    .loading-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #4ECDC4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 1.2em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-fallback">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading rooz.yo.life...</p>
    </div>
  </div>
  
  <script type="module" src="/src/rooz-app.tsx"></script>
</body>
</html>
