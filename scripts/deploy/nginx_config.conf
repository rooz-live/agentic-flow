# Agentic Flow - Multitenant Domain Configuration
# Deploy on: stx-aio-0.corp.interface.tag.ooo

# Upstream Flask application
upstream agentic_flow_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

# DecisionCall.com - Main Dashboard
server {
    listen 80;
    listen [::]:80;
    server_name decisioncall.com www.decisioncall.com;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name decisioncall.com www.decisioncall.com;
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/decisioncall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/decisioncall.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Tenant identification via domain
    set $tenant_id "decisioncall";
    
    # Proxy settings
    location / {
        proxy_pass http://agentic_flow_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $tenant_id;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files
    location /static/ {
        alias /opt/agentic-flow/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

