---
# group_vars/all.yml — Variables available to every host group
#
# These are resolved from the environment sourced by:
#   source scripts/infra/credentials/.env.cpanel
# Run playbooks after sourcing: source .env.cpanel && ansible-playbook ...
# Or use: ansible-playbook --extra-vars "@scripts/infra/credentials/.env.cpanel"
#
# All credentials use lookup('env', ...) so they are never committed to git.

# ── cPanel / WHM ──────────────────────────────────────────────────────────────
cpanel_api_token: "{{ lookup('env', 'CPANEL_API_TOKEN') }}"
whm_api_token:    "{{ lookup('env', 'WHM_API_TOKEN') }}"
cpanel_ssh_key:   "{{ lookup('env', 'CPANEL_SSH_KEY') | default('~/pem/rooz.pem') }}"

# ── HostBill ──────────────────────────────────────────────────────────────────
hostbill_url:     "{{ lookup('env', 'HOSTBILL_URL') | default('https://hostbillapp.com') }}"
hostbill_api_key: "{{ lookup('env', 'HOSTBILL_API_KEY') }}"
hostbill_api_id:  "{{ lookup('env', 'HOSTBILL_API_ID') }}"

# ── STX / OpenStack ───────────────────────────────────────────────────────────
os_auth_url:      "{{ lookup('env', 'OS_AUTH_URL') }}"
os_project_name:  "{{ lookup('env', 'OS_PROJECT_NAME') | default('admin') }}"
os_username:      "{{ lookup('env', 'OS_USERNAME') | default('admin') }}"
os_password:      "{{ lookup('env', 'OS_PASSWORD') }}"
os_region_name:   "{{ lookup('env', 'OS_REGION_NAME') | default('RegionOne') }}"
stx_ssh_key:      "{{ lookup('env', 'STX_SSH_KEY') | default('~/.ssh/starlingx_key') }}"
stx_ssh_port:     "{{ lookup('env', 'STX_SSH_PORT') | default('2222') }}"

# ── Common timeouts & thresholds ───────────────────────────────────────────────
ansible_command_timeout: 30
ssl_renewal_threshold_days: 30
