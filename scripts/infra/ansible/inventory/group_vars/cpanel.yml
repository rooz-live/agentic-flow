# cPanel/WHM server variables
cpanel_domains:
  - bhopti.com
  - yo.tag.ooo
  - rooz.live
  - yo.life
  - yoservice.com

cpanel_required_ports:
  - 22    # SSH
  - 25    # SMTP
  - 53    # DNS
  - 80    # HTTP
  - 110   # POP3
  - 143   # IMAP
  - 443   # HTTPS
  - 465   # SMTPS
  - 587   # Submission
  - 993   # IMAPS
  - 995   # POP3S
  - 2082  # cPanel HTTP
  - 2083  # cPanel HTTPS
  - 2086  # WHM HTTP
  - 2087  # WHM HTTPS
  - 2095  # Webmail HTTP
  - 2096  # Webmail HTTPS

cpanel_services:
  - nginx
  - httpd
  - lfd
  - exim
  - dovecot
  - mariadb

ssl_renewal_threshold_days: 30
