all:
  children:
    # ── AWS EC2: cPanel/WHM server ─────────────────────────────────
    cpanel:
      hosts:
        yo-tag-ooo:
          ansible_host: "{{ lookup('env', 'CPANEL_HOST') | default('yo.tag.ooo', true) }}"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: "~/pem/rooz.pem"
          ansible_port: 22

    # ── Hivelocity: StarlingX AIO ──────────────────────────────────
    stx:
      hosts:
        stx-aio-0:
          ansible_host: stx-aio-0.corp.interface.tag.ooo
          ansible_user: ubuntu
          ansible_ssh_private_key_file: "~/.ssh/starlingx_key"
          ansible_port: 2222

    # ── macOS local ────────────────────────────────────────────────
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: /usr/local/bin/python3
