---
# macOS Services Audit
# Usage: ansible-playbook playbooks/macos-services.yml
# Safe: read-only, localhost only
- name: macOS Services Audit
  hosts: local
  gather_facts: yes

  tasks:
    - name: Check LaunchAgent status
      shell: launchctl list | grep -w {{ item }} | awk '{print $2}'
      register: launchd_status
      loop: "{{ launchd_agents_expected }}"
      changed_when: false
      failed_when: false

    - name: Report LaunchAgent status
      debug:
        msg: "{{ item.item }}: {{ 'running (exit ' + item.stdout + ')' if item.stdout != '' else 'NOT LOADED' }}"
      loop: "{{ launchd_status.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check brew services
      shell: brew services info {{ item.name }} --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin)[0]; print(d.get('status','unknown'))"
      register: brew_status
      loop: "{{ brew_services_expected }}"
      changed_when: false
      failed_when: false

    - name: Report brew services
      debug:
        msg: "{{ item.item.name }}: {{ item.stdout | default('unknown') }} (expected: {{ item.item.state }})"
      loop: "{{ brew_status.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Cron job count
      shell: crontab -l 2>/dev/null | grep -v '^#' | grep -v '^$' | wc -l
      register: cron_count
      changed_when: false

    - name: Disk usage
      shell: df -h / | tail -1 | awk '{print $5 " used (" $4 " free)"}'
      register: disk_usage
      changed_when: false

    - name: Summary
      debug:
        msg:
          - "LaunchAgents: {{ launchd_status.results | selectattr('stdout', 'ne', '') | list | length }}/{{ launchd_agents_expected | length }} loaded"
          - "Cron jobs: {{ cron_count.stdout | trim }}"
          - "Disk: {{ disk_usage.stdout }}"
