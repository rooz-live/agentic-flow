# nginx config for analytics.interface.tag.ooo
# Deploy: sudo cp deploy/nginx-analytics.conf /etc/nginx/sites-available/analytics
#         sudo ln -sf /etc/nginx/sites-available/analytics /etc/nginx/sites-enabled/
#         sudo certbot --nginx -d analytics.interface.tag.ooo
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name analytics.interface.tag.ooo;

    # Redirect HTTP → HTTPS (certbot will add this)
    # return 301 https://$host$request_uri;

    # Flask dashboard (all routes including /trading, /api/*)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID analytics-interface;

        # WebSocket support for SocketIO
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # CORS for API endpoints
    location /api/ {
        proxy_pass http://*********:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID analytics-interface;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check (no proxy overhead)
    location = /health {
        proxy_pass http://127.0.0.1:5000/api/health;
    }

    location = /api/health {
        proxy_pass http://*********:5000/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID analytics-interface;
    }
}
