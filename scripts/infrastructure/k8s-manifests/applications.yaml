apiVersion: apps/v1
kind: Deployment
metadata:
  name: affiliate
  namespace: affiliate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affiliate
  template:
    metadata:
      labels:
        app: affiliate
    spec:
      containers:
      - name: affiliate
        image: node:20-alpine
        ports:
        - containerPort: 3000
        command: ["sh", "-c", "node -e \"require('http').createServer((r,s)=>{s.writeHead(200);s.end('Affiliate Platform');}).listen(3000)\""]
---
apiVersion: v1
kind: Service
metadata:
  name: affiliate
  namespace: affiliate
spec:
  type: NodePort
  ports:
  - port: 3000
    nodePort: 30030
  selector:
    app: affiliate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading
  template:
    metadata:
      labels:
        app: trading
    spec:
      containers:
      - name: trading
        image: python:3.11-slim
        ports:
        - containerPort: 8000
        command: ["python", "-c", "from http.server import HTTPServer, SimpleHTTPRequestHandler; HTTPServer(('', 8000), SimpleHTTPRequestHandler).serve_forever()"]
---
apiVersion: v1
kind: Service
metadata:
  name: trading
  namespace: trading
spec:
  type: NodePort
  ports:
  - port: 8000
    nodePort: 30800
  selector:
    app: trading

