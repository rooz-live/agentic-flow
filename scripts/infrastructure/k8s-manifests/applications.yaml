apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostbill
  namespace: hostbill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hostbill
  template:
    metadata:
      labels:
        app: hostbill
    spec:
      containers:
      - name: hostbill
        image: php:8.2-apache
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "mysql.databases.svc.cluster.local"
        - name: DB_NAME
          value: "hostbill"
---
apiVersion: v1
kind: Service
metadata:
  name: hostbill
  namespace: hostbill
spec:
  type: NodePort
  ports:
  - port: 80
    nodePort: 30080
  selector:
    app: hostbill
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
      - name: wordpress
        image: wordpress:6.4-php8.2
        ports:
        - containerPort: 80
        env:
        - name: WORDPRESS_DB_HOST
          value: "mysql.databases.svc.cluster.local"
        - name: WORDPRESS_DB_NAME
          value: "wordpress"
        - name: WORDPRESS_DB_USER
          value: "wordpress"
        - name: WORDPRESS_DB_PASSWORD
          value: "WordpressDb2024!"
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress
spec:
  type: NodePort
  ports:
  - port: 80
    nodePort: 30081
  selector:
    app: wordpress
---
