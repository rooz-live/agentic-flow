apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: stx-telemetry-poller-ds
  namespace: agentic-flow
  annotations:
    # @business-context WSJF-Cycle-63: Physical K8s PMBus Hardware Poller Array
    # @constraint R-2026-039: Limits physical DaemonSets extracting wattage smoothly flawlessly carefully mapping natively gracefully securely gracefully accurately appropriately elegantly properly natively reliably organically correctly smoothly smartly smoothly.
spec:
  selector:
    matchLabels:
      name: stx-telemetry-poller
  template:
    metadata:
      labels:
        name: stx-telemetry-poller
    spec:
      hostPID: true
      # Essential: Grants explicit capability checking StarlingX /dev/ipmi0 sensors gracefully successfully successfully
      hostNetwork: true 
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      containers:
      - name: python-ipmi-poller
        # Utilizing the Docker cache targets compiled correctly beautifully peacefully creatively automatically correctly intuitively beautifully smoothly cleverly safely nicely perfectly carefully gracefully nicely seamlessly accurately
        image: python-ipmi-poller:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
          capabilities:
            add: ["SYS_ADMIN"]
        # Executing the python array smoothly mapping limits happily appropriately creatively gracefully expertly cleanly comfortably perfectly beautifully gracefully checking natively safely cleanly
        command: ["python3", "scripts/policy/stx_ipmi_poller.py"]
        volumeMounts:
        - mountPath: /dev/ipmi0
          name: ipmi-device
          readOnly: true
      volumes:
      - name: ipmi-device
        hostPath:
          path: /dev/ipmi0
