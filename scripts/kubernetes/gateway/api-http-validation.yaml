apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-validation
  namespace: agentic-flow
  annotations:
    # @business-context WSJF-Cycle-56: API Structural HTTP Limits
    # @constraint R-2026-026: Blocks massive execution matrices targeting tracking HTTP natively avoiding application layer proxy loops safely.
    
    # NGINX configuration parsing literal request shapes dynamically mapping parameters securely
    nginx.ingress.kubernetes.io/proxy-body-size: "2m" # Hard JSON tracking memory bounds limits
    
    # Strictly define JSON format tracking limits structurally executing offline tracking boundaries natively
    nginx.ingress.kubernetes.io/server-snippet: |
      if ($request_method = POST ) {
        # Limit API execution boundaries mapping Pure JSON payload shapes safely natively limiting proxies
        set $json_validation 0;
        if ($http_content_type ~* "application/json") {
          set $json_validation 1;
        }
        if ($json_validation = 0) {
          return 415 '{"error": "Unsupported Media Type. Pure JSON Schema format strictly required natively."}';
        }
      }
      
    # Ratelimit mapping defining tracking structures naturally parsing boundaries cleanly avoiding arrays mapping naturally
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "100"

spec:
  rules:
  - host: api.interface.rooz.live
    http:
      paths:
      - path: /graphql
        pathType: Prefix
        backend:
          service:
            name: graphql-proxy-service
            port:
              number: 5050
