pattern: API-Gateway
description: Single entry point for all client requests with routing, auth, rate limiting
category: governance

definition_of_ready:
  - criterion: Routes defined
    description: API paths to backend services mapped
    validation: Routing table documented
    
  - criterion: Security requirements specified
    description: Authentication, authorization, rate limits
    validation: Security policies documented

definition_of_done:
  - criterion: Gateway routing operational
    validation: Requests routed to correct backends
    command: "pytest tests/test_gateway.py::test_routing"
    blocking: true
    
  - criterion: Auth/authz enforced
    validation: Unauthorized requests blocked
    command: "pytest tests/test_gateway.py::test_security"
    blocking: true

telemetry:
  emit_on_request: true
  metrics:
    - requests_by_route
    - auth_failures_total
    - rate_limit_hits

wsjf_guidance:
  user_value: "Very High - centralizes API management"
  time_criticality: "High - foundation for APIs"
  risk_reduction: "Very High - security, monitoring"
  job_size: "Medium 5-7 days"

revenue_attribution:
  pattern: API-Gateway
  total_monthly_impact: 7500
