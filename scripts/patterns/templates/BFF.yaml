pattern: BFF
description: Backend For Frontend - optimized API per client type
category: execution

definition_of_ready:
  - criterion: Client types identified
    description: Web, mobile, IoT, etc.
    validation: Client requirements documented
    
  - criterion: Data aggregation needs defined
    description: Which backend calls to combine?
    validation: Aggregation logic specified

definition_of_done:
  - criterion: BFF API implemented per client
    validation: Each client has tailored API
    command: "pytest tests/test_bff.py::test_client_apis"
    blocking: true
    
  - criterion: Data aggregation working
    validation: Single BFF call replaces multiple backend calls
    command: "pytest tests/test_bff.py::test_aggregation"
    blocking: true

telemetry:
  emit_on_request: true
  metrics:
    - requests_by_client_type
    - aggregation_latency_ms

wsjf_guidance:
  user_value: "High - improves client performance"
  time_criticality: "Medium"
  risk_reduction: "Medium - reduces client complexity"
  job_size: "Medium 3-5 days per BFF"

revenue_attribution:
  pattern: BFF
  total_monthly_impact: 4000
