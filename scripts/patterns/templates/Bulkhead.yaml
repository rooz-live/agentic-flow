pattern: Bulkhead
description: Resource isolation to prevent failure propagation
category: governance

definition_of_ready:
  - criterion: Resource pools defined
    description: Thread pools, connection pools, etc.
    validation: Pool sizes and isolation boundaries documented
    
  - criterion: Failure isolation strategy specified
    description: How to contain failures?
    validation: Bulkhead configuration documented

definition_of_done:
  - criterion: Resource pools isolated
    validation: Failure in one pool doesn't affect others
    command: "pytest tests/test_bulkhead.py::test_isolation"
    blocking: true
    
  - criterion: Pool limits enforced
    validation: Requests rejected when pool full
    command: "pytest tests/test_bulkhead.py::test_limits"
    blocking: true

telemetry:
  emit_on_pool_usage: true
  metrics:
    - pool_active_connections
    - pool_rejected_requests
    - pool_exhaustion_events

wsjf_guidance:
  user_value: "High - improves resilience"
  time_criticality: "Medium"
  risk_reduction: "Very High - prevents cascading failures"
  job_size: "Small 2-3 days"

revenue_attribution:
  pattern: Bulkhead
  total_monthly_impact: 5000
