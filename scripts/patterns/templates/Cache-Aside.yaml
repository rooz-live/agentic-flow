pattern: Cache-Aside
description: Application-managed caching with lazy loading
category: execution

definition_of_ready:
  - criterion: Cache candidates identified
    description: Which data to cache?
    validation: Cache keys and TTLs specified
    
  - criterion: Cache technology selected
    description: Redis, Memcached, etc.
    validation: Cache configuration documented

definition_of_done:
  - criterion: Cache reads implemented
    validation: Cache checked before database
    command: "pytest tests/test_cache.py::test_cache_hit"
    blocking: true
    
  - criterion: Cache misses handled
    validation: Database fallback on miss
    command: "pytest tests/test_cache.py::test_cache_miss"
    blocking: true

telemetry:
  emit_on_access: true
  metrics:
    - cache_hits_total
    - cache_misses_total
    - cache_hit_rate

wsjf_guidance:
  user_value: "High - improves performance"
  time_criticality: "Medium"
  risk_reduction: "Low - reduces database load"
  job_size: "Small 2-3 days"

revenue_attribution:
  pattern: Cache-Aside
  total_monthly_impact: 3000
