name: Depth-Ladder
description: Progressive depth escalation pattern for prod-cycle maturity
category: governance
tier: 1

triggers:
  - consecutive_successes >= stability_threshold
  - health_score >= 0.8
  - no_blockers == true

depth_levels:
  0:
    name: "Core Sanity"
    description: "Basic health checks and status"
    commands:
      - "af status"
      - "af board"
      - "af governor-health"
    gates: []
    
  1:
    name: "Analysis"
    description: "Deep analysis and quick wins"
    commands:
      - "af analyze"
      - "af quick-wins"
      - "af wsjf"
    gates:
      - depth_0_success
      
  2:
    name: "Circle Operations"
    description: "Circle-specific standup, retro, replenish"
    commands:
      - "af standup --circle {circle}"
      - "af retro-coach"
      - "af replenish --circle {circle}"
    gates:
      - depth_1_success
      - circle_assigned
      
  3:
    name: "CI/CD & DevOps"
    description: "Calibration, validation, deployment prep"
    commands:
      - "af validate-foundation"
      - "af pattern-coverage"
      - "af roadmap"
    gates:
      - depth_2_success
      - tests_passing
      
  4:
    name: "Production Release"
    description: "Controlled releases with guardrails"
    commands:
      - "af deploy --guardrail-lock"
      - "af quick-publish"
    gates:
      - depth_3_success
      - approval_required
      - no_roam_risks

escalation_rules:
  - condition: "consecutive_successes >= 3"
    action: "increment_depth"
    max_depth: 4
    
  - condition: "failure_detected"
    action: "decrement_depth"
    min_depth: 0
    
  - condition: "health_score < 0.5"
    action: "reset_to_depth_0"

observability:
  pattern_event: "depth_ladder"
  metrics:
    - current_depth
    - depth_transitions
    - time_at_depth
    - escalation_count
    - fallback_count

integration:
  prod_cycle: true
  full_cycle: true
  governance_agent: true

wsjf:
  business_value: 8
  time_criticality: 7
  risk_reduction: 9
  job_size: 5
  calculated: 4.8
