name: Kanban-WIP
description: Work In Progress limits per circle to prevent unbounded growth
category: flow
tier: 1

triggers:
  - new_item_added
  - item_status_change
  - replenishment_cycle

wip_limits:
  orchestrator:
    limit: 3
    rationale: "Flow-critical, high coordination overhead"
  assessor:
    limit: 5
    rationale: "Quality gates require focused attention"
  analyst:
    limit: 5
    rationale: "Analysis depth over breadth"
  innovator:
    limit: 4
    rationale: "Innovation requires sustained focus"
  seeker:
    limit: 4
    rationale: "Exploration bounded by integration capacity"
  intuitive:
    limit: 6
    rationale: "Flexible sensemaking, lower coordination"

enforcement:
  mode: "soft"  # soft = warn, hard = block
  actions:
    soft:
      - log_warning
      - notify_circle_lead
      - flag_in_dashboard
    hard:
      - block_new_items
      - require_completion_first
      - escalate_to_orchestrator

velocity_tracking:
  enabled: true
  metrics:
    - items_completed_per_cycle
    - average_cycle_time
    - wip_to_done_ratio
    - blocked_time_pct

flow_efficiency:
  formula: "(active_time / total_time) * 100"
  target: 40  # percent
  alerts:
    below_20: "critical"
    below_30: "warning"
    above_50: "excellent"

kanban_columns:
  - name: "BACKLOG"
    wip_limit: null
    
  - name: "NOW"
    wip_limit: "per_circle"
    
  - name: "BLOCKED"
    wip_limit: null
    alerts: true
    
  - name: "DONE"
    wip_limit: null
    archive_after_days: 7

observability:
  pattern_event: "kanban_wip"
  metrics:
    - wip_count_by_circle
    - wip_utilization_pct
    - limit_exceeded_count
    - flow_efficiency

integration:
  goalie_dashboard: true
  pattern_metrics: true
  replenish_manager: true

wsjf:
  business_value: 9
  time_criticality: 8
  risk_reduction: 7
  job_size: 3
  calculated: 8.0
