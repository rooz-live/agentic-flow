pattern: Saga
description: Distributed transaction pattern with compensating transactions
category: governance

definition_of_ready:
  - criterion: Transaction steps defined
    description: Sequence of operations documented
    validation: Saga steps with compensations specified
    
  - criterion: Compensation logic designed
    description: How to rollback each step?
    validation: Compensation actions documented per step
    
  - criterion: Coordination approach selected
    description: Orchestration or choreography?
    validation: Coordination pattern documented

definition_of_done:
  - criterion: Saga steps implemented
    description: Forward transaction logic complete
    validation: All steps execute successfully in happy path
    command: "pytest tests/test_saga.py::test_happy_path"
    blocking: true
    
  - criterion: Compensations working
    description: Rollback operations functional
    validation: Compensation restores previous state
    command: "pytest tests/test_saga.py::test_compensation"
    blocking: true
    
  - criterion: Failure handling tested
    description: Saga handles step failures gracefully
    validation: Partial completions compensated correctly
    command: "pytest tests/test_saga.py::test_failure_scenarios"
    blocking: true
    
  - criterion: Idempotency guaranteed
    description: Steps can be retried safely
    validation: Duplicate execution is safe
    command: "pytest tests/test_saga.py::test_idempotency"
    blocking: false

telemetry:
  emit_on_step_start: true
  emit_on_step_complete: true
  emit_on_compensation: true
  metrics:
    - saga_executions_total
    - saga_compensations_total
    - saga_duration_seconds
    - step_failures_total

wsjf_guidance:
  user_value: "High - enables distributed transactions"
  time_criticality: "Medium - important for microservices"
  risk_reduction: "Very High - ensures data consistency"
  job_size: "Medium 5-7 days"

saga_types:
  orchestration:
    description: "Central orchestrator controls saga flow"
    pros: "Simple coordination, easy monitoring"
    cons: "Single point of failure, coupling"
    
  choreography:
    description: "Services coordinate via events"
    pros: "Decoupled, resilient"
    cons: "Complex monitoring, harder to understand"

examples:
  - title: "Order Processing Saga"
    steps:
      - "Reserve Inventory"
      - "Process Payment"
      - "Ship Order"
    compensations:
      - "Release Inventory"
      - "Refund Payment"
      - "Cancel Shipment"
    wsjf: 14.0
    cod: 28
    size: 2
    result: "Success - 99.9% order consistency"

revenue_attribution:
  pattern: Saga
  total_monthly_impact: 6000
  consistency_improvement: "95% reduction in inconsistent states"
