name: Strangler-Fig
description: Incremental migration pattern for legacy system replacement
category: migration
tier: 2

triggers:
  - legacy_system_identified
  - migration_initiative_started
  - feature_parity_checkpoint

phases:
  1_identify:
    name: "Identify & Map"
    description: "Map legacy components and dependencies"
    activities:
      - document_current_state
      - identify_seams
      - map_dependencies
      - define_migration_boundary
    exit_criteria:
      - dependency_graph_complete
      - seams_identified >= 1
      
  2_create:
    name: "Create New Component"
    description: "Build replacement alongside legacy"
    activities:
      - implement_new_component
      - add_feature_flags
      - setup_dual_write
      - create_adapter_layer
    exit_criteria:
      - new_component_functional
      - feature_flag_enabled
      
  3_redirect:
    name: "Redirect Traffic"
    description: "Gradually route traffic to new component"
    activities:
      - canary_deployment
      - percentage_rollout
      - monitor_metrics
      - compare_outcomes
    exit_criteria:
      - traffic_percentage >= target
      - error_rate <= threshold
      
  4_retire:
    name: "Retire Legacy"
    description: "Decommission old component"
    activities:
      - final_data_migration
      - remove_feature_flags
      - archive_legacy_code
      - update_documentation
    exit_criteria:
      - legacy_traffic == 0
      - data_verified
      - rollback_plan_archived

rollback_strategy:
  enabled: true
  triggers:
    - error_rate > 5%
    - latency_increase > 50%
    - data_inconsistency_detected
  actions:
    - revert_traffic_routing
    - notify_on_call
    - create_incident_report

metrics:
  - migration_progress_pct
  - feature_parity_score
  - traffic_split_ratio
  - error_rate_comparison
  - latency_comparison

observability:
  pattern_event: "strangler_fig"
  dashboard: true
  alerts:
    - migration_stalled
    - regression_detected
    - rollback_triggered

use_cases:
  - legacy_to_microservice
  - monolith_decomposition
  - database_migration
  - api_versioning
  - platform_rewrite

integration:
  governance_agent: true
  risk_analytics: true
  deployment_pipeline: true

wsjf:
  business_value: 8
  time_criticality: 6
  risk_reduction: 9
  job_size: 8
  calculated: 2.9
