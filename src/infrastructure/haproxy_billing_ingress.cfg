# HAProxy Edge Ingress Configuration (Sovereign EventOps Billing)
# This routes external webhooks strictly to the Rust-backed validation bridge

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/
    mode http
    option httplog

    # 1. Routing for EventOps Billing Webhooks
    acl is_billing_webhook hdr_end(host) -i billing.bhopti.com
    acl is_stripe_path path_beg /webhooks/stripe

    # If it's a Stripe webhook destined for billing.bhopti.com, route to the Rust bridge
    use_backend eventops_rust_gateway if is_billing_webhook is_stripe_path

    # Default fallback to legacy cPanel infrastructure if not intercepted
    default_backend legacy_cpanel_cluster

backend eventops_rust_gateway
    mode http
    balance roundrobin
    option forwardfor
    # Health checks ensuring the PyO3 binary bridge is alive
    option httpchk GET /health
    # Target the unified Python Gateway running the Rust compilation (port 9091)
    server gateway_node_1 127.0.0.1:9091 check inter 2000 rise 2 fall 3

backend legacy_cpanel_cluster
    mode http
    balance roundrobin
    server cpanel_01 192.168.122.237:443 ssl verify none check
