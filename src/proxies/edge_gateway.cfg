# Sovereign Edge Ingress Gateway (Caddy)
# Publish to public edge (not just local)
# Resolves world client traffic securely with Auto-HTTPS and zero false-green

{
    # Global settings
    email admin@bhopti.com
    admin off
    https_port 8444
    http_port 8085
}

# 1. Billing Engine (HostBill)
billing.bhopti.com {
    reverse_proxy 127.0.0.1:30083 {
        header_up X-Real-IP {remote}
        header_up X-Forwarded-Port {port}
        header_up X-Forwarded-Proto {scheme}
    }
    encode gzip zstd
    log {
        output file /var/log/caddy/billing_access.log
    }
    
    # Block unauthorized access to raw telemetry webhook endpoints
    @stripe_webhooks {
        path /webhooks/stripe
    }
    
    handle @stripe_webhooks {
        # Passes the webhook directly to the isolated Rust calculation primitive 
        # (src/gateways/stripe_gateway.rs) mapped to port 9090
        reverse_proxy 127.0.0.1:9090
    }
}

# 2. CRM & E-Commerce (OroCommerce)
crm.bhopti.com, shop.bhopti.com {
    reverse_proxy 192.168.122.237:8000 {
        header_up X-Real-IP {remote}
        header_up X-Forwarded-Port {port}
        header_up X-Forwarded-Proto {scheme}
    }
    encode gzip zstd
    log {
        output file /var/log/caddy/crm_access.log
    }

    # Static Asset Aggressive Caching (Uptime & Performance)
    @static {
        path *.jpg *.jpeg *.png *.gif *.ico *.css *.js
    }
    handle @static {
        header Cache-Control "public, max-age=31536000"
    }
}

# 3. gRPC EventOps Primitive (Internal + World Clients)
api.interface.tag.ooo {
    # Handles Protobuf/gRPC telemetry streams directly
    reverse_proxy h2c://127.0.0.1:50051 {
        header_up Host {host}
        header_up X-Real-IP {remote}
    }
}

# 4. Mail Server Administration Portal (cPanel WHM)
mailadmin.bhopti.com {
    tls internal
    reverse_proxy https://192.168.122.237:2087 {
        transport http {
            tls_insecure_skip_verify
        }
        header_up X-Real-IP {remote}
        header_up X-Forwarded-Port {port}
        header_up X-Forwarded-Proto {scheme}
    }
    encode gzip zstd
    log {
        output file /var/log/caddy/mailadmin_access.log
    }
}



