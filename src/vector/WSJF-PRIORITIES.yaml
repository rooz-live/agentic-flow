# ╔══════════════════════════════════════════════════════════════════╗
# ║  Anti-fragility Principles                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

principles:
  - name: "Invert Thinking"
    description: "Instead of disabling on failure, add fallback"
    examples:
      - "❌ Disable search if OpenAI down"
      - "✅ Fallback to transformers.js"
      
  - name: "Config Upgrades"
    description: "Retain capabilities via config, not deletion"
    examples:
      - "❌ Delete old code paths"
      - "✅ Feature flags: old_path: false, new_path: true"
      
  - name: "Lean Iterations"
    description: "Small jobs, fast feedback"
    rule: "No job larger than 5 story points"
    
  - name: "Physical Verification"
    description: "E2E tests required, not just unit"
    rule: "Anti-CVT: 'files exist' ≠ 'feature works'"
