# pytest.ini - Pytest Configuration for Agentic Flow
# Phase 2: Build Orchestration & Testing
# Provides comprehensive test configuration for Python test suite

[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# Default options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    -ra
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external services)
    e2e: End-to-end tests (full workflow validation)
    slow: Slow tests (>5s execution time)
    governance: Governance policy tests
    telemetry: Telemetry and metrics tests
    dt: Decision Transformer tests
    iris: IRIS integration tests
    federation: Federation and retro coach tests
    smoke: Smoke tests for quick validation

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration (requires pytest-cov)
# Run with: pytest --cov=scripts --cov-report=html
# Coverage thresholds enforced in CI

# Ignore patterns
norecursedirs = 
    .git
    .tox
    .eggs
    *.egg
    dist
    build
    node_modules
    __pycache__
    .pytest_cache
    .mypy_cache

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::UserWarning

