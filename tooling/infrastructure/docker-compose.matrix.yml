version: '3.8'

services:
  # ══════════════════════════════════════════════════════════
  # MATRIX PROTOCOL: HOME SERVER (SYNAPSE)
  # ══════════════════════════════════════════════════════════
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: agentic_synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_SERVER_NAME=matrix.bhop.ti
      - SYNAPSE_REPORT_STATS=no
      - POSTGRES_DB=synapse
      - POSTGRES_USER=synapse_user
      - POSTGRES_PASSWORD=synapse_secure_password
      - POSTGRES_HOST=postgres
    volumes:
      # 🔴 APFS GRAVITY BOUNDARY: Strict offloading to external drive
      - /Volumes/cPanelBackups/execution_bounds/mac_studio/matrix/synapse:/data
    ports:
      - "8008:8008"
    depends_on:
      - postgres
    networks:
      - agentic_mesh

  # ══════════════════════════════════════════════════════════
  # MATRIX PROTOCOL: DATABASE (POSTGRESQL)
  # ══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: agentic_matrix_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=synapse
      - POSTGRES_USER=synapse_user
      - POSTGRES_PASSWORD=synapse_secure_password
    volumes:
      # 🔴 APFS GRAVITY BOUNDARY: Strict offloading to external drive
      - /Volumes/cPanelBackups/execution_bounds/mac_studio/matrix/postgres:/var/lib/postgresql/data
    networks:
      - agentic_mesh

  # ══════════════════════════════════════════════════════════
  # MATRIX PROTOCOL: CLIENT (ELEMENT-WEB)
  # ══════════════════════════════════════════════════════════
  element-web:
    image: vectorim/element-web:latest
    container_name: agentic_element
    restart: unless-stopped
    volumes:
      # 🔴 APFS GRAVITY BOUNDARY: Strict offloading to external drive
      - /Volumes/cPanelBackups/execution_bounds/mac_studio/matrix/element:/app/config
    ports:
      - "8080:80"
    networks:
      - agentic_mesh

networks:
  agentic_mesh:
    driver: bridge
