<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #60a5fa;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
        }
        
        .card h3 {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .card-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .card-label {
            font-size: 0.9em;
            color: #64748b;
        }
        
        .card.critical { border-left: 4px solid #ef4444; }
        .card.high { border-left: 4px solid #f59e0b; }
        .card.medium { border-left: 4px solid #eab308; }
        .card.low { border-left: 4px solid #10b981; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
        }
        
        .chart-container h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #cbd5e1;
        }
        
        .chart-wrapper {
            position: relative;
            height: 300px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .anomalies-section {
            margin-top: 30px;
        }
        
        .anomaly-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ef4444;
        }
        
        .anomaly-card.high { border-left-color: #f59e0b; }
        .anomaly-card.medium { border-left-color: #eab308; }
        .anomaly-card.low { border-left-color: #10b981; }
        
        .anomaly-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .anomaly-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #f1f5f9;
        }
        
        .anomaly-severity {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .severity-critical { background: #7f1d1d; color: #fca5a5; }
        .severity-high { background: #78350f; color: #fed7aa; }
        .severity-medium { background: #713f12; color: #fde047; }
        .severity-low { background: #14532d; color: #86efac; }
        
        .anomaly-description {
            color: #cbd5e1;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .anomaly-recommendation {
            color: #94a3b8;
            font-size: 0.9em;
            padding-left: 15px;
            border-left: 3px solid #475569;
            font-style: italic;
        }
        
        .retro-questions {
            margin-top: 30px;
        }
        
        .question-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 3px solid #60a5fa;
        }
        
        .question-category {
            font-size: 0.75em;
            text-transform: uppercase;
            color: #60a5fa;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .question-text {
            color: #e2e8f0;
            line-height: 1.5;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            margin-left: auto;
            display: block;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background: #2563eb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Pattern Metrics Dashboard</h1>
            <p style="color: #64748b;">Real-time monitoring of agentic-flow patterns and anomalies</p>
        </header>
        
        <button class="refresh-btn" onclick="loadDashboard()">🔄 Refresh Data</button>
        
        <div id="summary-section" class="summary-cards"></div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h2>Pattern Frequency Over Time</h2>
                <div class="chart-wrapper">
                    <canvas id="patternFrequencyChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h2>Cost of Delay Trends</h2>
                <div class="chart-wrapper">
                    <canvas id="codTrendChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container full-width">
                <h2>Pattern Distribution by Type</h2>
                <div class="chart-wrapper">
                    <canvas id="patternDistributionChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h2>Mutation vs Advisory Events</h2>
                <div class="chart-wrapper">
                    <canvas id="mutationChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h2>Behavioral Type Distribution</h2>
                <div class="chart-wrapper">
                    <canvas id="behavioralChart"></canvas>
                </div>
            </div>
        </div>
        
        <div id="anomalies-section" class="anomalies-section"></div>
        <div id="retro-questions-section" class="retro-questions"></div>
    </div>
    
    <script>
        let charts = {};
        
        async function loadDashboard() {
            try {
                // Load pattern analysis report
                const response = await fetch('../../.goalie/pattern_analysis_report.json');
                if (!response.ok) {
                    throw new Error('Failed to load pattern analysis report');
                }
                
                const data = await response.json();
                
                // Render summary cards
                renderSummaryCards(data.summary);
                
                // Render charts
                renderPatternCharts(data.patterns);
                
                // Render anomalies
                renderAnomalies(data.anomalies || []);
                
                // Render retro questions
                renderRetroQuestions(data.retro_questions || []);
                
            } catch (error) {
                console.error('Failed to load dashboard data:', error);
                document.getElementById('summary-section').innerHTML = 
                    '<div class="no-data">⚠️ Failed to load pattern analysis data. Run `af pattern-analysis` first.</div>';
            }
        }
        
        function renderSummaryCards(summary) {
            const section = document.getElementById('summary-section');
            
            const severityClass = summary.anomalies_detected > 5 ? 'critical' : 
                                  summary.anomalies_detected > 2 ? 'high' : 
                                  summary.anomalies_detected > 0 ? 'medium' : 'low';
            
            section.innerHTML = `
                <div class="card">
                    <h3>Total Metrics</h3>
                    <div class="card-value">${summary.total_metrics || 0}</div>
                    <div class="card-label">pattern events tracked</div>
                </div>
                
                <div class="card">
                    <h3>Patterns Tracked</h3>
                    <div class="card-value">${summary.patterns_tracked || 0}</div>
                    <div class="card-label">unique patterns</div>
                </div>
                
                <div class="card">
                    <h3>Runs Analyzed</h3>
                    <div class="card-value">${summary.runs_analyzed || 0}</div>
                    <div class="card-label">production cycles</div>
                </div>
                
                <div class="card ${severityClass}">
                    <h3>Anomalies Detected</h3>
                    <div class="card-value">${summary.anomalies_detected || 0}</div>
                    <div class="card-label">requiring attention</div>
                </div>
                
                <div class="card">
                    <h3>Governance Adjustments</h3>
                    <div class="card-value">${summary.adjustments_proposed || 0}</div>
                    <div class="card-label">recommended changes</div>
                </div>
                
                <div class="card">
                    <h3>Retro Questions</h3>
                    <div class="card-value">${summary.retro_questions_generated || 0}</div>
                    <div class="card-label">generated insights</div>
                </div>
            `;
        }
        
        function renderPatternCharts(patterns) {
            if (!patterns || Object.keys(patterns).length === 0) {
                return;
            }
            
            const patternNames = Object.keys(patterns);
            const patternCounts = patternNames.map(name => patterns[name].length);
            
            // Pattern Distribution Chart
            if (charts.patternDistribution) charts.patternDistribution.destroy();
            const ctx1 = document.getElementById('patternDistributionChart');
            charts.patternDistribution = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: patternNames,
                    datasets: [{
                        label: 'Event Count',
                        data: patternCounts,
                        backgroundColor: '#3b82f6',
                        borderColor: '#60a5fa',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8', maxRotation: 45, minRotation: 45 }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } }
                    }
                }
            });
            
            // Mutation vs Advisory Chart
            const allEvents = Object.values(patterns).flat();
            const mutations = allEvents.filter(e => e.mutation || e.metadata?.mutation_status).length;
            const advisory = allEvents.length - mutations;
            
            if (charts.mutation) charts.mutation.destroy();
            const ctx2 = document.getElementById('mutationChart');
            charts.mutation = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Advisory', 'Mutation'],
                    datasets: [{
                        data: [advisory, mutations],
                        backgroundColor: ['#60a5fa', '#ef4444'],
                        borderColor: '#1e293b',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } }
                    }
                }
            });
            
            // Behavioral Type Distribution
            const behavioralTypes = {};
            allEvents.forEach(e => {
                const type = e.metadata?.behavioral_type || e.mode || 'unknown';
                behavioralTypes[type] = (behavioralTypes[type] || 0) + 1;
            });
            
            if (charts.behavioral) charts.behavioral.destroy();
            const ctx3 = document.getElementById('behavioralChart');
            charts.behavioral = new Chart(ctx3, {
                type: 'pie',
                data: {
                    labels: Object.keys(behavioralTypes),
                    datasets: [{
                        data: Object.values(behavioralTypes),
                        backgroundColor: ['#60a5fa', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                        borderColor: '#1e293b',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } }
                    }
                }
            });
            
            // COD Trend Chart
            const codData = allEvents
                .filter(e => e.economic && typeof e.economic.cod === 'number')
                .map(e => ({ ts: e.ts, cod: e.economic.cod }))
                .sort((a, b) => new Date(a.ts) - new Date(b.ts));
            
            if (charts.codTrend) charts.codTrend.destroy();
            const ctx4 = document.getElementById('codTrendChart');
            charts.codTrend = new Chart(ctx4, {
                type: 'line',
                data: {
                    labels: codData.map(d => new Date(d.ts).toLocaleDateString()),
                    datasets: [{
                        label: 'Cost of Delay',
                        data: codData.map(d => d.cod),
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8', maxRotation: 45 }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } }
                    }
                }
            });
            
            // Pattern Frequency Over Time
            const freqData = {};
            patternNames.forEach(pattern => {
                freqData[pattern] = patterns[pattern]
                    .filter(e => e.ts)
                    .map(e => ({ date: new Date(e.ts).toLocaleDateString(), pattern }));
            });
            
            const allDates = [...new Set(Object.values(freqData).flat().map(d => d.date))].sort();
            const datasets = patternNames.map((pattern, i) => {
                const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];
                return {
                    label: pattern,
                    data: allDates.map(date => freqData[pattern].filter(d => d.date === date).length),
                    borderColor: colors[i % colors.length],
                    backgroundColor: colors[i % colors.length] + '33',
                    tension: 0.4
                };
            });
            
            if (charts.frequency) charts.frequency.destroy();
            const ctx5 = document.getElementById('patternFrequencyChart');
            charts.frequency = new Chart(ctx5, {
                type: 'line',
                data: { labels: allDates, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8', maxRotation: 45 }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#cbd5e1', font: { size: 10 } } }
                    }
                }
            });
        }
        
        function renderAnomalies(anomalies) {
            const section = document.getElementById('anomalies-section');
            
            if (anomalies.length === 0) {
                section.innerHTML = `
                    <h2 style="color: #10b981; margin-bottom: 15px;">✓ No Anomalies Detected</h2>
                    <p style="color: #64748b;">All patterns operating within normal parameters.</p>
                `;
                return;
            }
            
            section.innerHTML = `
                <h2 style="margin-bottom: 15px;">⚠️ Detected Anomalies (${anomalies.length})</h2>
                ${anomalies.map(anomaly => `
                    <div class="anomaly-card ${anomaly.severity}">
                        <div class="anomaly-header">
                            <div class="anomaly-title">${anomaly.pattern}: ${anomaly.type.replace(/_/g, ' ')}</div>
                            <span class="anomaly-severity severity-${anomaly.severity}">${anomaly.severity}</span>
                        </div>
                        <div class="anomaly-description">${anomaly.description}</div>
                        <div class="anomaly-recommendation">→ ${anomaly.recommendation}</div>
                    </div>
                `).join('')}
            `;
        }
        
        function renderRetroQuestions(questions) {
            const section = document.getElementById('retro-questions-section');
            
            if (questions.length === 0) {
                return;
            }
            
            section.innerHTML = `
                <h2 style="margin-bottom: 15px;">💭 Generated Retro Questions (${questions.length})</h2>
                ${questions.map(q => `
                    <div class="question-card">
                        <div class="question-category">${q.category}</div>
                        <div class="question-text">${q.question}</div>
                    </div>
                `).join('')}
            `;
        }
        
        // Load dashboard on page load
        loadDashboard();
        
        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
